# Project-local Codex SDLC agents are adapted from StackOS agent presets for
# `engineering.tracked-delivery`. Keep these in sync with
# `plugins/engineering/agent-presets/sdlc.yaml`.
#
# Main-agent orchestration guidance is adapted from the StackOS skill preset
# `stackos.sdlc.delivery-orchestrator` and lives at:
# `.codex/orchestrator/sdlc-delivery-orchestrator.md`.
# That file is not a subagent; it is the main Codex/orchestrator operating
# contract for engineering workflow delivery in this repository.
#
# Project-local branding agents are adapted from
# `plugins/branding/agent-presets/branding.yaml` for
# `branding.brand-foundation-setup` and `branding.content-production`.
# Main-agent routing and depth guidance lives at
# `.codex/orchestrator/branding-content-orchestrator.md`.

# StackOS is the repository's primary workflow and delivery-state runtime.
# Keep its MCP namespace model-visible even when Codex defers other MCP tools
# behind tool_search. This also preserves StackOS access if the host omits the
# tool_search loader from a resumed or compacted thread.
[features.code_mode]
enabled = false
direct_only_tool_namespaces = ["mcp__stackos"]

[agents.sdlc_requirements_flow_definer]
config_file = "agents/sdlc-requirements-flow-definer.toml"

[agents.sdlc_codebase_explorer]
config_file = "agents/sdlc-codebase-explorer.toml"

[agents.sdlc_planning]
config_file = "agents/sdlc-planning.toml"

[agents.sdlc_architecture]
config_file = "agents/sdlc-architecture.toml"

[agents.sdlc_test_designer]
config_file = "agents/sdlc-test-designer.toml"

[agents.sdlc_delivery]
config_file = "agents/sdlc-delivery.toml"

[agents.sdlc_delivery_reviewer]
config_file = "agents/sdlc-delivery-reviewer.toml"

[agents.brand_profile_architect]
config_file = "agents/brand-profile-architect.toml"

[agents.brand_evidence_curator]
config_file = "agents/brand-evidence-curator.toml"

[agents.brand_narrative_writer]
config_file = "agents/brand-narrative-writer.toml"

[agents.brand_channel_strategist]
config_file = "agents/brand-channel-strategist.toml"

[agents.brand_claim_auditor]
config_file = "agents/brand-claim-auditor.toml"

[agents.brand_voice_reviewer]
config_file = "agents/brand-voice-reviewer.toml"

[agents.brand_sanitization_reviewer]
config_file = "agents/brand-sanitization-reviewer.toml"

# Repo-local wrapper starts and proxies to one shared Serena Streamable HTTP
# MCP server for this checkout.
[mcp_servers.serena]
command = "python3"
args = ["/Users/sergeyrura/Bin/content-stack/.mcp/serena-mcp-wrapper.py"]
env = { SERENA_PROJECT = "/Users/sergeyrura/Bin/content-stack", SERENA_PROJECT_NAME = "content-stack", SERENA_PORT = "9133", SERENA_CONTEXT = "codex", SERENA_IDLE_TIMEOUT_SECONDS = "3600", UV_CACHE_DIR = "/Users/sergeyrura/.local/share/tpf/uv-cache" }
startup_timeout_sec = 60.0
tool_timeout_sec = 300.0
