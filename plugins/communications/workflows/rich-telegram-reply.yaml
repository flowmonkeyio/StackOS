schema_version: stackos.workflow-template.v1
key: communications.rich-telegram-reply
name: Rich Telegram Reply
version: 0.1.0
description: Reusable setup for replying to a Telegram-originated agent request with text, images, and optional inline buttons.
domain: communications
owner:
  team: StackOS
experience:
  problem: "Rich replies can silently lose images, buttons, threading, or privacy boundaries when a platform feature is unavailable."
  outcome: "One Telegram reply whose text, media, buttons, and thread context match the approved response contract."
  operator_path:
    - "Provide the reply intent and approved media or action choices."
    - "Confirm any button behavior that creates work or changes state."
    - "Review the sent message and stored interaction refs."
  agent_path:
    - "Load the originating request and Telegram surface policy."
    - "Validate text, every media item, and button payload before any send."
    - "Send without silent degradation and store message and interaction receipts."
  progress_signals:
    - "Origin verified"
    - "Payload validated"
    - "Media complete"
    - "Reply delivered"
    - "Interaction refs stored"
  recovery:
    - "Reject unsupported rich features instead of silently dropping them."
    - "Use provider receipts and idempotency state to avoid duplicate replies after failure."
  safe_stopping_points:
    - "Stop with a validated reply packet when the origin or feature contract is incomplete."
public:
  audience: "Teams replying to Telegram requests with media or buttons"
  setup: connection-required
  prerequisites:
    - "A connected Telegram profile"
    - "An originating request and approved reply destination"
    - "Safe media refs and defined button behavior"
  proof:
    - "Validated payload"
    - "Telegram message and media ids"
    - "Stored button interaction refs"
  featured: false
when_to_use:
  - A Telegram message created an agent_request and the response may need buttons or images.
  - The agent must respect the originating communication profile, chat, thread, and response policy.
when_not_to_use:
  - The response is not tied to a Telegram communication profile.
agent_requirements:
  - role: communications-rich-telegram-reply
    requirement: required
    agent_preset_ref: communications.workflow.rich-telegram-reply
    purpose: Validate and deliver Telegram replies with exact rich-message semantics.
    applies_to_steps:
      - orient
      - compose
      - send
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review buttons, attachments, reply/thread semantics, auth, and no-silent-degradation behavior.
    applies_to_steps:
      - compose
      - send
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: agent_request_id
    name: Agent Request ID
    type: integer
    required: true
  - key: response_goal
    name: Response Goal
    type: string
    required: true
context_requirements:
  - id: request_context
    source: agent_requests
    purpose: Read origin refs, bot identity, guidance, and response policy.
    fields:
      - title
      - body_preview
      - source_message_ref
      - metadata_json
    max_items: 1
    return_mode: compact
  - id: recent_thread_messages
    source: resources
    purpose: Read bounded communication history for the same chat/thread.
    filters:
      plugin_slug: communications
      resource_keys:
        - communication-message
        - communication-interaction
    fields:
      - title
      - data_json
      - updated_at
    max_items: 20
    return_mode: compact
capability_requirements:
  - key: messaging
    required: true
auth_requirements:
  - key: telegram_bot
    provider: telegram-bot
    auth_type: bot-token
    optional: false
action_contracts:
  - key: send_message
    action: telegram-bot.message.send
    capability: messaging
    provider: telegram-bot
    risk_level: write
    auth_ref: telegram_bot
  - key: send_photo
    action: telegram-bot.photo.send
    capability: messaging
    provider: telegram-bot
    risk_level: write
    auth_ref: telegram_bot
    optional: true
policies:
  - key: origin_bound_response
    kind: safety
    description: Reply actions must include source_agent_request_id and match the originating communication profile/chat policy.
steps:
  - id: orient
    title: Read Origin Context
    purpose: Inspect the request metadata, communication profile guidance, and thread context.
    input_refs:
      - agent_request_id
      - response_goal
    context_refs:
      - request_context
      - recent_thread_messages
    output_refs:
      - response_plan
  - id: compose
    title: Compose Response Payload
    purpose: Decide exact text, image refs, and optional button payloads without embedding secrets.
    policy_refs:
      - origin_bound_response
    depends_on:
      - orient
    output_refs:
      - response_payload
  - id: send
    title: Send Telegram Response
    purpose: Execute the explicit Telegram send action granted by the run plan.
    action_refs:
      - send_message
      - send_photo
    depends_on:
      - compose
outputs:
  - key: response_plan
    name: Response Plan
    type: object
    required: true
    description: Origin, thread, feature, media, button, and no-degradation plan for the reply.
    schema:
      type: object
      required: [source_request_ref, communication_profile_ref, chat_ref, feature_requirements, delivery_mode]
      properties:
        source_request_ref: {type: string}
        communication_profile_ref: {type: string}
        chat_ref: {type: string}
        thread_ref: {type: string}
        feature_requirements: {type: array}
        media_refs: {type: array, items: {type: string}}
        delivery_mode: {type: string, enum: [text, photo, text_and_photo]}
  - key: response_payload
    name: Response Payload
    type: object
    required: true
    description: Exact origin-bound Telegram text, media, and button payload ready for validation and send.
    schema:
      type: object
      required: [source_request_ref, chat_ref, text]
      properties:
        source_request_ref: {type: string}
        chat_ref: {type: string}
        thread_ref: {type: string}
        text: {type: string}
        media_refs: {type: array, items: {type: string}}
        buttons: {type: array}
metadata:
  builtin: true
  run_mode: stackos_run_plan
