slug: gtm
name: GTM And RevOps
version: 0.1.0
description: First-party StackOS domain package for go-to-market and RevOps provider contracts, resource schemas, and reusable workflow templates.
display_order: 30
source: builtin
capabilities:
  - key: account-research
    name: Account Research
    description: Store account, company, contact, and market context for go-to-market workflows.
    kind: domain
  - key: lead-management
    name: Lead Management
    description: Import, score, enrich, and qualify leads from explicit agent inputs.
    kind: domain
  - key: crm-operations
    name: CRM Operations
    description: Upsert CRM records, create notes, and create tasks from explicit agent inputs.
    kind: domain
  - key: outbound-operations
    name: Outbound Operations
    description: Prepare sequences, touches, and follow-up records without deciding messaging strategy inside tools.
    kind: domain
  - key: pipeline-management
    name: Pipeline Management
    description: Read and store pipeline snapshots, deal risks, and follow-up recommendations.
    kind: domain
  - key: automation
    name: Revenue Automation
    description: Represent provider webhook and workflow-action contracts without moving business decisions into tools.
    kind: domain
  - key: enrichment
    name: Enrichment
    description: Run enrichment contracts through configured providers and store normalized records.
    kind: domain
providers:
  - key: hubspot
    name: HubSpot
    description: HubSpot sales and marketing customer-lifecycle provider with capability-scoped OAuth readiness.
    auth_type: oauth
    auth_methods:
      - key: oauth2_authorization_code
        label: Connect with HubSpot
        auth_type: oauth
        description: Register a HubSpot OAuth app with the fixed StackOS callback. CRM Core is required; select only the optional feature bundles this connection needs.
        interactive: true
        payload_format: json
        fields:
        - key: client_id
          label: OAuth Client ID
          type: secret
          secret: true
          required: true
        - key: client_secret
          label: OAuth Client Secret
          type: secret
          secret: true
          required: true
        - key: scope_bundles
          label: Optional capability bundles
          type: multi-select
          secret: false
          required: false
          description: Reconnect after selecting a bundle that adds OAuth scopes. Scope-free operator checklists such as Webhooks do not require new consent. Actual returned scopes determine scope state.
          options:
          - label: Sales
            value: sales
          - label: Marketing
            value: marketing
          - label: Bulk jobs
            value: bulk
          - label: Webhooks
            value: webhooks
          - label: Custom workflow automation
            value: automation
          - label: Transactional communications
            value: transactional-communications
        - key: transactional_email_entitlement_confirmed
          label: Transactional Email add-on confirmed
          type: boolean
          secret: false
          required: false
          description: Enable only after verifying that this exact HubSpot portal has the Transactional Email add-on. This is an operator confirmation; provider errors remain authoritative.
          options:
          - label: Not confirmed
            value: "false"
          - label: Confirmed
            value: "true"
        - key: app_id
          label: HubSpot App ID
          type: number
          secret: false
          required: false
          description: Required when signed ingress is enabled. Copy the numeric app ID from the HubSpot developer project so incoming events can be bound to the exact app.
        - key: webhook_enabled
          label: Signed ingress
          type: boolean
          secret: false
          required: false
          description: Enable only after the generic StackOS public ingress URL and exact event allowlist are configured.
          options:
          - label: Disabled
            value: "false"
          - label: Enabled
            value: "true"
        - key: webhook_event_allowlist
          label: Events that may create agent requests
          type: multi-select
          secret: false
          required: false
          description: Signed events outside this exact allowlist are retained as non-triggering audit context and never start a workflow.
          options:
          - {label: Contact created, value: contact.creation}
          - {label: Contact deleted, value: contact.deletion}
          - {label: Contact merged, value: contact.merge}
          - {label: Contact association changed, value: contact.associationChange}
          - {label: Contact restored, value: contact.restore}
          - {label: Contact privacy-deleted, value: contact.privacyDeletion}
          - {label: Contact property changed, value: contact.propertyChange}
          - {label: Company created, value: company.creation}
          - {label: Company deleted, value: company.deletion}
          - {label: Company merged, value: company.merge}
          - {label: Company association changed, value: company.associationChange}
          - {label: Company restored, value: company.restore}
          - {label: Company property changed, value: company.propertyChange}
          - {label: Deal created, value: deal.creation}
          - {label: Deal deleted, value: deal.deletion}
          - {label: Deal merged, value: deal.merge}
          - {label: Deal association changed, value: deal.associationChange}
          - {label: Deal restored, value: deal.restore}
          - {label: Deal property changed, value: deal.propertyChange}
        - key: workflow_action_allowlist
          label: Custom workflow action definition IDs
          type: text
          secret: false
          required: false
          placeholder: comma-separated numeric definition IDs
          description: Optional exact allowlist for manually registered HubSpot custom workflow actions. Invocations create agent requests only; they never select or start a StackOS workflow.
        - key: field_mapping_ref
          label: Field Mapping Ref
          type: text
          secret: false
          required: false
          placeholder: safe CRM property mapping reference
    config:
      scopes:
        - crm.objects.contacts.read
        - crm.objects.contacts.write
        - crm.objects.companies.read
        - crm.objects.companies.write
        - crm.objects.deals.read
        - crm.objects.deals.write
        - crm.objects.owners.read
        - crm.schemas.contacts.read
        - crm.schemas.companies.read
        - crm.schemas.deals.read
      scope_bundles:
        sales:
          label: Sales
          readiness_group: sales
          optional_scopes:
            - crm.objects.leads.read
            - crm.objects.leads.write
            - crm.objects.products.read
            - crm.objects.products.write
            - crm.objects.line_items.read
            - crm.objects.line_items.write
            - crm.objects.quotes.read
            - crm.objects.goals.read
        marketing:
          label: Marketing
          readiness_group: marketing
          optional_scopes:
            - forms
            - crm.lists.read
            - crm.lists.write
            - marketing.campaigns.read
            - marketing.campaigns.write
            - marketing-email
            - subscriptions-definition-read
            - subscriptions-status-read
            - subscriptions-status-write
            - crm.objects.marketing_events.read
            - crm.objects.marketing_events.write
            - analytics.behavioral_events.send
            - behavioral_events.event_definitions.read_write
        bulk:
          label: Bulk jobs
          readiness_group: bulk
          optional_scopes:
            - crm.export
        webhooks:
          label: Webhooks
          readiness_group: webhooks
          optional_scopes: []
        automation:
          label: Custom workflow automation
          readiness_group: automation
          optional_scopes:
            - automation
        transactional-communications:
          label: Transactional communications
          readiness_group: transactional-communications
          optional_scopes:
            - transactional-email
      readiness_groups:
        crm-core:
          label: CRM Core
          required_scopes:
            - crm.objects.contacts.read
            - crm.objects.contacts.write
            - crm.objects.companies.read
            - crm.objects.companies.write
            - crm.objects.deals.read
            - crm.objects.deals.write
            - crm.objects.owners.read
            - crm.schemas.contacts.read
            - crm.schemas.companies.read
            - crm.schemas.deals.read
        sales:
          label: Sales
          source_bundle: sales
        marketing:
          label: Marketing
          source_bundle: marketing
        bulk:
          label: Bulk
          source_bundle: bulk
        webhooks:
          label: Webhooks
          source_bundle: webhooks
          prerequisites:
            - oauth-app
            - public-ingress
            - signature-validation
        automation:
          label: Custom Workflow Automation
          source_bundle: automation
          prerequisites:
            - oauth-app
            - public-ingress
            - signature-validation
            - workflow-action-registration
        transactional-communications:
          label: Transactional Communications
          source_bundle: transactional-communications
          prerequisites:
            - transactional-email-addon
            - communication-profile
            - communication-target
            - consent-policy
      setup:
        credential_label: HubSpot OAuth app
        setup_note: Create a project-based HubSpot OAuth app, register the fixed StackOS callback, configure CRM Core as required scopes and the selected capability bundles as optional scopes, then use Connect with HubSpot. Service keys remain deferred because HubSpot does not document scope introspection for them and they cannot support webhooks.
        local_setup_label: Connect HubSpot in StackOS
        local_setup_note: Choose optional capability bundles before connecting. Reconnect after adding a bundle; the last working credential remains active if the upgrade fails.
        homepage_url: https://www.hubspot.com/
        signup_url: https://app.hubspot.com/signup-hubspot/crm
        console_url: https://app.hubspot.com/developer-projects
        credential_url: https://developers.hubspot.com/docs/apps/developer-platform/build-apps/authentication/oauth/working-with-oauth
        billing_url: https://www.hubspot.com/pricing
        docs_url: https://developers.hubspot.com/docs/api-reference/latest/overview
        support_url: https://developers.hubspot.com/docs/apps/developer-platform/build-apps/authentication/scopes
        callback_url: https://auth.stackos.flowmonkey.io/api/v1/auth/oauth/callback
        callback_note: The public HTTPS relay forwards the unchanged callback query to http://127.0.0.1:5180/api/v1/auth/oauth/callback and returns the browser to the generic StackOS Connections view.
        repair_note: Reconnect for missing scopes; verify the selected portal, HubSpot tier or seat, add-on entitlement, public ingress health, and callback URL. Deferred actions remain unavailable by design.
        fallback_url: https://developers.hubspot.com/docs/apps/developer-platform/build-apps/manage-apps-in-hubspot
        fallback_reason: HubSpot app screens are account-gated; use the official app-management guide when the direct development console route changes.
        verified_at: "2026-07-22"
        url_confidence:
          homepage_url: verified
          signup_url: verified
          console_url: directional
          credential_url: verified
          billing_url: verified
          docs_url: verified
          support_url: verified
          callback_url: verified
          fallback_url: verified
