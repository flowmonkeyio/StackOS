  - key: hubspot.marketing.contact_preferences.update
    name: Update HubSpot Contact Email Preference
    description: Apply one explicit subscription-state change with safe refs, legal-basis context, confirmation, and no subscriber-email output.
    provider: hubspot
    capability: lead-management
    risk_level: high
    input_schema: &hubspot_contact_preferences_update_input
      type: object
      additionalProperties: false
      required:
        - contact_ref
        - subscription_type_ref
        - status
        - legal_basis
        - legal_basis_explanation
        - legal_change_confirmed
      allOf:
        - if:
            properties:
              status:
                const: SUBSCRIBED
          then:
            required:
              - consent_obtained
            properties:
              consent_obtained:
                const: true
      properties:
        contact_ref:
          type: string
          pattern: "^provider-object:"
        subscription_type_ref:
          type: string
          pattern: "^provider-object:"
        status:
          type: string
          enum:
            - SUBSCRIBED
            - UNSUBSCRIBED
            - NOT_SPECIFIED
        legal_basis:
          type: string
