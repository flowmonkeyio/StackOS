resources:
  - key: account
    name: Account
    description: Target account record, safe external refs, ownership, and research summary.
    schema: *object_schema
  - key: company
    name: Company
    description: Company profile, firmographics, source refs, and CRM mapping notes.
    schema: *object_schema
  - key: contact
    name: Contact
    description: Contact profile, role context, source refs, consent notes, and CRM mapping notes.
    schema: *object_schema
  - key: lead
    name: Lead
    description: Lead record, qualification notes, score, source refs, and status.
    schema: *object_schema
  - key: opportunity
    name: Opportunity
    description: Opportunity or deal reference with stage, amount range, risk notes, and next steps.
    schema: *object_schema
  - key: deal
    name: Deal
    description: CRM deal record or safe deal summary for pipeline analysis.
    schema: *object_schema
  - key: sequence
    name: Sequence
    description: Outbound sequence or cadence plan with audience, copy refs, and approval state.
    schema: *object_schema
  - key: task
    name: Task
    description: Follow-up task, owner ref, due date, and related record refs.
    schema: *object_schema
  - key: touchpoint
    name: Touchpoint
    description: Email, call, meeting, social, or other interaction record.
    schema: *object_schema
  - key: enrichment-record
    name: Enrichment Record
    description: Normalized enrichment result, provenance, confidence, and fields updated.
    schema: *object_schema
  - key: pipeline-snapshot
    name: Pipeline Snapshot
    description: Imported or summarized pipeline metrics, stage movement, risk, and forecast notes.
    schema: *object_schema
  - key: marketing-program
    name: Marketing Program
    description: Reviewed campaign, audience, draft asset, consent, approval, and provider-safe execution evidence.
    schema:
      type: object
      additionalProperties: false
      required:
        - title
        - status
        - scope
        - safe_refs
        - approval_refs
        - action_call_refs
        - provider_request_ids
        - partial_failures
        - retry_guidance
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        status:
          type: string
          enum:
            - reviewed
            - applied
            - partial
            - blocked
            - failed
        scope:
          type: object
        safe_refs:
          type: array
          items:
            type: string
        approval_refs:
          type: array
          items:
            type: string
        action_call_refs:
          type: array
          items:
            type: string
        provider_request_ids:
          type: array
          items:
            type: string
        partial_failures:
          type: array
        retry_guidance:
          type: array
          items:
            type: string
        next_safe_actions:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
    ui_schema:
      table_columns:
        - title
        - status
        - updated_at
      summary_fields:
        - scope
        - next_safe_actions
      detail_sections:
        - title: Program
          fields:
            - title
            - status
            - scope
            - safe_refs
        - title: Approval And Evidence
          fields:
            - approval_refs
            - action_call_refs
            - provider_request_ids
            - partial_failures
            - retry_guidance
    config:
      schema_version: stackos.resource.v1
      record_kind: marketing-program
      agent_guidance: Keep one compact durable index per program run. Store only safe refs, approval and action evidence, partial state, and next actions; never store subscriber addresses, raw HubSpot ids, or bulky provider payloads.
  - key: crm-export
    name: CRM Export
    description: Bounded export plan, safe async job and artifact refs, retention disposition, and provider-safe execution evidence.
    schema:
      type: object
      additionalProperties: false
      required:
        - title
        - status
        - purpose
        - object_type
        - action_call_refs
        - provider_request_ids
        - retention_disposition
        - retry_guidance
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        status:
          type: string
          enum:
            - not-started
            - pending
            - complete
            - partial
            - blocked
            - failed
        purpose:
          type: string
          minLength: 1
          maxLength: 2000
        object_type:
          type: string
          enum:
            - contacts
            - companies
            - deals
            - leads
            - products
            - line_items
        job_ref:
          type: string
          pattern: '^provider-object:'
        artifact_ref:
          type: string
          pattern: '^/generated-assets/'
        action_call_refs:
          type: array
          items:
            type: string
        provider_request_ids:
          type: array
          items:
            type: string
        record_count:
          type: integer
          minimum: 0
        partial_failures:
          type: array
        retry_guidance:
          type: array
          items:
            type: string
        retention_disposition:
          type: object
        next_safe_action:
          type: string
        updated_at:
          type: string
          format: date-time
    ui_schema:
      table_columns:
        - title
        - status
        - object_type
        - updated_at
      summary_fields:
        - purpose
        - artifact_ref
        - next_safe_action
      detail_sections:
        - title: Export
          fields:
            - title
            - status
            - purpose
            - object_type
            - job_ref
            - artifact_ref
            - record_count
        - title: Evidence And Retention
          fields:
            - action_call_refs
            - provider_request_ids
            - partial_failures
            - retry_guidance
            - retention_disposition
    config:
      schema_version: stackos.resource.v1
      record_kind: crm-export
      agent_guidance: Keep one compact index per export intent. Store safe job and generated-asset refs, action evidence, retention, and repair state; never store signed download URLs, raw HubSpot ids, or exported customer rows.
ui:
  nav:
    section: GTM
    items:
      - key: gtm.resources
        label: Data
        to: resources?plugin_slug=gtm
        matchPrefix: true
      - key: gtm.templates
        label: Workflows
        to: workflow-templates?plugin_slug=gtm
config:
  schema_version: stackos.plugin.v1
  provider_connectors:
    status: provider-specific
    executable:
      - hubspot
      - salesforce
      - apollo
      - pipedrive
      - clay
      - outreach
      - salesloft
      - google-workspace
      - microsoft-365
    deferred:
      - clearbit-by-hubspot
      - custom-gtm-tool
