  - key: hubspot.automation.workflow_actions.register
    name: Register HubSpot Custom Workflow Action
    description: App-level custom workflow action definition contract; inbound execution can create an allowlisted StackOS agent request but never starts a workflow directly.
    provider: hubspot
    capability: automation
    risk_level: high
    input_schema:
      type: object
      additionalProperties: false
      required:
        - app_ref
        - action_key
        - object_types
      properties:
        app_ref:
          type: string
          pattern: "^provider-object:"
        action_key:
          type: string
          minLength: 1
          maxLength: 200
        object_types:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [CONTACT, COMPANY, DEAL]
        input_fields:
          type: array
          maxItems: 50
          items:
            type: object
            additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      execution_mode: deferred-app-configuration
      deferred_reason: Registration and publication alter the HubSpot developer app globally. StackOS accepts only manually registered definition IDs explicitly allowlisted on the connection in this phase.
      readiness_group: automation
      provider_authority: hubspot-developer-app
      required_scope_facts:
        - automation
      api_version: "2026-03"
      endpoint: /automation/actions/2026-03/{appId}
      method: POST
      deployment_prerequisites:
        - public-https-action-url
        - app-client-secret
        - exact-definition-allowlist
      invocation_signature: v3
      invocation_response:
        outputFields:
          hs_execution_state: SUCCESS-or-FAIL_CONTINUE
      response_contract: deferred-no-provider-call
