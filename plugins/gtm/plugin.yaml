      direct_use: explicit-provider-escape-hatch
      template_contract: provider-verified-transactional-email-ref
      contact_properties: immutable-empty
      marketing_contact_state: explicit-no-mutation
      response_contract: safe-transactional-send-v1
      async_response: true
      idempotency_policy: stackos-key-and-provider-send-id-required
      confirmation_policy: explicit-transactional-legal-and-recipient-eligibility
