  - key: hubspot.transactional.single_email.send
    name: Send One HubSpot Transactional Email
    description: Lower-level provider escape hatch for one approved transactional template send; normal delivery uses communication.send.
    provider: hubspot
    capability: outbound-operations
    risk_level: high
    input_schema: &hubspot_transactional_email_send_input
      type: object
      additionalProperties: false
      required:
        - contact_ref
        - email_ref
        - send_id
        - custom_properties
        - entitlement_confirmed
        - transactional_use_confirmed
        - consent_or_relationship_confirmed
        - legal_basis
        - legal_basis_explanation
        - marketing_contact_state
      properties:
        contact_ref:
          type: string
          pattern: "^provider-object:"
        email_ref:
          type: string
          pattern: "^provider-object:"
        send_id:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[A-Za-z0-9._:-]+$'
        custom_properties:
          type: object
          maxProperties: 100
          propertyNames:
            minLength: 1
            maxLength: 200
          additionalProperties:
            anyOf:
              - {type: string}
              - {type: integer}
              - {type: number}
              - {type: boolean}
        entitlement_confirmed:
          type: boolean
          const: true
        transactional_use_confirmed:
          type: boolean
          const: true
        consent_or_relationship_confirmed:
          type: boolean
          const: true
        legal_basis:
          type: string
          minLength: 1
          maxLength: 200
        legal_basis_explanation:
          type: string
          minLength: 1
          maxLength: 2000
        marketing_contact_state:
          type: string
          enum:
            - marketing
            - non-marketing
        communication_target_ref:
          type: string
          pattern: "^communication-target:"
        profile_ref:
          type: string
          pattern: "^communication-profile:"
        source_agent_request_id:
          type: integer
          minimum: 1
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: hubspot
      operation: transactional.single_email.send
      requires_credential: true
      required_scopes:
        - crm.objects.contacts.read
        - transactional-email
      readiness_group: transactional-communications
      entitlement: Marketing Hub Professional or Enterprise plus Transactional Email add-on
      api_version: "2026-03"
      endpoint: /marketing/transactional/2026-03/single-email/send
