      endpoint: /marketing/emails/2026-03
      method: POST
      lifecycle_boundary: draft-only-no-recipients-no-publish
      response_contract: safe-provider-refs-v1
      idempotency_policy: caller-required-for-safe-retry
      confirmation_policy: workflow-grant-or-direct-operator-intent
