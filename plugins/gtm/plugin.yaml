  - key: hubspot.crm.contacts.search
    name: Search HubSpot Contacts
    description: Search contacts with typed property refs and bounded filters, sorting, and paging.
    provider: hubspot
    capability: crm-operations
    risk_level: read
    input_schema: &hubspot_record_search_input
      type: object
      additionalProperties: false
      properties:
        query:
          type: string
          maxLength: 3000
        filter_groups:
          type: array
          maxItems: 5
          items:
            type: object
            additionalProperties: false
            required:
              - filters
            properties:
              filters:
                type: array
                minItems: 1
                maxItems: 6
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - property_ref
                    - operator
                  properties:
                    property_ref:
                      type: string
                      pattern: "^provider-object:"
                    operator:
                      type: string
                      enum:
                        - LT
                        - LTE
                        - GT
                        - GTE
                        - EQ
                        - NEQ
                        - BETWEEN
                        - IN
                        - NOT_IN
                        - HAS_PROPERTY
                        - NOT_HAS_PROPERTY
                        - CONTAINS_TOKEN
                        - NOT_CONTAINS_TOKEN
                    value:
                      type: string
                    high_value:
                      type: string
                    values:
                      type: array
                      minItems: 1
                      maxItems: 100
                      items:
                        type: string
        sort:
          type: object
          additionalProperties: false
          required:
            - property_ref
            - direction
          properties:
            property_ref:
              type: string
              pattern: "^provider-object:"
            direction:
              type: string
              enum:
                - ASCENDING
                - DESCENDING
        property_refs:
          type: array
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            pattern: "^provider-object:"
        after:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 200
    output_schema: &object_schema
      type: object
      additionalProperties: true
    config:
      schema_version: stackos.action.v1
      connector: hubspot
      operation: crm.contacts.search
      requires_credential: true
      required_scopes:
        - crm.objects.contacts.read
      readiness_group: crm-core
      api_version: "2026-03"
      endpoint: /crm/objects/2026-03/contacts/search
