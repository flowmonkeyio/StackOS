    name: Create HubSpot Marketing Email Draft
    description: Create a draft marketing-email asset from a safe template ref or validated stable template path; no recipients or publish state are accepted.
    provider: hubspot
    capability: lead-management
    risk_level: write
    input_schema: &hubspot_email_create_input
      type: object
      additionalProperties: false
      required:
        - name
        - subject
      oneOf:
        - required: [template_ref]
          not:
            required: [template_path]
        - required: [template_path]
          not:
            required: [template_ref]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        subject:
          type: string
          minLength: 1
          maxLength: 998
        template_ref:
          type: string
          pattern: "^provider-object:"
        template_path:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '^(?!/)(?!.*(?:^|/)\.\.(?:/|$))(?!.*://).+\.html$'
        campaign_ref:
          type: string
          pattern: "^provider-object:"
        brand_ref:
          type: string
          pattern: "^provider-object:"
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: hubspot
      operation: marketing.emails.create
      requires_credential: true
      required_scopes:
        - marketing-email
      readiness_group: marketing
