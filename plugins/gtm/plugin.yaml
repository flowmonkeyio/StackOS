          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      execution_mode: project-local-http
      deferred_reason: Built-in custom GTM tool actions require project-local static HTTP connector config.
  - key: custom_gtm.enrichment.run
    name: Run Enrichment Through Custom GTM Tool
    description: Contract for user-owned enrichment tooling exposed through project-local static HTTP actions.
    provider: custom-gtm-tool
    capability: enrichment
    risk_level: cost
    input_schema: *custom_gtm_tool_request_input
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
