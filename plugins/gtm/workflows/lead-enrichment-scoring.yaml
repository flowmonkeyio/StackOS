schema_version: stackos.workflow-template.v1
key: gtm.lead-enrichment-scoring
name: GTM Lead Enrichment And Scoring
version: 0.1.0
description: Reusable template for enriching and scoring leads from bounded records, project learnings, and explicit provider contracts.
domain: gtm
owner:
  team: StackOS
experience:
  problem: "Lead scoring becomes untrustworthy when enrichment sources, missing values, and scoring assumptions are hidden."
  outcome: "A source-linked enrichment and scoring result with confidence, disqualification reasons, and no silent field invention."
  operator_path:
    - "Provide the lead set, ideal-customer criteria, and scoring policy."
    - "Choose approved enrichment sources and how missing data should be treated."
    - "Review threshold or policy changes before they affect routing."
  agent_path:
    - "Validate lead identity and existing fields before enrichment."
    - "Use approved sources, preserve provenance, and distinguish missing from negative evidence."
    - "Apply the explicit scoring policy and store reasons, confidence, and follow-up."
  progress_signals:
    - "Lead scope validated"
    - "Enrichment complete"
    - "Scores explained"
    - "Exceptions ready for review"
  recovery:
    - "Do not merge ambiguous people or companies."
    - "If a provider is unavailable, score only where the policy permits missing data and flag the rest."
  safe_stopping_points:
    - "Stop with enriched records and proposed scores when routing was not authorized."
  handoffs:
    - workflow_key: gtm.outbound-sequence-preparation
      relationship: conditional
      when: "Leads meet the reviewed qualification threshold and outreach is approved."
public:
  audience: "Growth and sales teams enriching and prioritizing leads"
  setup: mixed
  prerequisites:
    - "A bounded lead set"
    - "Ideal-customer and scoring criteria"
    - "Approved sources and missing-data policy"
  proof:
    - "Field-level source provenance"
    - "Score reasons and confidence"
    - "Disqualification and exception report"
  featured: false
when_to_use:
  - A lead or account list needs enrichment, qualification, or scoring before CRM or outbound work.
when_not_to_use:
  - Leads are already enriched, reviewed, and ready for CRM or sequence actions.
agent_requirements:
  - role: gtm-lead-enrichment-scoring
    requirement: required
    agent_preset_ref: gtm.workflow.lead-enrichment-scoring
    purpose: Enrich and score leads with field-level confidence, source context, and CRM-schema awareness.
    applies_to_steps:
      - orient
      - run_enrichment
      - score_and_store
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review PII, scoring policy, CRM update, and provider-contract safety before writes.
    applies_to_steps:
      - score_and_store
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: lead_refs
    name: Lead Refs
    type: array
    required: false
  - key: scoring_policy
    name: Scoring Policy
    type: object
    required: false
  - key: enrichment_fields
    name: Enrichment Fields
    type: array
    required: false
context_requirements:
  - id: lead_context
    source: resources
    purpose: Retrieve lead, contact, company, account, and enrichment records before requesting more data.
    filters:
      plugin_slug: gtm
      resource_keys:
        - lead
        - contact
        - company
        - account
        - enrichment-record
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 30
    return_mode: compact
  - id: scoring_learnings
    source: learnings
    purpose: Pull accepted lead-quality and enrichment lessons.
    filters:
      tags:
        - gtm
        - lead-quality
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
capability_requirements:
  - key: enrichment
    required: true
    preferred_providers:
      - apollo
      - clay
      - clearbit-by-hubspot
      - custom-gtm-tool
  - key: lead-management
    required: true
auth_requirements:
  - key: apollo
    provider: apollo
    auth_type: api-key
    optional: true
  - key: clay
    provider: clay
    auth_type: webhook
    optional: true
  - key: clearbit_by_hubspot
    provider: clearbit-by-hubspot
    auth_type: api-key
    optional: true
action_contracts:
  - key: apollo_people_enrich
    action: apollo.people.enrich
    capability: enrichment
    provider: apollo
    risk_level: cost
    auth_ref: apollo
    route_group: enrichment_provider
    route_key: apollo
    approval_ref: cost_review
  - key: apollo_people_bulk_enrich
    action: apollo.people.bulk_enrich
    capability: enrichment
    provider: apollo
    risk_level: cost
    auth_ref: apollo
    route_group: enrichment_provider
    route_key: apollo
    approval_ref: cost_review
  - key: apollo_organization_enrich
    action: apollo.organization.enrich
    capability: enrichment
    provider: apollo
    risk_level: cost
    auth_ref: apollo
    route_group: enrichment_provider
    route_key: apollo
    approval_ref: cost_review
  - key: apollo_organization_bulk_enrich
    action: apollo.organization.bulk_enrich
    capability: enrichment
    provider: apollo
    risk_level: cost
    auth_ref: apollo
    route_group: enrichment_provider
    route_key: apollo
    approval_ref: cost_review
  - key: clay_table_webhook_submit
    action: clay.table.webhook.submit
    capability: enrichment
    provider: clay
    risk_level: cost
    auth_ref: clay
    route_group: enrichment_provider
    route_key: clay
    approval_ref: cost_review
  - key: clay_workflow_result_ingest
    action: clay.workflow.result.ingest
    capability: enrichment
    provider: clay
    risk_level: write
    auth_ref: clay
    route_group: enrichment_provider
    route_key: clay
    approval_ref: cost_review
  - key: clearbit_by_hubspot_enrichment
    action: clearbit-by-hubspot.enrichment.run
    capability: enrichment
    provider: clearbit-by-hubspot
    risk_level: cost
    auth_ref: clearbit_by_hubspot
    route_group: enrichment_provider
    route_key: clearbit_by_hubspot
    approval_ref: cost_review
  - key: custom_gtm_enrichment
    action: custom_gtm.enrichment.run
    capability: enrichment
    provider: custom-gtm-tool
    route_group: enrichment_provider
    route_key: custom_gtm_tool
    risk_level: cost
    approval_ref: cost_review
resource_contracts:
  - key: leads
    resource: lead
    purpose: Store reviewed leads, scores, qualification notes, and source refs.
  - key: contacts
    resource: contact
    purpose: Store contact attributes and safe CRM/source refs.
  - key: companies
    resource: company
    purpose: Store company attributes and firmographic evidence.
  - key: enrichment_records
    resource: enrichment-record
    purpose: Store enrichment results, confidence, source, and fields updated.
policies:
  - key: no_secret_exposure
    kind: auth
    description: Enrichment credentials remain daemon-side.
  - key: scoring_is_agent_owned
    kind: boundary
    description: StackOS stores enrichment and scoring records; the agent defines scoring rationale and review notes.
approval_gates:
  - key: cost_review
    description: Review expected enrichment cost before provider calls.
    required_when: estimated_cost_above_project_threshold
steps:
  - id: orient
    title: Orient From Lead Context
    purpose: Read existing lead records, enrichment state, scoring policy, and prior lessons.
    input_refs:
      - goal
      - lead_refs
      - scoring_policy
      - enrichment_fields
    context_refs:
      - lead_context
      - scoring_learnings
    policy_refs:
      - scoring_is_agent_owned
    output_refs:
      - enrichment_plan
  - id: run_enrichment
    title: Run Enrichment
    purpose: Execute only the provider enrichment actions granted by the concrete run plan.
    action_refs:
      - apollo_people_enrich
      - apollo_people_bulk_enrich
      - apollo_organization_enrich
      - apollo_organization_bulk_enrich
      - clay_table_webhook_submit
      - clay_workflow_result_ingest
      - clearbit_by_hubspot_enrichment
      - custom_gtm_enrichment
    policy_refs:
      - no_secret_exposure
    approval_refs:
      - cost_review
    depends_on:
      - orient
    output_refs:
      - enrichment_summary
  - id: score_and_store
    title: Score And Store
    purpose: Persist enrichment records, lead scores, qualification notes, and provenance.
    resource_refs:
      - leads
      - contacts
      - companies
      - enrichment_records
    depends_on:
      - run_enrichment
    output_refs:
      - scored_leads
outputs:
  - key: enrichment_plan
    name: Enrichment Plan
    type: object
    required: true
    description: Lead scope, selected enrichment route, allowed fields, scoring model, and cost/write boundary.
    schema:
      type: object
      required: [lead_scope, selected_route, allowed_fields, scoring_model, cost_boundary, write_mode]
      properties:
        lead_scope: {type: object}
        selected_route: {type: string}
        allowed_fields: {type: array}
        scoring_model: {type: object}
        cost_boundary: {type: object}
        write_mode: {type: string, enum: [review_only, prepare, apply]}
  - key: enrichment_summary
    name: Enrichment Summary
    type: object
    required: true
    description: Coverage, source confidence, unresolved fields, provider usage, and errors.
    schema:
      type: object
      required: [leads_reviewed, leads_enriched, coverage, unresolved_fields, conflicts, receipt_refs]
      properties:
        leads_reviewed: {type: integer, minimum: 0}
        leads_enriched: {type: integer, minimum: 0}
        coverage: {type: object}
        unresolved_fields: {type: array}
        conflicts: {type: array}
        receipt_refs: {type: array, items: {type: string}}
  - key: scored_leads
    name: Scored Leads
    type: object
    required: true
    description: Scored lead set with explainable components, confidence, evidence, and recommended action.
    schema:
      type: object
      required: [scoring_model, leads, distribution, excluded_leads]
      properties:
        scoring_model: {type: object}
        leads:
          type: array
          items:
            type: object
            required: [lead_ref, score, confidence, components, evidence_refs, recommended_action]
            properties:
              lead_ref: {type: string}
              score: {type: number}
              confidence: {type: string, enum: [low, medium, high]}
              components: {type: object}
              evidence_refs: {type: array, items: {type: string}}
              recommended_action: {type: string}
        distribution: {type: object}
        excluded_leads: {type: array}
learning_hooks:
  - key: lead_quality_learning
    prompt: Capture reusable lead quality lessons only with evidence and provenance.
    tags:
      - gtm
      - lead-quality
failure_handling:
  - If enrichment providers are unavailable, score from stored fields and list missing attributes.
metadata:
  builtin: true
  run_mode: stackos_run_plan
