schema_version: stackos.workflow-template.v1
key: gtm.crm-hygiene-pass
name: GTM CRM Hygiene Pass
version: 0.2.0
description: Reusable template for reviewing CRM records, identifying hygiene issues, and optionally applying approved CRM updates.
domain: gtm
owner:
  team: StackOS
experience:
  problem: "Incomplete, duplicated, or inconsistent CRM records make reporting and follow-up unreliable, but broad cleanup can damage good data."
  outcome: "A reviewed hygiene report with narrowly approved corrections and an audit of every changed record."
  operator_path:
    - "Choose the CRM scope and hygiene rules."
    - "Set fields that may be changed automatically and fields that require review."
    - "Approve the proposed correction set before any provider write."
  agent_path:
    - "Inspect the bounded record set and identify issues without mutating it."
    - "Group duplicates, missing fields, stale values, and policy conflicts with evidence."
    - "Apply only approved corrections and verify the provider result."
  progress_signals:
    - "Scope loaded"
    - "Issues classified"
    - "Correction set ready"
    - "Approval recorded"
    - "Changes verified"
  recovery:
    - "On ambiguous identity or field authority, leave the record unchanged."
    - "On partial provider failure, reconcile receipts before retrying remaining records."
  safe_stopping_points:
    - "Stop with a read-only hygiene report when mutation is not authorized."
public:
  audience: "Revenue operations teams maintaining CRM quality"
  setup: connection-required
  prerequisites:
    - "A connected CRM or approved record export"
    - "A bounded record scope"
    - "Field ownership, duplicate, and mutation rules"
  proof:
    - "Issue inventory"
    - "Reviewed correction set"
    - "Per-record provider receipts and verification"
  featured: false
when_to_use:
  - CRM records need cleanup, deduping notes, field updates, or task creation.
when_not_to_use:
  - A trusted import or migration process already owns the cleanup.
agent_requirements:
  - role: gtm-crm-hygiene
    requirement: required
    agent_preset_ref: gtm.workflow.crm-hygiene-pass
    purpose: Prepare atomic CRM hygiene changes with field-level evidence and review gates.
    applies_to_steps:
      - orient
      - prepare_cleanup
      - optional_apply_cleanup
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review duplicate handling, data-loss risk, provider writes, and security boundaries.
    applies_to_steps:
      - prepare_cleanup
      - optional_apply_cleanup
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: crm_scope
    name: CRM Scope
    type: object
    required: false
  - key: hygiene_policy
    name: Hygiene Policy
    type: object
    required: false
  - key: write_batch_key
    name: Write Batch Key
    description: Stable non-secret key required when approved CRM writes are executed so retries reuse the same intended mutation identity.
    type: string
    required: false
    schema:
      type: string
      minLength: 3
      maxLength: 160
      pattern: '^[A-Za-z0-9._:-]+$'
context_requirements:
  - id: crm_records
    source: resources
    purpose: Retrieve CRM-adjacent records and prior enrichment before deciding cleanup work.
    filters:
      plugin_slug: gtm
      resource_keys:
        - account
        - company
        - contact
        - lead
        - task
        - enrichment-record
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 30
    return_mode: compact
  - id: hygiene_learnings
    source: learnings
    purpose: Pull reusable CRM hygiene lessons and known field conventions.
    filters:
      tags:
        - gtm
        - crm-hygiene
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
capability_requirements:
  - key: crm-operations
    required: true
    preferred_providers:
      - hubspot
      - salesforce
auth_requirements:
  - key: hubspot
    provider: hubspot
    auth_type: oauth
    optional: true
  - key: salesforce
    provider: salesforce
    auth_type: oauth
    optional: true
action_contracts:
  - key: hubspot_companies_batch_upsert
    action: hubspot.crm.companies.batch_upsert
    capability: crm-operations
    provider: hubspot
    risk_level: write
    auth_ref: hubspot
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: hubspot
  - key: hubspot_contacts_batch_upsert
    action: hubspot.crm.contacts.batch_upsert
    capability: crm-operations
    provider: hubspot
    risk_level: write
    auth_ref: hubspot
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: hubspot
  - key: hubspot_note_create
    action: hubspot.crm.notes.create
    capability: crm-operations
    provider: hubspot
    risk_level: write
    auth_ref: hubspot
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: hubspot
  - key: hubspot_task_create
    action: hubspot.crm.tasks.create
    capability: crm-operations
    provider: hubspot
    risk_level: write
    auth_ref: hubspot
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: hubspot
  - key: salesforce_account_upsert_by_external_id
    action: salesforce.account.upsert_by_external_id
    capability: crm-operations
    provider: salesforce
    risk_level: write
    auth_ref: salesforce
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: salesforce
  - key: salesforce_contact_upsert_by_external_id
    action: salesforce.contact.upsert_by_external_id
    capability: crm-operations
    provider: salesforce
    risk_level: write
    auth_ref: salesforce
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: salesforce
  - key: salesforce_task_create
    action: salesforce.task.create
    capability: crm-operations
    provider: salesforce
    risk_level: write
    auth_ref: salesforce
    approval_ref: crm_update_review
    optional: true
    route_group: crm_update
    route_key: salesforce
resource_contracts:
  - key: accounts
    resource: account
    purpose: Store cleaned account records and review notes.
  - key: companies
    resource: company
    purpose: Store cleaned company records and mapping notes.
  - key: contacts
    resource: contact
    purpose: Store cleaned contact records and consent/status notes.
  - key: leads
    resource: lead
    purpose: Store lead cleanup notes and qualification state.
  - key: tasks
    resource: task
    purpose: Store follow-up tasks created or recommended by the pass.
policies:
  - key: review_before_crm_mutation
    kind: approval
    description: CRM writes require review of fields, provenance, and expected side effects.
  - key: no_secret_exposure
    kind: auth
    description: CRM credentials stay daemon-side.
  - key: idempotent_crm_writes
    kind: safety
    description: Every applied provider mutation uses the stable write batch key and reconciles existing action-call evidence before retry.
  - key: provider_safe_evidence
    kind: evidence
    description: Closeout preserves StackOS action-call refs, provider request ids, partial failures, and retry guidance without raw provider object ids.
approval_gates:
  - key: crm_update_review
    description: Review CRM updates before any external write.
    required_when: external_write
steps:
  - id: orient
    title: Orient From CRM Context
    purpose: Read scope, policy, stored records, and prior hygiene lessons.
    input_refs:
      - goal
      - crm_scope
      - hygiene_policy
      - write_batch_key
    context_refs:
      - crm_records
      - hygiene_learnings
    output_refs:
      - hygiene_plan
    instructions:
      - Bound the record set and field allowlist before proposing any write.
      - Treat write_batch_key as required only when write_mode is apply; never fabricate one during a read-only review.
    success_criteria:
      - The scope, field authority, duplicate policy, route, and write boundary are explicit.
  - id: prepare_cleanup
    title: Prepare Cleanup
    purpose: Identify field updates, notes, tasks, duplicates, and records requiring human review.
    resource_refs:
      - accounts
      - companies
      - contacts
      - leads
      - tasks
    depends_on:
      - orient
    output_refs:
      - hygiene_plan
    instructions:
      - Use provider-object refs and field-level patches; never place raw HubSpot ids in the plan.
      - Separate conflicts and ambiguous identities from the executable correction set.
    success_criteria:
      - Every proposed correction has provenance, expected effect, and a safe record ref.
  - id: optional_apply_cleanup
    title: Optional Apply Cleanup
    purpose: Execute approved CRM write actions only when granted by the concrete run plan.
    action_refs:
      - hubspot_companies_batch_upsert
      - hubspot_contacts_batch_upsert
      - hubspot_note_create
      - hubspot_task_create
      - salesforce_account_upsert_by_external_id
      - salesforce_contact_upsert_by_external_id
      - salesforce_task_create
    policy_refs:
      - review_before_crm_mutation
      - no_secret_exposure
      - idempotent_crm_writes
      - provider_safe_evidence
    approval_refs:
      - crm_update_review
    depends_on:
      - prepare_cleanup
    output_refs:
      - hygiene_summary
    instructions:
      - Require a recorded approval and non-empty write_batch_key before the first external write.
      - Derive stable per-action idempotency keys from write_batch_key and the intended record/field patch.
      - Inspect prior action-call evidence before retrying and retry only unresolved records after a partial result.
    success_criteria:
      - Applied, skipped, partial, failed, and replayed writes are distinguishable with provider-safe evidence.
outputs:
  - key: hygiene_plan
    name: Hygiene Plan
    type: object
    required: true
    description: CRM scope, selected provider route, field rules, duplicate policy, and write boundary.
    schema:
      type: object
      required: [scope, selected_route, field_rules, duplicate_policy, write_mode, approval_required]
      properties:
        scope: {type: object}
        selected_route: {type: string}
        field_rules: {type: array}
        duplicate_policy: {type: object}
        write_mode: {type: string, enum: [review_only, dry_run, apply]}
        approval_required: {type: boolean}
  - key: hygiene_summary
    name: Hygiene Summary
    type: object
    required: true
    description: Reviewed records, proposed or applied changes, conflicts, skips, errors, and provider receipts.
    schema:
      type: object
      required: [records_reviewed, changes, conflicts, skipped, errors, write_status, receipt_refs, action_call_refs, provider_request_ids, partial_failures, retry_guidance]
      properties:
        records_reviewed: {type: integer, minimum: 0}
        changes: {type: array}
        conflicts: {type: array}
        skipped: {type: array}
        errors: {type: array}
        write_status: {type: string, enum: [not_requested, prepared, applied, partial, blocked, failed]}
        receipt_refs: {type: array, items: {type: string}}
        action_call_refs: {type: array, items: {type: string}}
        provider_request_ids: {type: array, items: {type: string}}
        partial_failures: {type: array}
        retry_guidance: {type: array, items: {type: string}}
learning_hooks:
  - key: crm_hygiene_learning
    prompt: Capture reusable CRM hygiene lessons only with explicit field evidence and provenance.
    tags:
      - gtm
      - crm-hygiene
failure_handling:
  - If approval is missing, store the hygiene plan without changing CRM state.
metadata:
  builtin: true
  run_mode: stackos_run_plan
