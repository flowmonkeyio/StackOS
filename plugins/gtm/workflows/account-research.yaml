schema_version: stackos.workflow-template.v1
key: gtm.account-research
name: GTM Account Research
version: 0.1.0
description: Reusable template for researching target accounts from bounded project context, stored GTM records, and optional web retrieval.
domain: gtm
owner:
  team: StackOS
experience:
  problem: "Account research often becomes a generic company summary that does not help someone make a real go-to-market decision."
  outcome: "A source-linked account brief focused on fit, timing, risks, and the next useful action."
  why_ai: "AI can combine stored account context with bounded current research while preserving source and confidence distinctions."
  operator_path:
    - "Name the account, offer, audience, and decision the brief should support."
    - "Choose approved internal and web sources."
    - "Review uncertain findings before they become outreach claims."
  agent_path:
    - "Load existing account and project context before external research."
    - "Research only the missing decision-relevant facts and retain source refs."
    - "Separate observations, inferences, gaps, and recommended next actions."
  progress_signals:
    - "Decision scoped"
    - "Existing context reviewed"
    - "Research gaps filled"
    - "Account brief ready"
  recovery:
    - "If entity identity is ambiguous, stop before merging sources."
    - "If live research is unavailable, return a useful stored-context brief with explicit gaps."
  safe_stopping_points:
    - "Stop after the research brief; outreach requires a separate workflow and approval."
  handoffs:
    - workflow_key: gtm.outbound-sequence-preparation
      relationship: conditional
      when: "The account is qualified and approved for outreach."
public:
  audience: "Sales and go-to-market teams researching target accounts"
  setup: mixed
  prerequisites:
    - "A named account and decision to support"
    - "Offer and fit criteria"
    - "Approved internal and external research sources"
  proof:
    - "Source-linked findings"
    - "Fit and risk assessment"
    - "Open questions and recommended next action"
  featured: false
when_to_use:
  - A project needs account or company research before enrichment, outbound, CRM updates, or pipeline review.
  - The agent should reuse prior account context and learnings before collecting more evidence.
when_not_to_use:
  - The target account set and reviewed context already exist.
agent_requirements:
  - role: gtm-account-research
    requirement: required
    agent_preset_ref: gtm.workflow.account-research
    purpose: Produce source-backed account research, ICP fit, risks, and next workflow handoff.
    applies_to_steps:
      - orient
      - collect_evidence
      - store_research
      - capture_learning
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review privacy, source confidence, and handoff quality when research drives external action.
    applies_to_steps:
      - store_research
      - capture_learning
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: account_refs
    name: Account Refs
    type: array
    required: false
  - key: company_domains
    name: Company Domains
    type: array
    required: false
  - key: research_angle
    name: Research Angle
    type: string
    required: false
context_requirements:
  - id: recent_gtm_records
    source: resources
    purpose: Reuse prior account, company, contact, lead, and touchpoint records.
    filters:
      plugin_slug: gtm
      resource_keys:
        - account
        - company
        - contact
        - lead
        - touchpoint
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 25
    return_mode: compact
  - id: accepted_gtm_learnings
    source: learnings
    purpose: Pull durable go-to-market lessons with evidence and provenance.
    filters:
      tags:
        - gtm
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
  - id: recent_decisions
    source: decisions
    purpose: Read prior account selection or messaging decisions that constrain research.
    filters:
      tags:
        - gtm
    fields:
      - title
      - decision
      - rationale
      - status
      - tags
    max_items: 10
    return_mode: compact
capability_requirements:
  - key: account-research
    required: true
  - key: web-retrieval
    required: false
    preferred_providers:
      - jina
      - firecrawl
auth_requirements:
  - key: jina
    provider: jina
    auth_type: api-key
    optional: true
  - key: firecrawl
    provider: firecrawl
    auth_type: api-key
    optional: true
action_contracts:
  - key: web_read
    action: web.read
    capability: web-retrieval
    provider: jina
    risk_level: read
    auth_ref: jina
    route_group: research_source
    route_key: jina
  - key: web_scrape
    action: web.scrape
    capability: web-retrieval
    provider: firecrawl
    risk_level: read
    auth_ref: firecrawl
    approval_ref: cost_review
    route_group: research_source
    route_key: firecrawl
resource_contracts:
  - key: accounts
    resource: account
    purpose: Store target account records, safe refs, and account research notes.
  - key: companies
    resource: company
    purpose: Store company profile evidence, firmographics, and provenance.
  - key: contacts
    resource: contact
    purpose: Store contact context discovered during account research.
  - key: web_documents
    resource: web-document
    purpose: Store retrieved source document refs when web retrieval is granted.
policies:
  - key: no_secret_exposure
    kind: auth
    description: Provider credentials stay daemon-side; agents see only provider keys and credential refs.
  - key: agent_decides_research_angle
    kind: boundary
    description: StackOS retrieves and stores evidence; the agent chooses research direction and interpretation.
approval_gates:
  - key: cost_review
    description: Review expected provider cost before high-volume retrieval.
    required_when: estimated_cost_above_project_threshold
steps:
  - id: orient
    title: Orient From Account History
    purpose: Read existing records, learnings, decisions, and the current research goal.
    input_refs:
      - goal
      - account_refs
      - company_domains
      - research_angle
    context_refs:
      - recent_gtm_records
      - accepted_gtm_learnings
      - recent_decisions
    policy_refs:
      - agent_decides_research_angle
    output_refs:
      - research_plan
  - id: collect_evidence
    title: Collect Evidence
    purpose: Use granted retrieval actions only for evidence gaps the agent identifies.
    action_refs:
      - web_read
      - web_scrape
    resource_refs:
      - web_documents
    policy_refs:
      - no_secret_exposure
    approval_refs:
      - cost_review
    depends_on:
      - orient
    output_refs:
      - evidence_summary
  - id: store_research
    title: Store Research
    purpose: Persist reviewed account, company, and contact context with provenance.
    resource_refs:
      - accounts
      - companies
      - contacts
      - web_documents
    depends_on:
      - collect_evidence
    output_refs:
      - account_research_summary
  - id: capture_learning
    title: Capture Learning
    purpose: Record reusable GTM lessons only when evidence is explicit.
    context_refs:
      - accepted_gtm_learnings
    depends_on:
      - store_research
outputs:
  - key: research_plan
    name: Research Plan
    type: object
    required: true
    description: Target account, approved research routes, questions, limits, and evidence standard.
    schema:
      type: object
      required: [account_ref, research_questions, selected_route, source_policy, stop_conditions]
      properties:
        account_ref: {type: string}
        research_questions: {type: array}
        selected_route: {type: string}
        source_policy: {type: object}
        stop_conditions: {type: array}
  - key: evidence_summary
    name: Evidence Summary
    type: object
    required: true
    description: Source-linked facts, signals, conflicts, inferences, and unresolved gaps.
    schema:
      type: object
      required: [verified_facts, buying_signals, conflicts, inferences, gaps, source_refs]
      properties:
        verified_facts: {type: array}
        buying_signals: {type: array}
        conflicts: {type: array}
        inferences: {type: array}
        gaps: {type: array}
        source_refs: {type: array, items: {type: string}}
  - key: account_research_summary
    name: Account Research Summary
    type: object
    required: true
    description: Compact account brief with fit, timing, stakeholders, hypotheses, and evidence confidence.
    schema:
      type: object
      required: [account_ref, firmographics, fit_assessment, timing_signals, stakeholder_hypotheses, outreach_hypotheses, confidence, evidence_refs]
      properties:
        account_ref: {type: string}
        firmographics: {type: object}
        fit_assessment: {type: object}
        timing_signals: {type: array}
        stakeholder_hypotheses: {type: array}
        outreach_hypotheses: {type: array}
        confidence: {type: string, enum: [low, medium, high]}
        evidence_refs: {type: array, items: {type: string}}
learning_hooks:
  - key: account_research_learning
    prompt: Capture reusable account research lessons with evidence and provenance.
    tags:
      - gtm
      - account-research
failure_handling:
  - If web retrieval is unavailable, work from stored records and list missing evidence.
metadata:
  builtin: true
  run_mode: stackos_run_plan
