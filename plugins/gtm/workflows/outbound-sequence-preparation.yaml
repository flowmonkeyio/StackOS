schema_version: stackos.workflow-template.v1
key: gtm.outbound-sequence-preparation
name: GTM Outbound Sequence Preparation
version: 0.1.0
description: Reusable template for preparing outbound sequences from reviewed leads, account context, approvals, and explicit sequence contracts.
domain: gtm
owner:
  team: StackOS
experience:
  problem: "Outbound messages become generic or risky when qualification, personalization evidence, compliance, and send authorization are collapsed into one drafting step."
  outcome: "A reviewed, project-voiced outreach sequence and send-readiness packet without sending it implicitly."
  why_ai: "AI can adapt a sequence across qualified accounts while keeping every personalization claim and compliance decision traceable."
  operator_path:
    - "Choose the qualified audience, offer, channel, and desired response."
    - "Set voice, claim, compliance, frequency, and exclusion rules."
    - "Review representative messages and approve send readiness separately."
  agent_path:
    - "Verify qualification and personalization evidence for each recipient."
    - "Draft within the project voice and channel contract without inventing familiarity."
    - "Run compliance and claim checks, then return a send-readiness packet."
  progress_signals:
    - "Audience verified"
    - "Personalization evidence linked"
    - "Sequence drafted"
    - "Compliance reviewed"
    - "Send-readiness packet complete"
  recovery:
    - "Disqualify or hold recipients with insufficient evidence rather than filling gaps."
    - "Keep the packet staged when a target, route, or send approval is missing."
  safe_stopping_points:
    - "This workflow stops at send readiness; delivery requires explicit authorization."
public:
  audience: "Go-to-market teams preparing evidence-based outreach"
  setup: project-adapter-required
  prerequisites:
    - "A qualified recipient set"
    - "Project voice and approved offer claims"
    - "Compliance, exclusion, cadence, and channel rules"
  proof:
    - "Recipient qualification refs"
    - "Personalization evidence map"
    - "Compliance review"
    - "Approved send-readiness packet"
  featured: false
when_to_use:
  - A reviewed lead or account set should be prepared for Outreach, Salesloft, or user-owned sequence tooling.
when_not_to_use:
  - The sequence and prospect list are already approved and only need execution.
agent_requirements:
  - role: gtm-outbound-sequence
    requirement: required
    agent_preset_ref: gtm.workflow.outbound-sequence-preparation
    purpose: Prepare compliant, project-voiced outbound sequence drafts and send-readiness handoff.
    applies_to_steps:
      - orient
      - prepare_sequence
      - optional_sequence_add
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review privacy, suppression, content, and communication-send boundaries before outreach.
    applies_to_steps:
      - prepare_sequence
      - optional_sequence_add
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: lead_refs
    name: Lead Refs
    type: array
    required: false
  - key: messaging_brief
    name: Messaging Brief
    type: object
    required: false
  - key: send_policy
    name: Send Policy
    type: object
    required: false
context_requirements:
  - id: outbound_context
    source: resources
    purpose: Retrieve leads, contacts, companies, accounts, sequences, and touchpoints before preparing outreach.
    filters:
      plugin_slug: gtm
      resource_keys:
        - lead
        - contact
        - company
        - account
        - sequence
        - touchpoint
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 30
    return_mode: compact
  - id: outbound_learnings
    source: learnings
    purpose: Pull durable outbound and messaging lessons before sequence preparation.
    filters:
      tags:
        - gtm
        - outbound
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
capability_requirements:
  - key: outbound-operations
    required: true
    preferred_providers:
      - outreach
      - salesloft
      - google-workspace
      - microsoft-365
      - custom-gtm-tool
  - key: lead-management
    required: true
auth_requirements:
  - key: outreach
    provider: outreach
    auth_type: oauth
    optional: true
  - key: salesloft
    provider: salesloft
    auth_type: oauth-or-api-key
    optional: true
  - key: google_workspace
    provider: google-workspace
    auth_type: oauth
    optional: true
  - key: microsoft_365
    provider: microsoft-365
    auth_type: oauth
    optional: true
action_contracts:
  - key: outreach_sequence_state_create
    action: outreach.sequence_state.create
    capability: outbound-operations
    provider: outreach
    risk_level: write
    auth_ref: outreach
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: outreach
  - key: salesloft_cadence_membership_create
    action: salesloft.cadence_membership.create
    capability: outbound-operations
    provider: salesloft
    risk_level: write
    auth_ref: salesloft
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: salesloft
  - key: custom_gtm_sequence_add
    action: custom_gtm.sequence.add
    capability: outbound-operations
    provider: custom-gtm-tool
    risk_level: write
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: custom_gtm_tool
  - key: google_workspace_mail_send
    action: google-workspace.gmail.message.send
    capability: outbound-operations
    provider: google-workspace
    risk_level: write
    auth_ref: google_workspace
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: google_workspace
  - key: google_workspace_calendar_event_create
    action: google-workspace.calendar.event.create
    capability: outbound-operations
    provider: google-workspace
    risk_level: write
    auth_ref: google_workspace
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: google_workspace
  - key: microsoft_365_mail_send
    action: microsoft-365.graph.mail.send
    capability: outbound-operations
    provider: microsoft-365
    risk_level: write
    auth_ref: microsoft_365
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: microsoft_365
  - key: microsoft_365_calendar_event_create
    action: microsoft-365.graph.calendar.event.create
    capability: outbound-operations
    provider: microsoft-365
    risk_level: write
    auth_ref: microsoft_365
    approval_ref: sequence_review
    optional: true
    route_group: outbound_execution
    route_key: microsoft_365
resource_contracts:
  - key: sequences
    resource: sequence
    purpose: Store sequence plans, audience, copy refs, approval state, and provider refs.
  - key: leads
    resource: lead
    purpose: Store sequence readiness and disqualification notes.
  - key: touchpoints
    resource: touchpoint
    purpose: Store planned or recorded touchpoints and provenance.
policies:
  - key: no_secret_exposure
    kind: auth
    description: Sequence provider credentials stay daemon-side.
  - key: review_before_sequence_mutation
    kind: approval
    description: External sequence, mail, or calendar mutation requires review of audience, copy refs, and send policy.
  - key: agent_owns_messaging
    kind: boundary
    description: StackOS stores sequence records and executes approved actions; the agent defines messaging and fit rationale.
approval_gates:
  - key: sequence_review
    description: Review audience, messaging refs, send policy, and risk before external outbound mutation.
    required_when: external_write
steps:
  - id: orient
    title: Orient From Outbound Context
    purpose: Read lead context, prior sequences, touchpoints, send policy, and outbound lessons.
    input_refs:
      - goal
      - lead_refs
      - messaging_brief
      - send_policy
    context_refs:
      - outbound_context
      - outbound_learnings
    policy_refs:
      - agent_owns_messaging
    output_refs:
      - sequence_plan
  - id: prepare_sequence
    title: Prepare Sequence
    purpose: Prepare reviewed prospect groups, messaging refs, task needs, and approval notes.
    resource_refs:
      - sequences
      - leads
      - touchpoints
    depends_on:
      - orient
    output_refs:
      - sequence_plan
  - id: optional_sequence_add
    title: Optional Outbound Actions
    purpose: Execute approved provider sequence, mail, or calendar actions only when granted by the concrete run plan.
    action_refs:
      - outreach_sequence_state_create
      - salesloft_cadence_membership_create
      - custom_gtm_sequence_add
      - google_workspace_mail_send
      - google_workspace_calendar_event_create
      - microsoft_365_mail_send
      - microsoft_365_calendar_event_create
    policy_refs:
      - no_secret_exposure
      - review_before_sequence_mutation
    approval_refs:
      - sequence_review
    depends_on:
      - prepare_sequence
    output_refs:
      - sequence_summary
outputs:
  - key: sequence_plan
    name: Sequence Plan
    type: object
    required: true
    description: Audience, evidence, messaging, steps, selected provider route, approval, and execution boundary.
    schema:
      type: object
      required: [audience, evidence_refs, message_hypothesis, steps, selected_route, execution_mode, approval_required]
      properties:
        audience: {type: object}
        evidence_refs: {type: array, items: {type: string}}
        message_hypothesis: {type: string}
        steps: {type: array}
        selected_route: {type: string}
        execution_mode: {type: string, enum: [prepare_only, export, create_draft, activate]}
        approval_required: {type: boolean}
  - key: sequence_summary
    name: Sequence Summary
    type: object
    required: true
    description: Prepared assets, selected leads, validation findings, execution status, and exact blockers or receipts.
    schema:
      type: object
      required: [lead_count, assets, validation_findings, execution_status, blocker, receipt_refs]
      properties:
        lead_count: {type: integer, minimum: 0}
        assets: {type: array}
        validation_findings: {type: array}
        execution_status: {type: string, enum: [prepared, exported, drafted, activated, blocked, failed]}
        blocker: {type: object}
        receipt_refs: {type: array, items: {type: string}}
learning_hooks:
  - key: outbound_learning
    prompt: Capture reusable outbound lessons only after evidence or reviewed outcomes exist.
    tags:
      - gtm
      - outbound
failure_handling:
  - If approval is missing, store the sequence plan without changing provider state.
metadata:
  builtin: true
  run_mode: stackos_run_plan
