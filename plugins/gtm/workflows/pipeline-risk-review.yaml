schema_version: stackos.workflow-template.v1
key: gtm.pipeline-risk-review
name: GTM Pipeline Risk Review
version: 0.2.0
description: Reusable template for reviewing pipeline snapshots, opportunity risks, tasks, and follow-up recommendations.
domain: gtm
owner:
  team: StackOS
experience:
  problem: "Pipeline reviews overreact to stale CRM fields or produce a list of vague concerns without owners and evidence."
  outcome: "An evidence-backed risk review with prioritized follow-up, owners, and uncertainty clearly separated from fact."
  operator_path:
    - "Choose the pipeline segment, review window, and business thresholds."
    - "Confirm the sources and definitions for stage, value, activity, and risk."
    - "Review proposed follow-up before any CRM or communication action."
  agent_path:
    - "Load the bounded pipeline snapshot and relevant activity context."
    - "Test each risk signal against the project policy and source freshness."
    - "Prioritize risks, name evidence and uncertainty, and prepare owner-specific follow-up."
  progress_signals:
    - "Pipeline scope loaded"
    - "Risk signals tested"
    - "Priorities set"
    - "Follow-up plan ready"
  recovery:
    - "If source freshness is insufficient, mark the conclusion provisional."
    - "Do not mutate CRM or contact owners without the required approval and route."
  safe_stopping_points:
    - "Stop with the reviewed risk report when follow-up execution was not authorized."
  handoffs:
    - workflow_key: gtm.account-research
      relationship: conditional
      when: "A material account risk requires fresh external or internal research."
public:
  audience: "Sales leaders and revenue operations teams reviewing pipeline risk"
  setup: mixed
  prerequisites:
    - "A bounded pipeline snapshot"
    - "Freshness and risk definitions"
    - "Ownership and follow-up policy"
  proof:
    - "Source-linked risk register"
    - "Priority and confidence rationale"
    - "Owner-specific follow-up plan"
  featured: false
when_to_use:
  - A pipeline, segment, opportunity set, or forecast needs a bounded risk review.
when_not_to_use:
  - The operator already approved CRM updates and only needs mutation.
agent_requirements:
  - role: gtm-pipeline-risk-review
    requirement: required
    agent_preset_ref: gtm.workflow.pipeline-risk-review
    purpose: Review pipeline risk, data freshness, opportunity blockers, and next actions.
    applies_to_steps:
      - orient
      - fetch_metric_gaps
      - fetch_revenue_evidence
      - diagnose_risks
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review CRM state assumptions, customer-data boundaries, and any mutation follow-up.
    applies_to_steps:
      - diagnose_risks
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: review_scope
    name: Review Scope
    type: object
    required: false
  - key: metric_targets
    name: Metric Targets
    type: object
    required: false
context_requirements:
  - id: pipeline_context
    source: resources
    purpose: Retrieve pipeline snapshots, opportunities, deals, accounts, touchpoints, and tasks.
    filters:
      plugin_slug: gtm
      resource_keys:
        - pipeline-snapshot
        - opportunity
        - deal
        - account
        - touchpoint
        - task
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 30
    return_mode: compact
  - id: pipeline_learnings
    source: learnings
    purpose: Pull prior pipeline and deal-risk lessons before interpreting evidence.
    filters:
      tags:
        - gtm
        - pipeline
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
  - id: recent_decisions
    source: decisions
    purpose: Read prior pipeline decisions and forecasting constraints.
    filters:
      tags:
        - gtm
        - pipeline
    fields:
      - title
      - decision
      - rationale
      - status
      - tags
    max_items: 10
    return_mode: compact
capability_requirements:
  - key: pipeline-management
    required: true
    preferred_providers:
      - hubspot
      - salesforce
      - pipedrive
      - custom-gtm-tool
auth_requirements:
  - key: hubspot
    provider: hubspot
    auth_type: oauth
    optional: true
  - key: salesforce
    provider: salesforce
    auth_type: oauth
    optional: true
  - key: pipedrive
    provider: pipedrive
    auth_type: oauth-or-api-token
    optional: true
action_contracts:
  - key: hubspot_pipeline_fetch
    action: hubspot.crm.deals.search
    capability: pipeline-management
    provider: hubspot
    risk_level: read
    auth_ref: hubspot
    optional: true
    route_group: pipeline_source
    route_key: hubspot
  - key: hubspot_product_evidence
    action: hubspot.sales.products.search
    capability: pipeline-management
    provider: hubspot
    risk_level: read
    auth_ref: hubspot
    optional: true
  - key: hubspot_line_item_evidence
    action: hubspot.sales.line_items.search
    capability: pipeline-management
    provider: hubspot
    risk_level: read
    auth_ref: hubspot
    optional: true
  - key: hubspot_quote_evidence
    action: hubspot.sales.quotes.search
    capability: pipeline-management
    provider: hubspot
    risk_level: read
    auth_ref: hubspot
    optional: true
  - key: hubspot_goal_target_evidence
    action: hubspot.sales.goal_targets.list
    capability: pipeline-management
    provider: hubspot
    risk_level: read
    auth_ref: hubspot
    optional: true
  - key: salesforce_pipeline_fetch
    action: salesforce.opportunities.query
    capability: pipeline-management
    provider: salesforce
    risk_level: read
    auth_ref: salesforce
    optional: true
    route_group: pipeline_source
    route_key: salesforce
  - key: pipedrive_deal_fetch
    action: pipedrive.deals.list
    capability: pipeline-management
    provider: pipedrive
    risk_level: read
    auth_ref: pipedrive
    optional: true
    route_group: pipeline_source
    route_key: pipedrive
  - key: custom_gtm_pipeline_fetch
    action: custom_gtm.pipeline.fetch
    capability: pipeline-management
    provider: custom-gtm-tool
    optional: true
    route_group: pipeline_source
    route_key: custom_gtm_tool
    risk_level: read
resource_contracts:
  - key: pipeline_snapshots
    resource: pipeline-snapshot
    purpose: Store imported or summarized pipeline evidence.
  - key: opportunities
    resource: opportunity
    purpose: Store opportunity risk notes and follow-up state.
  - key: deals
    resource: deal
    purpose: Store deal risk notes and safe CRM refs.
  - key: tasks
    resource: task
    purpose: Store follow-up task recommendations.
  - key: touchpoints
    resource: touchpoint
    purpose: Store recent activity context relevant to risk.
policies:
  - key: read_only_by_default
    kind: execution
    description: Pipeline review reads and records recommendations; CRM writes belong in a separate approved run.
  - key: no_secret_exposure
    kind: auth
    description: Pipeline provider credentials stay daemon-side.
approval_gates:
  - key: cost_review
    description: Review expected provider cost before high-volume pipeline reads.
    required_when: estimated_cost_above_project_threshold
steps:
  - id: orient
    title: Orient From Pipeline Context
    purpose: Read review scope, targets, stored snapshots, learnings, and decisions.
    input_refs:
      - goal
      - review_scope
      - metric_targets
    context_refs:
      - pipeline_context
      - pipeline_learnings
      - recent_decisions
    policy_refs:
      - read_only_by_default
    output_refs:
      - risk_review
    instructions:
      - Bound the opportunity set and use only project-defined stage, value, freshness, and risk semantics.
    success_criteria:
      - The review scope, source freshness, and confidence limits are explicit.
  - id: fetch_metric_gaps
    title: Fetch Metric Gaps
    purpose: Use granted read actions only when stored pipeline evidence is insufficient.
    action_refs:
      - hubspot_pipeline_fetch
      - salesforce_pipeline_fetch
      - pipedrive_deal_fetch
      - custom_gtm_pipeline_fetch
    policy_refs:
      - no_secret_exposure
    approval_refs:
      - cost_review
    depends_on:
      - orient
    output_refs:
      - metric_gap_report
    instructions:
      - Fetch only the missing bounded evidence and preserve safe deal refs instead of raw provider ids.
    success_criteria:
      - Every provider read is necessary for a named evidence gap and its source is recorded.
  - id: fetch_revenue_evidence
    title: Fetch Optional Revenue Evidence
    purpose: Use HubSpot Sales reads only when product, line-item, quote, or goal-target context materially changes a deal-risk conclusion.
    action_refs:
      - hubspot_product_evidence
      - hubspot_line_item_evidence
      - hubspot_quote_evidence
      - hubspot_goal_target_evidence
    policy_refs:
      - read_only_by_default
      - no_secret_exposure
    depends_on:
      - fetch_metric_gaps
    output_refs:
      - metric_gap_report
    instructions:
      - Skip this branch unless the concrete review needs Sales-bundle revenue evidence.
      - Do not infer missing product, line-item, quote, or goal data when the Sales bundle is unavailable.
    success_criteria:
      - Sales-bundle reads are either source-linked to a risk finding or reported as deliberately skipped.
  - id: diagnose_risks
    title: Diagnose Risks
    purpose: Separate likely stage, activity, account, deal, ownership, and timing risks.
    resource_refs:
      - pipeline_snapshots
      - opportunities
      - deals
      - tasks
      - touchpoints
    depends_on:
      - fetch_revenue_evidence
    output_refs:
      - risk_review
      - followup_plan
    instructions:
      - Keep recommendations read-only and route any later mutation to a separately approved workflow.
    success_criteria:
      - Each prioritized risk has evidence, confidence, an owner-ready next action, and explicit uncertainty.
outputs:
  - key: risk_review
    name: Risk Review
    type: object
    required: true
    description: Evidence-linked pipeline risk assessment by account, deal, stage, and reason.
    schema:
      type: object
      required: [review_window, source_refs, risk_items, aggregate_risk, confidence]
      properties:
        review_window: {type: object}
        source_refs: {type: array, items: {type: string}}
        risk_items: {type: array}
        aggregate_risk: {type: object}
        confidence: {type: string, enum: [low, medium, high]}
  - key: metric_gap_report
    name: Metric Gap Report
    type: object
    required: true
    description: Missing, stale, or contradictory metrics that bound the risk conclusion.
    schema:
      type: object
      required: [missing_metrics, stale_metrics, contradictory_metrics, impact_on_confidence]
      properties:
        missing_metrics: {type: array}
        stale_metrics: {type: array}
        contradictory_metrics: {type: array}
        impact_on_confidence: {type: string}
  - key: followup_plan
    name: Followup Plan
    type: object
    required: true
    description: Prioritized owner-ready actions, questions, evidence needs, and review timing.
    schema:
      type: object
      required: [actions, owner_questions, evidence_requests, next_review_at]
      properties:
        actions: {type: array}
        owner_questions: {type: array}
        evidence_requests: {type: array}
        next_review_at: {type: string}
learning_hooks:
  - key: pipeline_learning
    prompt: Capture reusable pipeline lessons only with explicit metric or activity evidence.
    tags:
      - gtm
      - pipeline
failure_handling:
  - If provider reads are unavailable, diagnose from stored snapshots and list missing evidence.
metadata:
  builtin: true
  run_mode: stackos_run_plan
