schema_version: stackos.workflow-template.v1
key: seo.website-analysis
name: Website SEO Analysis
version: 0.3.0
description: Agency-style, evidence-led website mapping and SEO analysis that keeps one reviewed finding register, uses connected first-party and research tools when useful, and retains a public-site fallback.
domain: seo
owner:
  team: StackOS
experience:
  problem: SEO audits become generic checklists or unsupported scores when the analyst does not map the actual site, reconcile public pages with first-party measurement, and distinguish measured facts from observations and inference.
  outcome: A source-ledgered site inventory, finding register, and prioritized roadmap that explains coverage and limitations without changing the website.
  why_ai: AI can traverse representative templates, reconcile public, first-party, and third-party evidence, and synthesize a practical agency-style roadmap while keeping claims traceable.
  operator_path:
    - Provide the website, business goal, important markets or sections, and any scope exclusions.
    - Connect Search Console, Analytics, Tag Manager, or research providers when available; the public-site analysis remains usable without them.
    - Review the evidence classification, limitations, findings, and prioritized roadmap before assigning fixes.
  agent_path:
    - Establish the canonical host, audit boundary, business goal, markets, date window, and sampling plan.
    - Map public pages, navigation, robots and sitemap signals, representative templates, links, metadata, structured data, and rendered behavior.
    - Select the smallest useful connected evidence set, preserving durable action receipts and recording unavailable, skipped, or failed sources as explicit gaps.
    - Reconcile evidence, challenge unsupported claims, and prioritize actions by impact, confidence, effort, dependencies, and validation path.
    - Store a compact analysis index plus durable report, inventory, and finding-register artifacts.
  progress_signals:
    - Scope and sampling plan established
    - Public site map and representative templates inspected
    - Connected evidence collected or gap-recorded
    - Findings reconciled and evidence-classified
    - Roadmap independently reviewed
    - Durable analysis package stored
  recovery:
    - If optional providers are unavailable, continue from public pages and record the missing evidence in the source ledger.
    - If part of the site is inaccessible, narrow the observed scope and label the limitation instead of claiming a complete crawl.
    - If the target itself cannot be reached or validated, stop with the exact access failure and evidence collected so far.
  safe_stopping_points:
    - Stop after the analysis package; fixes, publishing, tag changes, and indexing requests require separately authorized work.
  handoffs:
    - workflow_key: engineering.tracked-delivery
      relationship: conditional
      when: A reviewed technical SEO finding should become repository delivery work.
    - workflow_key: seo.content-refresh
      relationship: conditional
      when: A reviewed page-level content finding should become a bounded refresh.
public:
  audience: Website owners, SEO teams, and agencies diagnosing search visibility and measurement quality
  setup: available
  prerequisites:
    - A reachable website URL and the business purpose of the analysis
    - Optional target markets, priority sections, exclusions, and performance date window
    - Optional connected Search Console, GA4, GTM, Firecrawl, Ahrefs, DataForSEO, or Serper sources
  proof:
    - Source ledger with used, unavailable, skipped, and failed sources
    - Public site inventory and representative-template coverage
    - Typed evidence index and independently reviewed SEO finding register
    - Prioritized roadmap with validation paths
    - Durable final report plus completeness-appropriate inventory, finding-register, and evidence artifacts
  featured: true
when_to_use:
  - A user asks to audit, map, analyze, or diagnose a website's SEO.
  - A website needs an agency-style technical, on-page, content, measurement, and optional authority/competitive review.
  - Connected Search Console, Analytics, Tag Manager, or research tools should enrich a public-site analysis.
when_not_to_use:
  - The user only wants one known SEO fix implemented.
  - The user only needs keyword research without a site-wide diagnosis.
  - The target is not a website or no reachable public/internal URL is available.
inputs:
  - key: site_url
    name: Website URL
    description: Public website root to map and analyze. Authenticated or private targets require an explicit access boundary.
    type: string
    required: true
    schema:
      type: string
      minLength: 1
      format: uri
      pattern: '^[Hh][Tt][Tt][Pp][Ss]?://[^\s]+$'
  - key: access_boundary
    name: Access Boundary
    description: Optional authorization and data-sharing boundary for authenticated, private-network, staging, or otherwise non-public targets. Absence means public-only analysis.
    type: object
    required: false
    schema:
      type: object
      additionalProperties: false
      required: [mode, external_provider_sharing]
      properties:
        mode: {type: string, enum: [public, authenticated, private-network]}
        external_provider_sharing: {type: string, enum: [allowed, prohibited]}
        browser_profile_ref: {type: string}
        authorized_scope: {type: string}
        storage_limitations: {type: array, items: {type: string}}
  - key: business_goal
    name: Business Goal
    description: Search, audience, conversion, or business outcome the analysis should support.
    type: string
    required: false
  - key: target_markets
    name: Target Markets
    description: Optional countries, languages, or audience markets to consider.
    type: array
    required: false
    schema:
      type: array
      items: {type: string}
  - key: priority_sections
    name: Priority Sections
    description: Optional paths, product areas, or templates that deserve deeper coverage.
    type: array
    required: false
    schema:
      type: array
      items: {type: string}
  - key: excluded_sections
    name: Excluded Sections
    description: Optional paths or environments that should not be analyzed.
    type: array
    required: false
    schema:
      type: array
      items: {type: string}
  - key: performance_start_date
    name: Performance Start Date
    description: Optional YYYY-MM-DD start for connected first-party reporting.
    type: string
    required: false
    schema: {type: string, format: date}
  - key: performance_end_date
    name: Performance End Date
    description: Optional YYYY-MM-DD end for connected first-party reporting.
    type: string
    required: false
    schema: {type: string, format: date}
  - key: scope_notes
    name: Scope Notes
    description: Optional operator context, known concerns, access caveats, or desired depth.
    type: string
    required: false
context_requirements:
  - id: prior_website_analyses
    source: resources
    purpose: Reuse prior findings and distinguish persistent issues from newly observed ones.
    filters:
      plugin_slug: seo
      resource_keys:
        - website-seo-analysis
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 10
  - id: relevant_seo_decisions
    source: decisions
    purpose: Preserve accepted SEO, platform, analytics, and content constraints.
    filters:
      tags:
        - seo
    fields:
      - title
      - decision
      - rationale
      - status
      - tags
    max_items: 15
  - id: accepted_seo_learnings
    source: learnings
    purpose: Include durable project-specific SEO lessons without treating them as live measurements.
    filters:
      tags:
        - seo
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
agent_requirements:
  - role: seo-website-analysis
    requirement: required
    agent_preset_ref: seo.workflow.website-analysis
    purpose: Map the site, collect evidence, reconcile findings, and produce the analysis package.
    applies_to_steps:
      - scope-audit
      - map-public-site
      - collect-connected-evidence
      - reconcile-and-diagnose
      - review-and-prioritize
      - finalize-and-store
  - role: delivery-reviewer
    requirement: required
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Independently challenge SEO claim support, evidence freshness and coverage, prioritization, and durable closeout; return findings for main-agent adjudication rather than engineering-release boilerplate.
    applies_to_steps:
      - review-and-prioritize
      - finalize-and-store
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS workflows, run plans, actions, response files, resources, artifacts, tracker evidence, and grants.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate readiness, source selection, specialist review, durable outputs, safe stopping, and recovery without hiding strategy in StackOS.
