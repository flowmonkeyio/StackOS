schema_version: stackos.workflow-template.v1
key: seo.content-refresh
name: SEO Content Refresh
version: 0.1.0
description: Reusable template for diagnosing and executing a content refresh without assuming one universal content workflow.
domain: seo
owner:
  team: StackOS
experience:
  problem: "Content refreshes turn into broad rewrites when search intent, current performance, technical issues, and conversion purpose are not diagnosed first."
  outcome: "A focused page refresh with traceable changes, preserved useful content, and a verification plan."
  why_ai: "AI can compare search evidence, page structure, project context, and editorial constraints while keeping the final judgment and publication boundary explicit."
  operator_path:
    - "Choose the page, business goal, search intent, and performance window."
    - "Provide approved analytics, query, and content sources."
    - "Review the proposed changes before publication."
  agent_path:
    - "Diagnose intent, performance, technical, content, and conversion gaps before editing."
    - "Map each proposed change to evidence and preserve what already works."
    - "Prepare or apply the bounded refresh, then verify content and technical acceptance criteria."
  progress_signals:
    - "Page and intent scoped"
    - "Diagnosis complete"
    - "Refresh plan reviewed"
    - "Changes applied"
    - "Verification complete"
  recovery:
    - "If query or performance evidence is missing, return a bounded diagnostic and data request."
    - "If publication is not authorized, stop with a review-ready patch or content packet."
  safe_stopping_points:
    - "Stop with a review-ready refresh plan or patch when publication was not authorized."
public:
  audience: "SEO and content teams improving existing pages"
  setup: mixed
  prerequisites:
    - "A page, business goal, and target search intent"
    - "Approved performance and query evidence"
    - "Editorial, technical, and publication boundaries"
  proof:
    - "Evidence-linked diagnosis"
    - "Change map"
    - "Content and technical verification"
    - "Publication receipt only when authorized"
  featured: false
when_to_use:
  - Existing content needs a refresh diagnosis, evidence gathering, and recorded follow-through.
when_not_to_use:
  - The user needs new content creation rather than updating existing work.
agent_requirements:
  - role: seo-content-refresh
    requirement: required
    agent_preset_ref: seo.workflow.content-refresh
    purpose: Diagnose content gaps and prepare a source-backed refresh brief.
    applies_to_steps:
      - read_history
      - diagnose
      - execute_change
      - record_outcome
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review content, SEO evidence, and any UI/publishing signoff before completion.
    applies_to_steps:
      - diagnose
      - execute_change
      - record_outcome
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: content_ref
    name: Content Ref
    type: string
    required: true
  - key: refresh_goal
    name: Refresh Goal
    type: string
    required: true
context_requirements:
  - id: recent_refreshes
    source: resources
    purpose: Understand prior refresh actions for the same or similar content.
    filters:
      plugin_slug: seo
      resource_keys:
        - content-refresh
        - content-piece
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 20
  - id: related_experiments
    source: experiments
    purpose: Include active SEO experiments before proposing a change.
    filters:
      domain: seo
      statuses:
        - active
        - planned
    fields:
      - name
      - hypothesis
      - status
      - metric_targets_json
      - variants
    max_items: 10
  - id: relevant_decisions
    source: decisions
    purpose: Keep prior project decisions visible without flooding the context window.
    filters:
      tags:
        - seo
    fields:
      - title
      - decision
      - rationale
      - status
      - tags
    max_items: 10
capability_requirements:
  - key: seo-content
    required: true
  - key: seo-measurement
    required: false
auth_requirements:
  - key: dataforseo
    provider: dataforseo
    auth_type: api-key
    optional: true
action_contracts:
  - key: serp_analysis
    action: serp.analyze
    capability: seo-research
    provider: dataforseo
    risk_level: cost
    auth_ref: dataforseo
resource_contracts:
  - key: content_piece
    resource: content-piece
    purpose: Store the content work item and links to external files or systems.
  - key: refresh_record
    resource: content-refresh
    purpose: Store diagnosis, action taken, expected effect, and follow-up timing.
  - key: performance_snapshot
    resource: search-performance-snapshot
    purpose: Store imported or summarized metrics used as evidence.
policies:
  - key: no_secret_exposure
    kind: auth
    description: Secrets stay in daemon-side credential storage and are never included in run-plan steps.
  - key: explicit_change_record
    kind: audit
    description: Every material change must be recorded as a resource, learning, decision, or experiment observation.
approval_gates:
  - key: operator_change_review
    description: Required before applying changes outside StackOS storage.
    required_when: external_system_change
steps:
  - id: read_history
    title: Read History
    input_refs:
      - content_ref
      - refresh_goal
    context_refs:
      - recent_refreshes
      - related_experiments
      - relevant_decisions
    policy_refs:
      - explicit_change_record
  - id: diagnose
    title: Diagnose Refresh Need
    action_refs:
      - serp_analysis
    resource_refs:
      - content_piece
      - performance_snapshot
    policy_refs:
      - no_secret_exposure
    depends_on:
      - read_history
  - id: execute_change
    title: Execute Change
    purpose: Agent performs the chosen external or repository work using tools available in the current environment.
    approval_refs:
      - operator_change_review
    policy_refs:
      - explicit_change_record
    depends_on:
      - diagnose
  - id: record_outcome
    title: Record Outcome
    resource_refs:
      - refresh_record
      - content_piece
      - performance_snapshot
    output_refs:
      - refresh_summary
    depends_on:
      - execute_change
outputs:
  - key: refresh_summary
    name: Refresh Summary
    type: object
    required: true
    description: Source-linked diagnosis, approved changes, verification evidence, and residual SEO risk.
    schema:
      type: object
      required: [content_ref, diagnosis, changes, verification, residual_risk, evidence_refs]
      properties:
        content_ref: {type: string}
        diagnosis: {type: object}
        changes: {type: array}
        verification: {type: array}
        before_metrics: {type: object}
        after_metrics: {type: object}
        residual_risk: {type: array}
        evidence_refs: {type: array, items: {type: string}}
learning_hooks:
  - key: refresh_learning
    prompt: Record reusable SEO refresh lessons only when supported by evidence.
metadata:
  builtin: true
  run_mode: stackos_run_plan
  step_ids:
    - read_history
    - diagnose
    - execute_change
    - record_outcome
