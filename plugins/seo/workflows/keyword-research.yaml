schema_version: stackos.workflow-template.v1
key: seo.keyword-research
name: SEO Keyword Research
version: 0.1.0
description: Reusable research template for turning a business goal into SEO opportunity resources.
domain: seo
owner:
  team: StackOS
experience:
  problem: "Keyword research produces broad high-volume lists when it is not anchored to the business, audience, product proximity, and existing authority."
  outcome: "A prioritized opportunity map that separates near-term article ideas, supporting clusters, evidence, and topics to avoid."
  why_ai: "AI can connect keyword data, SERP patterns, competitor evidence, and project context while the operator owns positioning and priority."
  operator_path:
    - "State the business goal, audience, product proximity, markets, and topics to avoid."
    - "Choose approved keyword and competitor data sources."
    - "Review the opportunity map and select content priorities."
  agent_path:
    - "Translate the business brief into explicit opportunity criteria before collecting data."
    - "Use approved keyword, SERP, and competitor sources and preserve provenance."
    - "Cluster by intent and business fit, score with transparent tradeoffs, and propose concrete article angles."
  progress_signals:
    - "Opportunity criteria set"
    - "Data collected"
    - "Intent clusters built"
    - "Priorities scored"
    - "Article opportunities ready"
  recovery:
    - "If a provider is unavailable, use approved exports or stop with the exact missing dataset."
    - "Do not fill the report with broad terms that fail the product-proximity or authority test."
  safe_stopping_points:
    - "Stop after the prioritized opportunity map; article production is a separate approved job."
  handoffs:
    - workflow_key: branding.content-production
      relationship: conditional
      when: "A selected opportunity should become an evidence-backed branded article."
public:
  audience: "SEO and content teams choosing what to write next"
  setup: connection-required
  prerequisites:
    - "A business goal, audience, market, and product-proximity boundary"
    - "Topics to include and avoid"
    - "Connected keyword and SERP data sources or approved exports"
  proof:
    - "Source-linked keyword set"
    - "Intent and business-fit clusters"
    - "Transparent priority scoring"
    - "Concrete article angles and avoidance list"
  featured: true
when_to_use:
  - A project needs SEO opportunities from seed terms, competitors, or an agent-defined research angle.
when_not_to_use:
  - The user already has a reviewed opportunity set and only needs execution.
agent_requirements:
  - role: seo-keyword-research
    requirement: required
    agent_preset_ref: seo.workflow.keyword-research
    purpose: Lead keyword discovery, clustering, evidence review, and opportunity handoff.
    applies_to_steps:
      - orient
      - collect_evidence
      - store_opportunities
      - capture_learning
  - role: planning
    requirement: recommended
    agent_preset_ref: stackos.sdlc.planning
    purpose: Break selected opportunities into executable follow-up tickets.
    applies_to_steps:
      - store_opportunities
      - capture_learning
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: seed_terms
    name: Seed Terms
    type: array
    required: false
  - key: competitor_domains
    name: Competitor Domains
    type: array
    required: false
context_requirements:
  - id: recent_seo_research
    source: resources
    purpose: Avoid repeating recent SEO research and reuse known opportunities.
    filters:
      plugin_slug: seo
      resource_keys:
        - keyword-opportunity
        - serp-snapshot
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 20
  - id: accepted_learnings
    source: learnings
    purpose: Pull project-level lessons tagged with SEO before choosing research direction.
    filters:
      tags:
        - seo
    fields:
      - statement
      - confidence
      - tags
      - evidence_json
    max_items: 10
capability_requirements:
  - key: seo-research
    required: true
    preferred_providers:
      - dataforseo
      - ahrefs
auth_requirements:
  - key: dataforseo
    provider: dataforseo
    auth_type: api-key
    optional: true
  - key: ahrefs
    provider: ahrefs
    auth_type: api-key
    optional: true
action_contracts:
  - key: keyword_research
    action: keyword.research
    capability: seo-research
    provider: dataforseo
    risk_level: cost
    auth_ref: dataforseo
  - key: serp_analysis
    action: serp.analyze
    capability: seo-research
    provider: dataforseo
    risk_level: cost
    auth_ref: dataforseo
  - key: competitor_keywords
    action: competitor.keywords
    capability: seo-research
    provider: ahrefs
    risk_level: cost
    auth_ref: ahrefs
    optional: true
resource_contracts:
  - key: opportunities
    resource: keyword-opportunity
    purpose: Store reviewed opportunities with evidence, priority, and next-step notes.
  - key: serp_snapshots
    resource: serp-snapshot
    purpose: Store compact SERP evidence the agent can reuse later.
policies:
  - key: no_secret_exposure
    kind: auth
    description: Agents may reference provider keys and credential refs but never receive secret values.
  - key: agent_decides_scope
    kind: execution
    description: The template defines contracts; the run plan chooses exact queries, providers, and records.
  - key: preserve_fetched_data
    kind: evidence
    description: If provider data was fetched, keep the returned response-file paths and cite them in synthesized outputs before considering another provider call. Use schema.get with schema_ref only when the response-file envelope schema is needed.
approval_gates:
  - key: operator_cost_review
    description: Required when the run plan expects material provider spend.
    required_when: estimated_cost_above_project_threshold
steps:
  - id: orient
    title: Orient From History
    purpose: Read recent research, learnings, and the current project goal; if the user did not provide seed terms or competitors, ask a small number of plain-language clarifying questions and propose initial research angles.
    input_refs:
      - goal
      - seed_terms
      - competitor_domains
    context_refs:
      - recent_seo_research
      - accepted_learnings
    policy_refs:
      - agent_decides_scope
  - id: collect_evidence
    title: Collect Evidence
    purpose: Execute only the provider calls the run plan grants and the agent still needs; preserve returned response-file paths, use schema.get with schema_ref only when needed, and inspect files before rerunning paid research.
    action_refs:
      - keyword_research
      - serp_analysis
      - competitor_keywords
    policy_refs:
      - no_secret_exposure
      - preserve_fetched_data
    output_refs:
      - raw_provider_data_refs
    approval_refs:
      - operator_cost_review
    depends_on:
      - orient
  - id: store_opportunities
    title: Store Opportunities
    purpose: Persist a useful list of keyword opportunities, not just one or two terms, with clusters, metrics, source refs, and a polished brief/CSV when the run grants artifact writes.
    resource_refs:
      - opportunities
      - serp_snapshots
    output_refs:
      - opportunity_summary
      - synthesized_keyword_research
    depends_on:
      - collect_evidence
  - id: capture_learning
    title: Capture Learning
    purpose: Record reusable lessons or rejected patterns for future runs.
    context_refs:
      - accepted_learnings
    depends_on:
      - store_opportunities
outputs:
  - key: opportunity_summary
    name: Opportunity Summary
    description: Reviewed opportunity set with clusters, metrics, evidence refs, assumptions, and recommended next steps.
    type: object
    required: true
    schema:
      type: object
      required: [criteria, clusters, prioritized_opportunities, avoidance_list, assumptions, evidence_refs, recommended_next_steps]
      properties:
        criteria: {type: object}
        clusters: {type: array}
        prioritized_opportunities: {type: array}
        avoidance_list: {type: array}
        assumptions: {type: array}
        evidence_refs: {type: array, items: {type: string}}
        recommended_next_steps: {type: array}
  - key: raw_provider_data_refs
    name: Raw Provider Data Refs
    description: Response-file paths for preserved provider request/response envelopes, usually schema stackos.action-output.v1, to avoid paid roundtrips.
    type: array
    required: true
    schema: {type: array, items: {type: string, minLength: 1}, uniqueItems: true}
  - key: synthesized_keyword_research
    name: Synthesized Keyword Research
    description: Polished research output, normally markdown plus optional CSV-style table, with ranked keyword clusters and raw-data refs.
    type: object
    required: true
    schema:
      type: object
      required: [brief_ref, ranked_clusters, opportunity_table, raw_data_refs, methodology]
      properties:
        brief_ref: {type: string}
        csv_ref: {type: string}
        ranked_clusters: {type: array}
        opportunity_table: {type: array}
        raw_data_refs: {type: array, items: {type: string}}
        methodology: {type: object}
learning_hooks:
  - key: research_reuse
    prompt: Record only durable SEO research lessons with evidence and project provenance.
metadata:
  builtin: true
  run_mode: stackos_run_plan
  mcp_tool_grants:
    - step_id: capture_learning
      tool: learning.create
  step_ids:
    - orient
    - collect_evidence
    - store_opportunities
    - capture_learning
