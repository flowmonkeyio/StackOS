  - key: serp.analyze
    name: Analyze SERP
    description: Fetch live SERP result evidence for an agent-selected query through DataForSEO; StackOS caps depth at 100 results for bounded agent calls.
    provider: dataforseo
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - keyword
      properties:
        keyword:
          type: string
        location_name:
          type: string
          description: DataForSEO location_name country value, for example United States.
          enum: *dataforseo_country_location_names
        language_code:
          type: string
          description: DataForSEO language_code, for example en.
          enum: *dataforseo_google_language_codes
        depth:
          type: integer
          minimum: 1
          maximum: 100
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: dataforseo
      operation: serp.analyze
      requires_credential: true
      budget_kind: dataforseo
      enforce_budget: true
  - key: paa.extract
    name: Extract People Also Ask
    description: Fetch People Also Ask evidence for an agent-selected query through DataForSEO.
    provider: dataforseo
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - keyword
      properties:
        keyword:
          type: string
        location_name:
          type: string
          description: DataForSEO location_name country value, for example United States.
          enum: *dataforseo_country_location_names
        language_code:
          type: string
          description: DataForSEO language_code, for example en.
          enum: *dataforseo_google_language_codes
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: dataforseo
      operation: paa
      requires_credential: true
      budget_kind: dataforseo
      enforce_budget: true
  - key: serper.search
    name: Search Google With Serper
    description: Fetch live Google Search result evidence through Serper.dev using bounded query and locale inputs.
    provider: serper
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - query
      properties:
        query:
          type: string
        num:
          type: integer
          minimum: 1
          maximum: 100
        country:
          type: string
          description: Optional Google country code sent as gl.
        language:
          type: string
          description: Optional Google language code sent as hl.
        page:
          type: integer
          minimum: 1
          maximum: 10
        tbs:
          type: string
          description: Optional Google time/filter expression.
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: serper
      operation: search
      requires_credential: true
      budget_kind: serper
      enforce_budget: false
  - key: competitor.keywords
    name: Competitor Keywords
    description: Pull competitor organic keyword evidence for agent analysis; StackOS captures Ahrefs API-unit headers while monetary budget enforcement remains disabled until API units are modeled.
    provider: ahrefs
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - target
      properties:
        target:
          type: string
        country:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          description: "Ahrefs plan row caps are enforced at runtime: Lite 100, Standard 250, Advanced 500, Enterprise bounded by the StackOS action cap of 1000."
        date:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: ahrefs
      operation: competitor.keywords
      requires_credential: true
      budget_kind: ahrefs
      enforce_budget: false
  - key: backlink.research
    name: Backlink Research
    description: Pull backlink evidence for an agent-defined SEO investigation; StackOS captures Ahrefs API-unit headers while monetary budget enforcement remains disabled until API units are modeled.
