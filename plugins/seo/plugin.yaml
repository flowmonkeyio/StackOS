resources:
  - key: keyword-opportunity
    name: Keyword Opportunity
    description: Agent-curated keyword or query opportunity with evidence and priority metadata.
    schema: *object_schema
  - key: serp-snapshot
    name: SERP Snapshot
    description: Normalized SERP evidence captured for later comparison or brief creation.
    schema: *object_schema
  - key: content-brief
    name: Content Brief
    description: Reusable content brief contract created by an agent.
    schema: *object_schema
  - key: content-piece
    name: Content Piece
    description: SEO content work item, draft pointer, ownership metadata, or refresh state.
    schema: *object_schema
  - key: content-refresh
    name: Content Refresh
    description: Refresh opportunity, diagnosis, action taken, and observed result.
    schema: *object_schema
  - key: link-opportunity
    name: Link Opportunity
    description: Internal or external link opportunity with rationale and status.
    schema: *object_schema
  - key: search-performance-snapshot
    name: Search Performance Snapshot
    description: Imported or summarized search-performance metrics for agent analysis.
    schema: *object_schema
  - key: website-seo-analysis
    name: Website SEO Analysis
    description: Compact durable index for a completed or partial website SEO analysis and its evidence artifacts.
    schema:
      type: object
      additionalProperties: false
      required:
        - site_url
        - analyzed_at
        - status
        - source_ledger
        - evidence_index
        - review_summary
        - executive_summary
        - finding_counts
        - prioritized_actions
        - limitations
        - artifact_refs
      properties:
        site_url:
          type: string
          minLength: 1
        canonical_host:
          type: string
        analyzed_at:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - complete
            - partial
        analysis_scope:
          type: object
          additionalProperties: false
          properties:
            business_goal: {type: string}
            access_boundary:
              type: object
              additionalProperties: false
              required: [mode, external_provider_sharing]
              properties:
                mode: {type: string, enum: [public, authenticated, private-network]}
                external_provider_sharing: {type: string, enum: [allowed, prohibited]}
                browser_profile_ref: {type: string}
                authorized_scope: {type: string}
                storage_limitations: {type: array, items: {type: string}}
            target_markets: {type: array, items: {type: string}}
            included_sections: {type: array, items: {type: string}}
            excluded_sections: {type: array, items: {type: string}}
            date_range: {type: object, additionalProperties: true}
            public_page_count: {type: integer, minimum: 0}
            sampling_notes: {type: array, items: {type: string}}
        source_ledger:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - source
              - evaluated_at
              - status
              - evidence_class
              - coverage
              - limitations
              - evidence_refs
            properties:
              source: {type: string}
              evaluated_at: {type: string, format: date-time}
              status:
                type: string
                enum: [used, unavailable, skipped, failed]
              evidence_class:
                type: string
                enum: [public-observation, first-party-provider, third-party-provider, operator-supplied]
              coverage: {type: string}
              reporting_window: {type: object, additionalProperties: true}
              limitations: {type: array, items: {type: string}}
              evidence_refs: {type: array, items: {type: string}}
              reason: {type: string}
        evidence_index:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [evidence_ref, kind, source, captured_at, lifecycle_state, scope, receipt_ref, limitations]
            properties:
              evidence_ref: {type: string, minLength: 1}
              kind: {type: string, enum: [action-receipt, browser-receipt, operator-context, prior-analysis, artifact]}
              source: {type: string, minLength: 1}
              captured_at: {type: string, format: date-time}
              lifecycle_state: {type: string, enum: [current, historical, superseded]}
              scope: {type: object, additionalProperties: true}
              receipt_ref: {type: string, minLength: 1}
              action_call_id: {type: integer, minimum: 1}
              action_ref: {type: string}
              output_sha256: {type: string, pattern: '^[a-fA-F0-9]{64}$'}
              artifact_ref: {type: string}
              reporting_window: {type: object, additionalProperties: true}
              limitations: {type: array, items: {type: string}}
            allOf:
              - if:
                  properties:
                    kind: {const: action-receipt}
                  required: [kind]
                then:
                  required: [action_call_id, action_ref]
              - if:
                  properties:
                    kind: {const: artifact}
                  required: [kind]
                then:
                  required: [artifact_ref]
        review_summary:
          type: object
          additionalProperties: false
          required: [reviewer_role, reviewed_at, dispositions, unresolved_evidence_gaps, residual_limitations]
          properties:
            reviewer_role: {type: string, const: delivery-reviewer}
            reviewer_ref: {type: string}
            reviewed_at: {type: string, format: date-time}
            dispositions:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [draft_finding_ref, disposition, rationale, evidence_refs]
                properties:
                  draft_finding_ref: {type: string, minLength: 1}
                  disposition: {type: string, enum: [accepted, revised, rejected]}
                  final_finding_ref: {type: string}
                  rationale: {type: string}
                  evidence_refs: {type: array, items: {type: string}}
                allOf:
                  - if:
                      properties:
                        disposition: {enum: [accepted, revised]}
                      required: [disposition]
                    then:
                      required: [final_finding_ref]
            unresolved_evidence_gaps: {type: array, items: {type: string}}
            residual_limitations: {type: array, items: {type: string}}
        executive_summary:
          type: object
          additionalProperties: false
          required: [overall_state, strengths, primary_risks, recommended_sequence, evidence_quality, limitations]
          properties:
            overall_state: {type: string}
            strengths: {type: array, items: {type: string}}
            primary_risks: {type: array, items: {type: string}}
            recommended_sequence: {type: array, items: {type: string}}
            evidence_quality: {type: object, additionalProperties: true}
            limitations: {type: array, items: {type: string}}
        finding_counts:
          type: object
          additionalProperties: false
          required: [total, measured, observed, inferred]
          properties:
            total: {type: integer, minimum: 0}
            measured: {type: integer, minimum: 0}
            observed: {type: integer, minimum: 0}
            inferred: {type: integer, minimum: 0}
            by_category: {type: object, additionalProperties: {type: integer, minimum: 0}}
            by_priority: {type: object, additionalProperties: {type: integer, minimum: 0}}
        prioritized_actions:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [title, priority, finding_refs, impact, effort, confidence, dependencies, owner_handoff, recommended_sequence, validation_path]
            properties:
              title: {type: string}
              priority: {type: string, enum: [critical, high, medium, low]}
              impact: {type: string}
              effort: {type: string, enum: [small, medium, large, unknown]}
              confidence: {type: string, enum: [high, medium, low]}
              dependencies: {type: array, items: {type: string}}
              owner_handoff: {type: string}
              recommended_sequence: {type: integer, minimum: 1}
              validation_path: {type: string}
              finding_refs: {type: array, items: {type: string}, minItems: 1}
        limitations:
          type: array
          items: {type: string}
        artifact_refs:
          type: object
          additionalProperties: false
          required: [final_report]
          properties:
            final_report: {type: string, minLength: 1}
            site_inventory: {type: string, minLength: 1}
            finding_register: {type: string, minLength: 1}
            evidence_artifacts:
              type: array
              items: {type: string, minLength: 1}
              uniqueItems: true
        follow_up_hooks:
          type: array
          items: {type: string}
      allOf:
        - if:
            properties:
              status: {const: complete}
            required: [status]
          then:
            properties:
              artifact_refs:
                required: [final_report, site_inventory, finding_register]
    ui_schema:
      table_columns:
        - site_url
        - status
        - analyzed_at
      summary_fields:
        - executive_summary
        - finding_counts
        - limitations
      detail_sections:
        - title: Analysis
          fields:
            - site_url
            - canonical_host
            - status
            - analyzed_at
            - analysis_scope
            - executive_summary
        - title: Evidence And Findings
          fields:
            - source_ledger
            - evidence_index
            - review_summary
            - finding_counts
            - prioritized_actions
            - limitations
        - title: Durable Outputs
          fields:
            - artifact_refs
            - follow_up_hooks
    config:
      schema_version: stackos.resource.v1
      record_kind: website-seo-analysis
      agent_guidance: Keep this record compact and evidence-led. Use the typed evidence index and review summary as the durable claim trail; temporary response-file paths are not evidence refs. Store bulky URL inventories, claim-supporting raw exports, the canonical finding register, and the final report as artifacts; never turn unavailable provider data into invented measurements.
ui:
  nav:
    section: SEO
    items:
      - key: seo.resources
        label: Data
        to: resources?plugin_slug=seo
        matchPrefix: true
      - key: seo.templates
        label: Workflows
        to: workflow-templates?plugin_slug=seo
config:
  schema_version: stackos.plugin.v1
