slug: seo
name: SEO
version: 0.1.0
description: First-party StackOS domain package for SEO resource schemas, provider contracts, and reusable templates.
display_order: 60
source: builtin
capabilities:
  - key: seo-research
    name: SEO Research
    description: Keyword, SERP, competitor, and source research contracts.
    kind: domain
  - key: seo-content
    name: SEO Content
    description: Content opportunity, brief, content piece, refresh, and link-opportunity records.
    kind: domain
  - key: seo-measurement
    name: SEO Measurement
    description: Search performance snapshots, observations, and experiment inputs.
    kind: domain
providers:
  - key: dataforseo
    name: DataForSEO
    description: SERP, keyword volume, and competitor research provider.
    auth_type: api-key
    auth_methods:
      - key: basic
        label: Login and password
        auth_type: basic
        payload_format: raw
        payload_field: password
        fields:
        - key: login
          label: API Login
          type: text
          secret: false
          required: true
          placeholder: login@example.com
        - key: password
          label: API Password
          type: secret
          secret: true
          required: true
    config:
      setup_note: DataForSEO uses HTTP Basic auth with the API login as username and API password as the daemon-held secret. Exposed StackOS actions stay limited to documented live SERP and keyword evidence endpoints.
      setup:
        credential_label: DataForSEO API login and password
        setup_note: Register for DataForSEO, open API access, then store the API login and API password in StackOS.
        homepage_url: https://dataforseo.com/
        signup_url: https://app.dataforseo.com/register
        console_url: https://app.dataforseo.com/
        api_key_url: https://app.dataforseo.com/api-access
        billing_url: https://app.dataforseo.com/billing
        docs_url: https://docs.dataforseo.com/
        verified_at: "2026-06-11"
        url_confidence:
          homepage_url: verified
          signup_url: directional
          console_url: directional
          api_key_url: directional
          billing_url: directional
          docs_url: verified
      docs:
        - https://docs.dataforseo.com/v3/serp-se-type-live-advanced/
        - https://docs.dataforseo.com/v3/keywords_data-google_ads-search_volume-live/
  - key: serper
    name: Serper.dev
    description: Google Search/SERP provider for compact live search-result evidence.
    auth_type: api-key
    auth_methods:
      - key: api_key
        label: API key
        auth_type: api-key
        payload_format: raw
        payload_field: api_key
        fields:
        - key: api_key
          label: Serper API Key
          type: secret
          secret: true
          required: true
    config:
      setup_note: Serper.dev Google Search requests use a daemon-held key in the provider header and consume provider credits. Keep searches bounded with explicit query, locale, page, and result-count inputs.
      setup:
        credential_label: Serper API key
        setup_note: Register with Serper, create or copy the API key, and store it in StackOS.
        homepage_url: https://serper.dev/
        signup_url: https://serper.dev/signup
        console_url: https://serper.dev/
        api_key_url: https://serper.dev/api-key
        billing_url: https://serper.dev/pricing
        docs_url: https://serper.dev/api
        fallback_url: https://serper.dev/
        fallback_reason: Exact dashboard routes can change; the official site is the fallback for key and usage setup.
        verified_at: "2026-06-11"
        url_confidence:
          homepage_url: verified
          signup_url: directional
          console_url: directional
          api_key_url: directional
          billing_url: verified
          docs_url: verified
          fallback_url: verified
      docs:
        - https://serper.dev/
  - key: ahrefs
    name: Ahrefs
    description: Organic keyword and backlink research provider; requires eligible API access and API units.
    auth_type: api-key
    auth_methods:
      - key: api_key
        label: API key
        auth_type: api-key
        payload_format: raw
        payload_field: api_key
        fields:
        - key: api_key
          label: API Key
          type: secret
          secret: true
          required: true
    config:
      setup_note: Ahrefs API v3 usage consumes API units; confirm Direct API eligibility, plan row caps, key limits, and remaining units before high-volume runs.
      setup:
        credential_label: Ahrefs API key
        setup_note: Confirm the Ahrefs plan has Direct API access/API units, then create or copy the API key and store it in StackOS. StackOS checks subscription usage before costed Ahrefs row calls.
        homepage_url: https://ahrefs.com/
        signup_url: https://app.ahrefs.com/user/sign-up
        console_url: https://app.ahrefs.com/
        api_key_url: https://app.ahrefs.com/api
        billing_url: https://app.ahrefs.com/account/subscription
        docs_url: https://docs.ahrefs.com/
        fallback_url: https://docs.ahrefs.com/
        fallback_reason: API access is plan/account gated; official API docs and Ahrefs app are the nearest setup path.
        verified_at: "2026-06-11"
        url_confidence:
          homepage_url: verified
          signup_url: directional
          console_url: directional
          api_key_url: directional
          billing_url: directional
          docs_url: verified
          fallback_url: verified
  - key: google-search-console
    name: Google Search Console
    description: Search Console site, sitemap, search analytics, and URL inspection evidence.
    auth_type: oauth
    auth_methods: &google_oauth_methods
      - key: oauth2_access_token
        label: OAuth2 access token
        auth_type: oauth
        payload_format: json
        fields:
        - key: access_token
          label: Access Token
          type: secret
          secret: true
          required: true
        - key: default_site_url
          label: Default Site URL
          type: text
          secret: false
          required: false
      - key: oauth2_refresh_token
        label: OAuth2 refresh token
        auth_type: oauth
        payload_format: json
        fields:
        - key: client_id
          label: OAuth Client ID
          type: secret
          secret: true
          required: true
        - key: client_secret
          label: OAuth Client Secret
          type: secret
          secret: true
          required: true
        - key: refresh_token
          label: Refresh Token
          type: secret
          secret: true
          required: true
        - key: default_site_url
          label: Default Site URL
          type: text
          secret: false
          required: false
    config:
      scopes:
        - https://www.googleapis.com/auth/webmasters.readonly
      setup_note: Use Google OAuth with the read-only Search Console scope. StackOS supports a direct access token or a daemon-held OAuth client refresh-token payload; no legacy gscOauth tools or GSC metric tables are used.
      setup:
        credential_label: Google Search Console OAuth credential
        setup_note: Create a Google Cloud OAuth client with Search Console API enabled, grant https://www.googleapis.com/auth/webmasters.readonly, and store either an access token or refresh-token credential in StackOS.
        homepage_url: https://search.google.com/search-console/about
        console_url: https://search.google.com/search-console
        api_key_url: https://console.cloud.google.com/apis/credentials
        docs_url: https://developers.google.com/webmaster-tools/v1/how-tos/authorizing
        fallback_url: https://developers.google.com/webmaster-tools/v1/how-tos/authorizing
        fallback_reason: OAuth consent and verified properties are account-specific; the official auth docs are the stable setup reference.
        verified_at: "2026-06-17"
        url_confidence:
          homepage_url: verified
          console_url: verified
          api_key_url: directional
          docs_url: verified
          fallback_url: verified
      docs:
        - https://developers.google.com/webmaster-tools/v1/how-tos/authorizing
        - https://developers.google.com/webmaster-tools/v1/sites/list
        - https://developers.google.com/webmaster-tools/v1/searchanalytics/query
        - https://developers.google.com/webmaster-tools/v1/sitemaps/list
        - https://developers.google.com/webmaster-tools/v1/urlInspection.index/inspect
  - key: google-analytics
    name: Google Analytics 4
    description: GA4 account discovery, metadata, standard reports, and realtime report reads.
    auth_type: oauth
    auth_methods:
      - key: oauth2_access_token
        label: OAuth2 access token
        auth_type: oauth
        payload_format: json
        fields:
        - key: access_token
          label: Access Token
          type: secret
          secret: true
          required: true
        - key: default_property_ref
          label: Default GA4 Property
          type: text
          secret: false
          required: false
      - key: oauth2_refresh_token
        label: OAuth2 refresh token
        auth_type: oauth
        payload_format: json
        fields:
        - key: client_id
          label: OAuth Client ID
          type: secret
          secret: true
          required: true
        - key: client_secret
          label: OAuth Client Secret
          type: secret
          secret: true
          required: true
        - key: refresh_token
          label: Refresh Token
          type: secret
          secret: true
          required: true
        - key: default_property_ref
          label: Default GA4 Property
          type: text
          secret: false
          required: false
    config:
      scopes:
        - https://www.googleapis.com/auth/analytics.readonly
      setup_note: Use Google OAuth with the Analytics read-only scope for GA4 Admin/Data API reporting. Measurement Protocol and Analytics write/admin scopes are intentionally deferred.
      setup:
        credential_label: Google Analytics OAuth credential
        setup_note: Create a Google Cloud OAuth client with Analytics Admin/Data APIs enabled, grant https://www.googleapis.com/auth/analytics.readonly, and store either an access token or refresh-token credential in StackOS.
        homepage_url: https://marketingplatform.google.com/about/analytics/
        console_url: https://analytics.google.com/analytics/web/
        api_key_url: https://console.cloud.google.com/apis/credentials
        docs_url: https://developers.google.com/analytics/devguides/reporting/data/v1
        fallback_url: https://developers.google.com/analytics/devguides/reporting/data/v1
        fallback_reason: OAuth consent, account access, and GA4 property ids are account-specific; the official Data API docs are the stable setup reference.
        verified_at: "2026-06-17"
        url_confidence:
          homepage_url: verified
          console_url: verified
          api_key_url: directional
          docs_url: verified
          fallback_url: verified
      docs:
        - https://developers.google.com/analytics/devguides/reporting/data/v1
        - https://developers.google.com/analytics/devguides/reporting/data/v1/rest/v1beta/properties/runReport
        - https://developers.google.com/analytics/devguides/reporting/data/v1/rest/v1beta/properties/getMetadata
        - https://developers.google.com/analytics/devguides/reporting/data/v1/rest/v1beta/properties/runRealtimeReport
        - https://developers.google.com/analytics/devguides/config/admin/v1/rest/v1beta/accountSummaries/list
  - key: google-tag-manager
    name: Google Tag Manager
    description: Tag Manager account, container, workspace, tag, trigger, and install snippet reads.
    auth_type: oauth
    auth_methods:
      - key: oauth2_access_token
        label: OAuth2 access token
        auth_type: oauth
        payload_format: json
        fields:
        - key: access_token
          label: Access Token
          type: secret
          secret: true
          required: true
        - key: default_account_ref
          label: Default Account Ref
          type: text
          secret: false
          required: false
      - key: oauth2_refresh_token
        label: OAuth2 refresh token
        auth_type: oauth
        payload_format: json
        fields:
        - key: client_id
          label: OAuth Client ID
          type: secret
          secret: true
          required: true
        - key: client_secret
          label: OAuth Client Secret
          type: secret
          secret: true
          required: true
        - key: refresh_token
          label: Refresh Token
          type: secret
          secret: true
          required: true
        - key: default_account_ref
          label: Default Account Ref
          type: text
          secret: false
          required: false
    config:
      scopes:
        - https://www.googleapis.com/auth/tagmanager.readonly
      setup_note: Use Google OAuth with the Tag Manager read-only scope. Container/workspace mutations, versioning, publish, and permission-management scopes are intentionally deferred.
      setup:
        credential_label: Google Tag Manager OAuth credential
        setup_note: Create a Google Cloud OAuth client with Tag Manager API enabled, grant https://www.googleapis.com/auth/tagmanager.readonly, and store either an access token or refresh-token credential in StackOS.
        homepage_url: https://tagmanager.google.com/
        console_url: https://tagmanager.google.com/
        api_key_url: https://console.cloud.google.com/apis/credentials
        docs_url: https://developers.google.com/tag-platform/tag-manager/api/v2
        fallback_url: https://developers.google.com/tag-platform/tag-manager/api/v2/authorization
        fallback_reason: OAuth consent, account access, and container refs are account-specific; the official API docs are the stable setup reference.
        verified_at: "2026-06-17"
        url_confidence:
          homepage_url: verified
          console_url: verified
          api_key_url: directional
          docs_url: verified
          fallback_url: verified
      docs:
        - https://developers.google.com/tag-platform/tag-manager/api/v2
        - https://developers.google.com/tag-platform/tag-manager/api/v2/authorization
        - https://developers.google.com/tag-platform/tag-manager/api/v2/reference/accounts/list
        - https://developers.google.com/tag-platform/tag-manager/api/v2/reference/accounts/containers/list
        - https://developers.google.com/tag-platform/tag-manager/api/v2/reference/accounts/containers/snippet
        - https://developers.google.com/tag-platform/tag-manager/api/v2/reference/accounts/containers/workspaces/list
        - https://developers.google.com/tag-platform/tag-manager/api/v2/reference/accounts/containers/workspaces/tags/list
        - https://developers.google.com/tag-platform/tag-manager/api/v2/reference/accounts/containers/workspaces/triggers/list
