schema_version: stackos.workflow-template.v1
key: branding.evidence-harvest
name: Branding Evidence Harvest
version: 0.1.0
description: Scheduled or on-demand workflow for sweeping project-adapted sources of record, classifying receipts, deduping them, and bringing evidence-items to an operator clearance gate.
domain: branding
owner:
  team: StackOS
when_to_use:
  - Evidence sources need to be harvested before authority content production.
  - A project wants raw operational receipts classified by stream, altitude, and public-use readiness.
when_not_to_use:
  - A draft already exists and only needs adversarial review; use branding.piece-review.
  - The user wants to publish; use branding.distribution-run after approved pieces and renditions exist.
agent_requirements:
  - role: evidence-curator
    requirement: required
    agent_preset_ref: branding.evidence-curator
    purpose: Sweep sources of record, classify candidates, dedupe, and capture evidence without embellishment.
    applies_to_steps:
      - sweep-sources
      - classify-candidates
      - dedupe-evidence
      - capture-evidence
  - role: sanitization-reviewer
    requirement: required
    agent_preset_ref: branding.sanitization-reviewer
    purpose: Apply disclosure policy and prepare cleared or blocked recommendations for operator clearance.
    applies_to_steps:
      - clearance-gate
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Operate StackOS resources, workflow runs, approvals, and evidence records.
skill_preset_requirements:
  - skill_preset_ref: branding.brand-orchestrator
    requirement: required
    purpose: Keep harvested evidence canonical in StackOS and require project adaptation before any source sweep.
    applies_to_steps:
      - sweep-sources
      - classify-candidates
      - dedupe-evidence
      - capture-evidence
      - clearance-gate
inputs:
  - key: source_scope
    name: Source Scope
    type: object
    required: false
    description: Project-adapted source refs, time window, and stream filters to sweep.
  - key: stream_refs
    name: Stream Refs
    type: array
    required: false
    description: Optional stream refs to bias classification and dedupe.
  - key: harvest_window
    name: Harvest Window
    type: string
    required: false
    description: Operator-readable time window such as last week or since last harvest.
context_requirements:
  - id: existing_evidence
    source: resources
    purpose: Dedupe candidates against existing evidence-items.
    filters:
      plugin_slug: branding
      resource_keys:
        - evidence-item
    fields:
      - title
      - status
      - data_json
      - updated_at
    max_items: 50
    return_mode: compact
  - id: active_streams
    source: resources
    purpose: Classify evidence against stream altitude, source-of-record descriptions, and default channel priors.
    filters:
      plugin_slug: branding
      resource_keys:
        - stream
    fields:
      - title
      - status
      - data_json
    max_items: 30
    return_mode: compact
  - id: brand_profiles
    source: resources
    purpose: Read generic clearance and sanitization refs from the active brand profile.
    filters:
      plugin_slug: branding
      resource_keys:
        - brand-profile
    fields:
      - title
      - status
      - data_json
    max_items: 5
    return_mode: compact
capability_requirements:
  - key: evidence-governance
    required: true
    description: Capture and clear reusable evidence with traceability.
action_contracts:
  - key: evidence_capture
    action: evidence.capture
    capability: evidence-governance
    risk_level: write
  - key: sanitize_mark
    action: evidence.sanitize-mark
    capability: evidence-governance
    risk_level: write
resource_contracts:
  - key: evidence_items
    resource: evidence-item
    purpose: Captured receipts with source traceability and sanitization status.
    required: true
  - key: streams
    resource: stream
    purpose: Stream definitions used for classification.
    required: true
policies:
  - key: evidence_over_assertion
    kind: evidence
    description: Capture receipts as receipts. Do not infer claims or embellish missing facts during harvest.
  - key: source_traceability
    kind: traceability
    description: Every evidence-item must retain source system, source ref, capture date, and classification rationale.
approval_gates:
  - key: operator_clearance
    description: Operator marks harvested evidence-items cleared or blocked for public use; raw items cannot support claims.
    required_when: always
    approver: operator
steps:
  - id: sweep-sources
    title: Sweep Sources
    purpose: Inspect project-adapted sources of record for candidate operational receipts.
    input_refs:
      - source_scope
      - harvest_window
    context_refs:
      - active_streams
      - brand_profiles
    policy_refs:
      - source_traceability
    output_refs:
      - candidate_evidence
    success_criteria:
      - Candidate receipts are copied as structured summaries with source refs, not interpreted claims.
      - Missing source adapters or inaccessible sources are reported as blockers, not skipped silently.
  - id: classify-candidates
    title: Classify Candidates
    purpose: Classify each candidate by evidence type, stream fit, altitude, and public-use risk.
    depends_on:
      - sweep-sources
    input_refs:
      - stream_refs
    context_refs:
      - active_streams
    policy_refs:
      - evidence_over_assertion
    output_refs:
      - classified_candidates
    success_criteria:
      - Each candidate has evidence type, likely stream refs, altitude, and clearance recommendation.
  - id: dedupe-evidence
    title: Dedupe Evidence
    purpose: Compare candidates against existing evidence-items and merge references instead of duplicating receipts.
    depends_on:
      - classify-candidates
    context_refs:
      - existing_evidence
    resource_refs:
      - evidence_items
    output_refs:
      - deduped_evidence
    success_criteria:
      - Duplicate candidates are linked to existing records with a reason.
      - New candidates retain source traceability.
  - id: capture-evidence
    title: Capture Evidence
    purpose: Persist deduped evidence candidates as raw evidence-items.
    depends_on:
      - dedupe-evidence
    action_refs:
      - evidence_capture
    resource_refs:
      - evidence_items
    output_refs:
      - captured_evidence_refs
    success_criteria:
      - Each captured item starts raw; clearance requires the separate operator gate and sanitize-mark verdict.
      - Stored records include source, capture date, stream refs, and altitude.
  - id: clearance-gate
    title: Clearance Gate
    purpose: Present harvested evidence for operator cleared or blocked verdicts.
    depends_on:
      - capture-evidence
    action_refs:
      - sanitize_mark
    resource_refs:
      - evidence_items
    policy_refs:
      - evidence_over_assertion
    approval_refs:
      - operator_clearance
    output_refs:
      - clearance_summary
    success_criteria:
      - Cleared and blocked items include reviewer, reason, and timestamp.
      - Blocked verdicts win conflicts and are visible to future production runs.
outputs:
  - key: candidate_evidence
    type: array
  - key: classified_candidates
    type: array
  - key: deduped_evidence
    type: array
  - key: captured_evidence_refs
    type: array
  - key: clearance_summary
    type: object
failure_handling:
  - If sources cannot be reached, stop with a source-specific blocker and do not synthesize missing evidence.
  - If clearance is ambiguous, leave the item raw; raw evidence cannot support public claims.
metadata:
  plugin_slug: branding
  cadence: scheduled-or-on-demand
  grants:
    - context.query
    - resource.upsert
    - action.execute:evidence_capture
    - action.execute:sanitize_mark
