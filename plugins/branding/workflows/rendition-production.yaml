schema_version: stackos.workflow-template.v1
key: branding.rendition-production
name: Branding Rendition Production
version: 0.1.0
description: Turn an approved canonical piece into approved, ready-to-publish channel renditions without introducing new claims.
domain: branding
owner:
  team: StackOS
when_to_use:
  - A content-piece is approved and needs channel-specific renditions.
  - Planned channel forms need review as one governed rendition set.
when_not_to_use:
  - The canonical piece is not approved; use branding.piece-production first.
agent_requirements:
  - role: narrative-writer
    requirement: required
    agent_preset_ref: branding.narrative-writer
    purpose: Render channel forms from canonical content and charter constraints.
    applies_to_steps:
      - render-renditions
  - role: voice-reviewer
    requirement: required
    agent_preset_ref: branding.voice-reviewer
    purpose: Check each rendition against base voice plus channel charter.
    applies_to_steps:
      - channel-voice-check
  - role: claim-auditor
    requirement: required
    agent_preset_ref: branding.claim-auditor
    purpose: Verify renditions inherit the canonical evidence map and introduce no new claims.
    applies_to_steps:
      - claim-consistency-check
  - role: sanitization-reviewer
    requirement: required
    agent_preset_ref: branding.sanitization-reviewer
    purpose: Re-check the complete rendition set for disclosure risk before operator approval.
    applies_to_steps:
      - rendition-sanitization-check
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Keep rendition artifacts and content-piece state canonical.
skill_preset_requirements:
  - skill_preset_ref: branding.brand-orchestrator
    requirement: required
    purpose: Coordinate rendering, review, approval, and state update.
inputs:
  - key: content_piece_ref
    name: Content Piece Ref
    type: string
    required: true
  - key: channel_refs
    name: Channel Refs
    type: array
    required: false
context_requirements:
  - id: approved_pieces
    source: resources
    purpose: Load approved content-piece, canonical artifact, evidence map, and channel plan.
    filters:
      plugin_slug: branding
      resource_keys:
        - content-piece
    fields:
      - title
      - status
      - data_json
    max_items: 20
    return_mode: compact
  - id: channel_charters
    source: resources
    purpose: Use channel form contracts, register deltas, and publication modes.
    filters:
      plugin_slug: branding
      resource_keys:
        - channel
    fields:
      - title
      - status
      - data_json
    max_items: 30
    return_mode: compact
capability_requirements:
  - key: authority-content
    required: true
  - key: image-generation
    required: false
    description: Optional generated supporting media when a channel charter explicitly asks for it.
    preferred_providers:
      - openai-images
auth_requirements:
  - key: openai_images
    provider: openai-images
    auth_type: api-key
    optional: true
    description: Optional daemon-held key for generated supporting imagery.
action_contracts:
  - key: image_generate
    action: utils.image.generate
    capability: image-generation
    provider: openai-images
    optional: true
    risk_level: cost
    auth_ref: openai_images
    approval_ref: generation_budget_review
resource_contracts:
  - key: content_piece
    resource: content-piece
    purpose: Approved canonical piece and renditions.
    required: true
  - key: channels
    resource: channel
    purpose: Channel charters and form contracts.
    required: true
policies:
  - key: no_new_claims
    kind: evidence
    description: Renditions may compress but never introduce claims outside the canonical evidence map.
  - key: channel_form_contract
    kind: channel
    description: Each rendition must satisfy the target channel charter.
  - key: fail_closed_disclosure
    kind: disclosure
    description: Rendition sets are blocked when disclosure risk is unclear.
approval_gates:
  - key: generation_budget_review
    description: Operator approves optional generation spend for supporting imagery.
    required_when: when generated supporting imagery is requested
    approver: operator
  - key: rendition_set_approval
    description: Operator approves the complete rendition set as ready to publish.
    required_when: always
    approver: operator
steps:
  - id: load-approved-piece
    title: Load Approved Piece
    purpose: Confirm the canonical piece is approved and has a channel plan.
    input_refs:
      - content_piece_ref
      - channel_refs
    context_refs:
      - approved_pieces
      - channel_charters
    resource_refs:
      - content_piece
      - channels
    output_refs:
      - rendition_brief
    success_criteria:
      - Canonical artifact, evidence map, approval ref, and channel plan are present.
  - id: render-renditions
    title: Render Renditions
    purpose: Produce channel-specific text and optional supporting media from canonical content.
    depends_on:
      - load-approved-piece
    action_refs:
      - image_generate
    approval_refs:
      - generation_budget_review
    resource_refs:
      - content_piece
      - channels
    policy_refs:
      - no_new_claims
      - channel_form_contract
    output_refs:
      - rendition_artifacts
    success_criteria:
      - Compression preserves meaning and evidence lineage.
      - Optional imagery is charter-driven and approved before spend.
  - id: channel-voice-check
    title: Channel Voice Check
    purpose: Check each rendition against base register, channel register delta, and kill tests.
    depends_on:
      - render-renditions
    context_refs:
      - channel_charters
    policy_refs:
      - channel_form_contract
    output_refs:
      - channel_voice_report
    success_criteria:
      - Voice findings are per channel and do not alter claim facts.
  - id: claim-consistency-check
    title: Claim Consistency Check
    purpose: Verify no rendition adds a claim absent from canonical.
    depends_on:
      - channel-voice-check
    resource_refs:
      - content_piece
    policy_refs:
      - no_new_claims
    output_refs:
      - claim_consistency_report
    success_criteria:
      - Every rendition inherits the canonical evidence map.
      - New unsupported claims are cut before approval.
  - id: rendition-sanitization-check
    title: Rendition Sanitization Check
    purpose: Apply the project disclosure policy to the complete rendition set.
    depends_on:
      - claim-consistency-check
    policy_refs:
      - fail_closed_disclosure
    resource_refs:
      - content_piece
    output_refs:
      - rendition_sanitization_report
    success_criteria:
      - Verdict is cleared or blocked with reasons.
      - Blocked or ambiguous disclosure risk stops rendition-set approval.
  - id: approve-rendition-set
    title: Approve Rendition Set
    purpose: Operator approves all channel renditions together.
    depends_on:
      - rendition-sanitization-check
    approval_refs:
      - rendition_set_approval
    resource_refs:
      - content_piece
    output_refs:
      - renditions_ready_ref
    success_criteria:
      - Content-piece status is renditions-ready.
      - Rendition artifacts and review reports are attached.
outputs:
  - key: rendition_brief
    type: object
  - key: rendition_artifacts
    type: array
  - key: channel_voice_report
    type: object
  - key: claim_consistency_report
    type: object
  - key: rendition_sanitization_report
    type: object
  - key: renditions_ready_ref
    type: string
failure_handling:
  - If a rendition needs facts not in canonical, return to piece-production rather than patching the rendition.
metadata:
  plugin_slug: branding
  grants:
    - resource.upsert
    - artifact.create
    - action.execute:image_generate
