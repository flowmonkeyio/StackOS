schema_version: stackos.workflow-template.v1
key: branding.digest-assembly
name: Branding Digest Assembly
version: 0.1.0
description: Cadence-triggered email digest assembly where email is a relationship channel and aggregation unit, not mechanical per-piece fan-out.
domain: branding
owner:
  team: StackOS
when_to_use:
  - An email channel charter calls for cadence-based aggregation.
  - Approved canonical pieces should be summarized into a digest-type content-piece.
when_not_to_use:
  - A single milestone email is planned as a standalone piece; use piece-production and distribution-run.
agent_requirements:
  - role: distribution-strategist
    requirement: required
    agent_preset_ref: branding.distribution-strategist
    purpose: Select member pieces according to the email charter and outcome context.
    applies_to_steps:
      - select-member-pieces
  - role: narrative-writer
    requirement: required
    agent_preset_ref: branding.narrative-writer
    purpose: Compose digest introduction and summaries without adding new member claims.
    applies_to_steps:
      - compose-digest
  - role: claim-auditor
    requirement: required
    agent_preset_ref: branding.claim-auditor
    purpose: Verify the digest introduction and summaries add no unsupported factual claims beyond member pieces.
    applies_to_steps:
      - aggregate-claim-check
  - role: voice-reviewer
    requirement: required
    agent_preset_ref: branding.voice-reviewer
    purpose: Check aggregate letter register.
    applies_to_steps:
      - aggregate-voice-check
  - role: sanitization-reviewer
    requirement: required
    agent_preset_ref: branding.sanitization-reviewer
    purpose: Re-check the aggregate package for disclosure risk.
    applies_to_steps:
      - aggregate-sanitization-check
  - role: distribution-operator
    requirement: required
    agent_preset_ref: branding.distribution-operator
    purpose: Send only the approved digest through ESP action or operator-assisted handoff.
    applies_to_steps:
      - send-digest
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Resolve approved pieces, create digest content-piece, execute send action, and record distribution.
skill_preset_requirements:
  - skill_preset_ref: branding.brand-orchestrator
    requirement: required
    purpose: Keep digest assembly aligned with canonical evidence and approvals.
inputs:
  - key: email_channel_ref
    name: Email Channel Ref
    type: string
    required: true
  - key: digest_window
    name: Digest Window
    type: string
    required: true
context_requirements:
  - id: approved_pieces
    source: resources
    purpose: Approved canonical pieces eligible for digest membership.
    filters:
      plugin_slug: branding
      resource_keys:
        - content-piece
    fields:
      - title
      - status
      - data_json
      - updated_at
    max_items: 50
    return_mode: compact
  - id: email_channels
    source: resources
    purpose: Email channel charter, relationship register, cadence, and ESP/operator mode.
    filters:
      plugin_slug: branding
      resource_keys:
        - channel
    fields:
      - title
      - status
      - data_json
    max_items: 10
    return_mode: compact
capability_requirements:
  - key: authority-content
    required: true
  - key: content-distribution
    required: true
auth_requirements:
  - key: esp
    provider: esp
    auth_type: api-key
    optional: true
action_contracts:
  - key: publish_email
    action: publish.email
    capability: content-distribution
    provider: esp
    optional: true
    risk_level: write
    auth_ref: esp
    approval_ref: digest_send_approval
resource_contracts:
  - key: content_piece
    resource: content-piece
    purpose: Digest-type content-piece and member references.
    required: true
  - key: channel
    resource: channel
    purpose: Email channel charter.
    required: true
  - key: distribution_records
    resource: distribution-record
    purpose: Digest send and outcome schedule.
    required: true
policies:
  - key: email_is_aggregated
    kind: channel
    description: Email digest distribution is cadence-aggregated, not per-piece fan-out.
  - key: member_claims_already_cleared
    kind: evidence
    description: Member claims come from approved pieces; digest intro cannot add unsupported claims.
approval_gates:
  - key: digest_send_approval
    description: Operator approves digest content and send in one gate.
    required_when: always
    approver: operator
steps:
  - id: select-member-pieces
    title: Select Member Pieces
    purpose: Choose approved canonical pieces since the last digest according to the email charter.
    input_refs:
      - email_channel_ref
      - digest_window
    context_refs:
      - approved_pieces
      - email_channels
    resource_refs:
      - content_piece
      - channel
    policy_refs:
      - email_is_aggregated
    output_refs:
      - selected_members
    success_criteria:
      - Selection rationale is recorded.
      - Excluded eligible pieces have reasons.
  - id: compose-digest
    title: Compose Digest
    purpose: Create digest-type content-piece with letter-register intro and summaries linking canonical homes.
    depends_on:
      - select-member-pieces
    resource_refs:
      - content_piece
    policy_refs:
      - member_claims_already_cleared
    output_refs:
      - digest_artifact
    success_criteria:
      - Digest links each member canonical URL.
      - No new factual claims are added outside member evidence.
  - id: aggregate-claim-check
    title: Aggregate Claim Check
    purpose: Verify the digest intro and member summaries add no unsupported factual claims.
    depends_on:
      - compose-digest
    resource_refs:
      - content_piece
    policy_refs:
      - member_claims_already_cleared
    output_refs:
      - claim_report
    success_criteria:
      - New digest framing claims are either traced to member evidence or cut.
      - Member summaries preserve canonical claim meaning and canonical links.
  - id: aggregate-voice-check
    title: Aggregate Voice Check
    purpose: Review the digest as one relationship-channel artifact.
    depends_on:
      - aggregate-claim-check
    context_refs:
      - email_channels
    output_refs:
      - voice_report
    success_criteria:
      - Findings distinguish aggregate voice from member content.
  - id: aggregate-sanitization-check
    title: Aggregate Sanitization Check
    purpose: Re-check the assembled digest for disclosure risk.
    depends_on:
      - aggregate-voice-check
    output_refs:
      - sanitization_report
    success_criteria:
      - Verdict is cleared or blocked with reasons.
  - id: send-digest
    title: Send Digest
    purpose: After operator approval, send via ESP action or create operator-assisted packet and distribution record.
    depends_on:
      - aggregate-sanitization-check
    action_refs:
      - publish_email
    approval_refs:
      - digest_send_approval
    resource_refs:
      - distribution_records
      - content_piece
    output_refs:
      - digest_distribution_record_ref
    success_criteria:
      - Send or handoff is recorded as one distribution-record.
      - Outcome snapshot schedule is initialized.
outputs:
  - key: selected_members
    type: array
  - key: digest_artifact
    type: object
  - key: claim_report
    type: object
  - key: voice_report
    type: object
  - key: sanitization_report
    type: object
  - key: digest_distribution_record_ref
    type: string
failure_handling:
  - If there are no qualifying pieces, record no-send rationale rather than manufacturing filler.
metadata:
  plugin_slug: branding
  grants:
    - context.query
    - resource.upsert
    - artifact.create
    - action.execute:publish_email
