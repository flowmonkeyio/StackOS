schema_version: stackos.workflow-template.v1
key: branding.piece-production
name: Branding Piece Production
version: 0.1.0
description: Produce an approved canonical evidence-grounded piece with a decided and confirmed channel plan.
domain: branding
owner:
  team: StackOS
when_to_use:
  - A stream is ready to turn cleared evidence into a canonical authority piece.
  - Routing, drafting, adversarial review, sanitization, and operator approval must be governed together.
when_not_to_use:
  - The piece is already approved and needs channel versions; use branding.rendition-production.
  - The task is only review of an existing draft; use branding.piece-review.
agent_requirements:
  - role: distribution-strategist
    requirement: required
    agent_preset_ref: branding.distribution-strategist
    purpose: Decide channel plan before drafting and confirm it after the canonical draft exists.
    applies_to_steps:
      - route-piece
      - confirm-plan
  - role: narrative-writer
    requirement: required
    agent_preset_ref: branding.narrative-writer
    purpose: Draft canonical piece from cleared evidence only in the adapted operator voice.
    applies_to_steps:
      - draft-canonical
  - role: claim-auditor
    requirement: required
    agent_preset_ref: branding.claim-auditor
    purpose: Trace every claim to cleared evidence or cut it.
    applies_to_steps:
      - claim-audit
  - role: voice-reviewer
    requirement: required
    agent_preset_ref: branding.voice-reviewer
    purpose: Apply base voice register and kill tests without changing evidence.
    applies_to_steps:
      - voice-check
  - role: sanitization-reviewer
    requirement: required
    agent_preset_ref: branding.sanitization-reviewer
    purpose: Fail closed on disclosure risk with cleared or blocked verdicts.
    applies_to_steps:
      - sanitization-check
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Keep content-piece, evidence, decision, artifact, and approval state canonical in StackOS.
skill_preset_requirements:
  - skill_preset_ref: branding.brand-orchestrator
    requirement: required
    purpose: Coordinate evidence lock, channel plan, specialist handoffs, and operator approval.
inputs:
  - key: stream_ref
    name: Stream Ref
    type: string
    required: true
  - key: operator_intent
    name: Operator Intent
    type: string
    required: false
  - key: evidence_refs
    name: Evidence Refs
    type: array
    required: false
  - key: target_altitude
    name: Target Altitude
    type: string
    required: false
context_requirements:
  - id: cleared_evidence
    source: resources
    purpose: Use only cleared evidence-items in the evidence pack.
    filters:
      plugin_slug: branding
      resource_keys:
        - evidence-item
    fields:
      - title
      - status
      - data_json
    max_items: 50
    return_mode: compact
  - id: active_streams
    source: resources
    purpose: Read stream outline, altitude, cadence, and default channel plan.
    filters:
      plugin_slug: branding
      resource_keys:
        - stream
    fields:
      - title
      - status
      - data_json
    max_items: 20
    return_mode: compact
  - id: channel_charters
    source: resources
    purpose: Read channel criteria and form constraints before routing.
    filters:
      plugin_slug: branding
      resource_keys:
        - channel
    fields:
      - title
      - status
      - data_json
    max_items: 30
    return_mode: compact
  - id: routing_policies
    source: resources
    purpose: Enforce canonical-first, stagger windows, and routing decision requirements.
    filters:
      plugin_slug: branding
      resource_keys:
        - routing-policy
    fields:
      - title
      - status
      - data_json
    max_items: 5
    return_mode: compact
  - id: brand_profiles
    source: resources
    purpose: Apply adapted identity, voice rules, editorial filter, and sanitization policy ref.
    filters:
      plugin_slug: branding
      resource_keys:
        - brand-profile
    fields:
      - title
      - status
      - data_json
    max_items: 5
    return_mode: compact
capability_requirements:
  - key: authority-content
    required: true
  - key: evidence-governance
    required: true
action_contracts: []
resource_contracts:
  - key: content_piece
    resource: content-piece
    purpose: Canonical piece record with evidence map, channel plan, and status.
    required: true
  - key: evidence_items
    resource: evidence-item
    purpose: Cleared receipts that support claims.
    required: true
  - key: channels
    resource: channel
    purpose: Channel charters used for routing.
    required: true
  - key: routing_policy
    resource: routing-policy
    purpose: Governed cross-channel policy.
    required: true
policies:
  - key: evidence_over_assertion
    kind: evidence
    description: Every claim maps to cleared evidence or is cut.
  - key: route_before_form
    kind: routing
    description: Channel plan is decided before drafting so form follows destination.
  - key: review_separation
    kind: governance
    description: Claim, voice, and sanitization checks are separate read-only steps.
approval_gates:
  - key: piece_and_plan_approval
    description: Operator signs the canonical piece and channel plan together after evidence, voice, sanitization, and plan confirmation pass.
    required_when: always
    approver: operator
steps:
  - id: assemble-evidence
    title: Assemble Evidence Pack
    purpose: Select cleared evidence only and build the traceable evidence pack.
    input_refs:
      - stream_ref
      - evidence_refs
      - target_altitude
    context_refs:
      - cleared_evidence
      - active_streams
      - brand_profiles
    resource_refs:
      - evidence_items
    policy_refs:
      - evidence_over_assertion
    output_refs:
      - evidence_pack
    success_criteria:
      - Raw or blocked evidence is excluded.
      - Evidence gaps are explicit before drafting.
  - id: route-piece
    title: Route Piece
    purpose: Decide channel plan from stream default, channel charters, and routing policy before drafting.
    depends_on:
      - assemble-evidence
    context_refs:
      - active_streams
      - channel_charters
      - routing_policies
    resource_refs:
      - channels
      - routing_policy
    policy_refs:
      - route_before_form
    output_refs:
      - channel_plan
    success_criteria:
      - Every planned channel has rationale and decision ref.
      - Deviations from stream defaults are justified before drafting.
  - id: draft-canonical
    title: Draft Canonical
    purpose: Draft the canonical home shaped by the primary planned form.
    depends_on:
      - route-piece
    input_refs:
      - operator_intent
    context_refs:
      - brand_profiles
    resource_refs:
      - content_piece
    output_refs:
      - canonical_draft_artifact
    success_criteria:
      - Draft uses first person when the project overlay requires it.
      - No facts absent from the evidence pack are introduced.
  - id: claim-audit
    title: Claim Audit
    purpose: Adversarially map every claim to cleared evidence or cut it.
    depends_on:
      - draft-canonical
    resource_refs:
      - evidence_items
      - content_piece
    policy_refs:
      - evidence_over_assertion
      - review_separation
    output_refs:
      - claim_audit_report
    success_criteria:
      - Unsupported claims are marked cut, not softened.
      - Claim evidence map is ready to attach to the content-piece.
  - id: voice-check
    title: Voice Check
    purpose: Apply adapted base register and kill tests after claim audit.
    depends_on:
      - claim-audit
    context_refs:
      - brand_profiles
    policy_refs:
      - review_separation
    output_refs:
      - voice_review_report
    success_criteria:
      - Voice findings do not introduce new claims.
  - id: sanitization-check
    title: Sanitization Check
    purpose: Apply disclosure policy and fail closed when public-use safety is unclear.
    depends_on:
      - voice-check
    context_refs:
      - brand_profiles
    policy_refs:
      - review_separation
    output_refs:
      - sanitization_report
    success_criteria:
      - Verdict is cleared or blocked with reasons.
      - Blocked findings stop approval.
  - id: confirm-plan
    title: Confirm Channel Plan
    purpose: Strategist re-checks the plan against the actual canonical draft.
    depends_on:
      - sanitization-check
    context_refs:
      - channel_charters
      - routing_policies
    resource_refs:
      - channels
      - routing_policy
    output_refs:
      - confirmed_channel_plan
    success_criteria:
      - Plan still matches the draft and charters.
      - Any adjustment has recorded rationale.
  - id: approve-and-record
    title: Approve And Record
    purpose: Operator approves piece and channel plan together; record approved content-piece.
    depends_on:
      - confirm-plan
    resource_refs:
      - content_piece
    approval_refs:
      - piece_and_plan_approval
    output_refs:
      - approved_content_piece_ref
    success_criteria:
      - Content-piece status is approved.
      - Evidence map, canonical draft artifact, and channel plan are attached.
outputs:
  - key: evidence_pack
    type: object
  - key: channel_plan
    type: array
  - key: canonical_draft_artifact
    type: object
  - key: claim_audit_report
    type: object
  - key: voice_review_report
    type: object
  - key: sanitization_report
    type: object
  - key: confirmed_channel_plan
    type: array
  - key: approved_content_piece_ref
    type: string
failure_handling:
  - If any review blocks, return to the owning step with findings and do not request approval.
  - If no cleared evidence supports the intended point, stop production and ask for more evidence.
metadata:
  plugin_slug: branding
  grants:
    - context.query
    - resource.upsert
    - artifact.create
    - decision.record
