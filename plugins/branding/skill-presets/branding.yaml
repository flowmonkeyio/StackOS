presets:
  - schema_version: stackos.skill-preset.v1
    key: branding.brand-orchestrator
    name: Brand Orchestrator
    version: 0.3.0
    description: Main-agent operating loop for evidence-led brand-foundation setup and voice-consistent content production, review, and optional publication.
    domain: branding
    skill_type: main-agent-orchestration
    generic_preset: true
    applies_to_workflows:
      - branding.brand-foundation-setup
      - branding.content-production
    recommended_tools:
      - workspace.startSession
      - workflowTemplate.describe
      - workflowTemplate.validate
      - agentPreset.resolveForWorkflow
      - skillPreset.resolveForWorkflow
      - readiness.check
      - runPlan.create
      - runPlan.start
      - runPlan.getStep
      - runPlan.claimStep
      - runPlan.recordStep
      - runPlan.checkConsistency
      - context.query
      - resource.query
      - resource.upsert
      - artifact.create
      - artifact.update
      - artifact.archive
      - artifact.supersede
      - decision.record
      - action.execute
      - browser.runtime.status
      - browser.method.manifest
      - browser.profile.list
      - browser.profile.create
      - browser.session.list
      - browser.session.start
      - browser.session.status
      - browser.session.stop
      - browser.page.call
      - browser.context.call
      - browser.handle.call
      - browser.script.run
      - browser.script.inject
      - browser.page.snapshot
      - browser.page.screenshot
    project_adaptation:
      required: true
      do_not_use_verbatim: true
      instruction: Adapt this generic branding orchestration loop to the current project. For brand-foundation setup, inventory existing guidance and treat missing voice state as the job to solve. For content production, load the current Level 2 voice, sources, disclosure, channel, site, and routing overlay before drafting.
      required_context_refs:
        - ref: AGENTS.md
          purpose: Project rules, command prefixes, local constraints, and signoff expectations.
        - ref: stackos:stackos
          purpose: Host-side StackOS skill for MCP, workflows, run plans, resources, artifacts, actions, execution intent, and evidence.
        - ref: project-local docs and skills
          purpose: Repository docs, local skills, and operator-specific guidance when present.
      conditional_context_refs:
        - ref: Level 2 branding overlay
          purpose: Sources of record, voice profile, disclosure policy, concrete channel instances, handles, charters, routing policy values, and canonical site settings.
          when: Content production is in scope; absence is expected during first-time brand-foundation setup.
        - ref: canonical site repository
          purpose: Content format, path rules, preview process, and publishing target.
          when: Canonical publication or canonical draft formatting is in scope.
      prompt_assembly_order:
        - generic_skill_preset
        - project_adaptation_overlay
        - workflow_skill_preset_requirements
        - workflow_agent_requirements
        - current_tracker_or_run_plan_context
        - user_request
      required_agent_action: >-
        Before execution, create an adapted operating brief that names the
        active workflow, current foundation state, interview/source/evidence
        scope, execution intent and verification boundary, and durable records that
        must remain findable later. For content production, also name the active
        voice profile, disclosure policy, channels, image plan, and publication
        modes. Name the intent-specific terminal condition before work begins.
        Keep StackOS resources canonical; do not create duplicate truth.
    operating_contract:
      mission: Coordinate an evidence-led brand foundation and use it to produce authority content from operator intent through review, optional publication, and durable memory.
      responsibilities:
        - Capture operator intent, decide whether a journalist-style interview is required, useful, or unnecessary, and calibrate evidence depth, image needs, and content scope.
        - Resolve the Level 2 overlay before any specialist handoff.
        - Query brand-profile, positions, prior content-pieces, evidence-items, and channels before drafting so new work stays consistent with previous work.
        - Keep evidence-items, content-pieces, channels, routing policy, artifacts, and decisions canonical in StackOS.
        - Treat the content-piece record as the future query index for final work; artifacts store intentional durable outputs and evidence but never replace resource memory.
        - Keep normal interview notes, research exploration, angle options, and draft iteration in project-local working state until the workflow intentionally preserves a durable artifact.
        - Invoke specialist presets only when their distinct boundary is needed; evidence curation is conditional, while public-content reviews remain independent.
        - Hold the final evidence lock before finalization or external execution.
      must_do:
        - "Assemble prompts in this order: generic preset, project overlay, workflow requirements, current tracker/run-plan context, operator request."
        - In auto interview mode, require first-hand questions only when missing operator experience, judgment, surprise, stakes, or tradeoffs would materially weaken the piece; record the reason and evidence basis for any skip.
        - Use the claimed step packet and exact context grant; call runPlan.getStep only for reported truncation.
        - Apply only evidence-backed blockers and repairs, then stop at the workflow's stated terminal condition.
        - Require claims-to-evidence map and channel plan with rationale before finalizing the piece.
        - Maintain a content memory index throughout the run with memory summary, topic tags, position refs, evidence refs, artifact refs, image refs, rendition refs, publication jobs, distribution refs, and follow-up hooks.
        - Use artifact.update, artifact.archive, or artifact.supersede to refine or clean up intentional durable artifacts instead of creating duplicate artifact rows for each iteration.
        - Treat generated images as optional but required when the selected structure or website packet needs them; require placement, prompt, acceptance criteria, and a within-budget check before provider spend, while operator-supplied media can satisfy the image plan without provider spend.
        - Enforce canonical-first before channel publication, except native-short collection policy.
        - "Treat publication as automation-first when publication_intent is stage or publish: use API integration, browser-assisted platform UI, site/admin UI, or local script when configured; record operator-confirmed manual publication only when the operator explicitly confirms they posted the final copy/media."
        - Upsert the final content-piece before closeout, and update positions or brand-profile only when the current operator intent explicitly includes that change.
      must_not_do:
        - Do not invent evidence, voice, disclosure policy, channel handles, or publication settings.
        - Do not use StackOS artifacts as a scratchpad for every interview pack, research pack, angle option, draft version, or review report.
        - Do not leave final work only in chat, local files, or artifacts without a content-piece resource ref.
        - Do not let one role decide and review the same piece.
        - Do not collapse claim, voice, and sanitization review into one reviewer.
        - Do not turn preferences, unsupported feedback, or a next-workflow handoff into extra delivery.
        - Do not turn branding email into a raw SMTP send path.
      required_outputs:
        - Adapted operating brief for the active workflow.
        - Evidence pack, claim map, channel plan, execution intent, artifact refs, and resource refs as applicable.
        - Interview pack, selected angle, optional image plan, generated image artifact refs, channel packets, publication bundle, publication jobs, distribution records, and follow-up hooks when applicable.
        - Content memory index and final content-piece ref that future runs can query.
        - Closeout that names each channel's publication status, URL/provider refs when published, automation mode used, publication bundle, final content memory, blockers, and residual risk.
      success_criteria:
        - Every public claim traces to cleared evidence or is cut.
        - Every channel publication job has explicit execution intent, canonical linkage, publication bundle refs, distribution-record refs, and content-memory state.
        - Future agents can recover the final piece, artifact refs, image refs, publication jobs, distribution records, channel packets, positions, evidence, and follow-up hooks from StackOS resources without reading this chat.
        - Level 1 remains generic; Level 2 owns operator-specific values.
      self_check:
        - Did I verify sources, voice, disclosure policy, channel charters, and routing rules from the overlay?
        - Did I interview for why, surprise, tradeoffs, stakes, and follow-up angles instead of relying only on logs?
        - Did I keep StackOS resources as the single source of truth?
        - Did I preserve only intentional durable artifacts, and update/archive/supersede existing artifacts when refining or cleaning up?
        - Did I upsert a content-piece memory index before closeout?
        - Did I separate decision, review, and execution roles?
        - Did I attach evidence map and channel rationale before finalization?
        - Did I stop at the named terminal condition without turning the handoff or feedback into extra work?
    metadata_json:
      boundary:
        level: 1
        project_adaptation_required: true
        no_operator_specific_values: true
      evidence_lock:
        required_before_finalization: true
        contents:
          - claim_evidence_map
          - cleared_evidence_refs
          - channel_plan_with_rationale
          - image_plan_when_selected
          - sanitization_verdict
          - content_memory_index
          - artifact_refs_indexed
          - publication_jobs_indexed
          - distribution_records_indexed
