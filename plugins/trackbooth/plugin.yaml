slug: trackbooth
name: Trackbooth
version: 0.1.0
description: Manage Trackbooth accounts, partners, offers, campaigns, tracking, reporting, payouts, and permissions from a StackOS workflow.
display_order: 45
source: builtin
ui:
  nav:
    section: Trackbooth
capabilities:
  - key: agent-api
    name: Agent API
    description: Use the Trackbooth operations available to the connected account inside an organized, reviewable workflow.
    kind: integration
providers:
  - key: trackbooth
    name: Trackbooth
    description: Manage accounts, partners, offers, campaigns, tracking links, reporting, payouts, and permissions in Trackbooth.
    auth_type: api-key
    auth_methods:
      - key: api-key
        label: Trackbooth API key
        auth_type: api-key
        payload_format: json
        fields:
          - key: api_key
            label: API Key
            type: secret
            secret: true
            required: true
          - key: api_base_url
            label: API URL
            type: text
            secret: false
            required: false
            placeholder: https://apis.trackbooth.com
            description: Defaults to production. Use http://localhost:<port> or http://127.0.0.1:<port> only for local testing.
    config:
      default_api_base_url: https://apis.trackbooth.com
      auth_header: X-API-Key
      optional_on_behalf_header: X-Acting-As-Account
      connection_category: Affiliation
      setup_note: Store the account API key here. Custom API URLs are provider connection config, not per-operation action input.
      setup:
        credential_label: Trackbooth API key
        setup_note: Trackbooth setup is account-specific. Store the account API key in StackOS; use the production API base URL unless local testing requires an override.
        homepage_url: https://trackbooth.com/
        api_key_url: https://apis.trackbooth.com
        fallback_reason: No public self-service registration/API-key page is verified; use the Trackbooth account/API endpoint and StackOS local connection form.
        verified_at: "2026-06-11"
        url_confidence:
          homepage_url: verified
          api_key_url: directional
resources:
  - key: agent-api-operation
    name: Agent API Operation
    description: Cached operation metadata generated from the live Trackbooth catalog sync.
    schema:
      type: object
      additionalProperties: true
      required:
        - operation_id
        - method
        - path
      properties:
        operation_id:
          type: string
        method:
          type: string
        path:
          type: string
        title:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        feature_requirements:
          type: array
          items:
            type: string
  - key: agent-api-schema
    name: Agent API Schema
    description: Expanded request and response schema details for one selected Trackbooth operation.
    schema:
      type: object
      additionalProperties: true
      required:
        - operation_id
      properties:
        operation_id:
          type: string
        path_params:
          type: array
          items:
            type: object
            additionalProperties: true
        query_params:
          type: object
          additionalProperties: true
        request_body:
          type: object
          additionalProperties: true
        response:
          type: object
          additionalProperties: true
actions:
  - key: catalog.sync
    name: Sync Trackbooth Catalog
    description: Fetch the live permission-filtered Trackbooth Agent API bulk catalog export and upsert generated trackbooth.api.* actions for this runtime.
    provider: trackbooth
    capability: agent-api
    risk_level: write
    input_schema: &catalog_sync_input
      type: object
      additionalProperties: false
      properties:
        operation_ids:
          type: array
          items:
            type: string
          description: Optional operation ids to sync from the bulk export. Omit to sync the full live catalog returned for the credential context.
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          description: Optional cap for local testing or focused sync runs.
    output_schema: &object_output
      type: object
      additionalProperties: true
    config:
      schema_version: stackos.action.v1
      connector: trackbooth
      operation: catalog.sync
      requires_credential: true
      provider_context_schema: &trackbooth_provider_context
        type: object
        additionalProperties: false
        properties:
          acting_as_account:
            type: string
            description: Optional managed Trackbooth account id. StackOS sends it as X-Acting-As-Account.
  - key: catalog.search
    name: Search Trackbooth Catalog
    description: Search the live permission-filtered Trackbooth Agent API catalog by text, category, tags, method, path, or operation id.
    provider: trackbooth
    capability: agent-api
    risk_level: read
    input_schema: &catalog_search_input
      type: object
      additionalProperties: false
      properties:
        query:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
        path:
          type: string
        operation_id:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
    output_schema: *object_output
    config:
      schema_version: stackos.action.v1
      connector: trackbooth
      operation: catalog.search
      requires_credential: true
      provider_context_schema: *trackbooth_provider_context
  - key: operation.describe
    name: Describe Trackbooth Operation
    description: Fetch one live Trackbooth catalog operation and expand request and response schemas from the live catalog detail.
    provider: trackbooth
    capability: agent-api
    risk_level: read
    input_schema: &operation_describe_input
      type: object
      additionalProperties: false
      required:
        - operation_id
      properties:
        operation_id:
          type: string
    output_schema: *object_output
    config:
      schema_version: stackos.action.v1
      connector: trackbooth
      operation: operation.describe
      requires_credential: true
      provider_context_schema: *trackbooth_provider_context
config:
  agent_api_asset_dir: agent-api
  default_api_base_url: https://apis.trackbooth.com
  inventory_refresh:
    mode: manual
    action_ref: trackbooth.catalog.sync
