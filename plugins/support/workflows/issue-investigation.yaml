schema_version: stackos.workflow-template.v1
key: support.issue-investigation
name: Issue Investigation
version: 0.1.0
description: Investigate a customer-reported issue from the canonical support thread, ask bounded clarifications when needed, and post an evidence-backed support conclusion without creating delivery tasks.
domain: support
owner:
  team: StackOS
experience:
  problem: "Customer reports are either dismissed too early or turned into engineering work before expected behavior, reproduction, and impact are established."
  outcome: "An evidence-backed conclusion in the canonical support thread: verified issue, bounded uncertainty, expected behavior, or not a product defect."
  why_ai: "AI can connect the full conversation, media, product context, and reproduction evidence while keeping task creation outside the investigator's authority."
  operator_path:
    - "Provide the canonical thread and safe media refs."
    - "Answer bounded clarification questions about expected behavior, environment, timing, and impact."
    - "Review the conclusion and decide whether delivery work should be created."
  agent_path:
    - "Read the full thread and media before forming a hypothesis."
    - "Separate report, expectation, evidence, reproduction, scope, and uncertainty."
    - "Ask only bounded clarifications, investigate safely, and post the conclusion in the same thread."
    - "Do not create delivery tasks."
  progress_signals:
    - "Thread and media loaded"
    - "Expected behavior clarified"
    - "Reproduction attempted"
    - "Impact bounded"
    - "Conclusion posted"
  recovery:
    - "If evidence or access is missing, state exactly what is unverified and ask the smallest useful question."
    - "If a provider reply fails, preserve the conclusion and retry from the stored thread and action receipt."
  safe_stopping_points:
    - "Stop with bounded uncertainty; task creation requires a separate workflow and operator instruction."
  handoffs:
    - workflow_key: support.delivery-task-handoff
      relationship: conditional
      when: "The conclusion supports delivery work and the operator authorizes task creation in the same thread."
public:
  audience: "Support and product teams investigating customer-reported issues"
  setup: connection-required
  prerequisites:
    - "A canonical Slack thread with the complete feedback packet"
    - "Expected versus actual behavior, environment, timing, and impact context"
    - "Safe access to relevant media or reproduction evidence"
  proof:
    - "Full-thread and media refs"
    - "Reproduction and impact evidence"
    - "Same-thread conclusion with uncertainty"
    - "No task creation by the investigator"
  featured: false
when_to_use:
  - A canonical Slack support thread exists and the issue needs diagnosis before delivery work is created.
  - The agent must read the whole support thread, include media/context, and produce a root-cause or bounded-uncertainty conclusion.
  - The operator needs a clear support conclusion before deciding whether to create delivery work.
when_not_to_use:
  - Feedback has not yet been normalized into a canonical Slack thread; use communications.customer-feedback-intake first.
  - The operator already provided a same-thread instruction to create delivery work from a completed support conclusion; use support.delivery-task-handoff.
  - Engineering implementation or release work should start; use engineering.tracked-delivery.
agent_requirements:
  - role: support-issue-investigator
    requirement: required
    agent_preset_ref: support.workflow.issue-investigator
    purpose: Read the full canonical thread and project evidence, investigate root cause or bounded uncertainty, ask clarifications, and post a thread-bound conclusion.
    applies_to_steps:
      - read-canonical-thread
      - clarify-missing-context
      - investigate-issue
      - post-support-conclusion
  - role: codebase-explorer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.codebase-explorer
    purpose: Trace real affected code paths, contracts, data, tests, docs, and downstream fallout during investigation.
    applies_to_steps:
      - investigate-issue
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, communications, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Start only after there is a canonical support thread ref.
      - The complete canonical thread is the source of truth; do not investigate from only the first customer message.
      - Ask clarification questions only in the canonical thread and re-read the thread after answers.
      - Post the support conclusion in the canonical thread.
      - This workflow ends after the conclusion. If the operator replies with task instructions, start support.delivery-task-handoff.
      - Preserve source, canonical thread, media, clarification, conclusion, evidence, and recommended delivery refs.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: canonical_thread_ref
    name: Canonical Thread Ref
    type: string
    required: true
    description: Safe ref for the canonical Slack support thread.
  - key: canonical_message_ref
    name: Canonical Message Ref
    type: string
    required: false
    description: Safe ref for the canonical Slack message that started the thread.
  - key: source_message_ref
    name: Source Message Ref
    type: string
    required: false
    description: Safe source message ref when the feedback originated outside the canonical thread.
  - key: source_media_refs
    name: Source Media Refs
    type: array
    required: false
    description: Safe refs for source or forwarded media that may contain evidence.
  - key: feedback_summary
    name: Feedback Summary
    type: string
    required: true
    description: Reporter-visible symptom or issue summary from intake.
  - key: severity_hint
    name: Severity Hint
    type: string
    required: false
    description: Optional initial severity or customer-impact hint.
  - key: project_workflow_context
    name: Project Workflow Context
    type: object
    required: false
    description: Project setup context with channel purpose, data boundaries, diagnostics policy, and operator preferences.
context_requirements:
  - id: canonical_thread_history
    source: resources
    purpose: Read stored communication history for the canonical Slack thread and original source thread.
    filters:
      plugin_slug: communications
      resource_keys:
        - communication-message
        - communication-interaction
        - communication-event
    fields:
      - title
      - data_json
      - updated_at
    max_items: 50
    return_mode: compact
  - id: recent_support_context
    source: resources
    purpose: Reuse relevant prior support investigations and avoid repeating known diagnostics.
    filters:
      plugin_slug: support
      resource_keys:
        - support-investigation
    fields:
      - title
      - status
      - data_json
      - updated_at
    max_items: 10
    return_mode: compact
  - id: engineering_context
    source: resources
    purpose: Read reusable engineering evidence and decisions that may constrain investigation or delivery recommendation.
    filters:
      plugin_slug: engineering
      resource_keys:
        - engineering-decision
        - engineering-evidence
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 20
    return_mode: compact
  - id: recent_runs
    source: runs
    purpose: Check recent failed deliveries, investigations, or signoffs before repeating work.
    fields:
      - kind
      - status
      - last_step
      - metadata_json
    max_items: 10
    return_mode: compact
capability_requirements:
  - key: support-investigation
    required: true
    description: Investigate support feedback, validate the cause when possible, and explain the next delivery handoff before implementation starts.
  - key: messaging
    required: true
    preferred_providers:
      - slack-bot
auth_requirements:
  - key: slack_bot
    provider: slack-bot
    auth_type: bot
    optional: false
    description: Project-scoped Slack bot auth for clarification and conclusion replies.
action_contracts:
  - key: post_thread_reply
    action: slack-bot.message.send
    capability: messaging
    provider: slack-bot
    risk_level: write
    auth_ref: slack_bot
resource_contracts:
  - key: support_evidence
    resource: support-investigation
    purpose: Store reusable support investigation evidence, conclusion, and chat refs when the run creates durable proof.
policies:
  - key: full_thread_source_of_truth
    kind: investigation
    description: The complete canonical Slack thread is the investigation source of truth. The agent must read stored thread history, fetch live provider history only when explicitly granted, name any missing-history limitation, and re-read after clarification replies.
  - key: evidence_over_assertion
    kind: investigation
    description: Conclusions must distinguish facts, inferences, hypotheses, eliminated options, verified cause, and residual uncertainty.
  - key: no_implementation_in_support_investigation
    kind: boundary
    description: The support investigation workflow may read and reason, but it must not implement production fixes.
  - key: no_task_creation_in_investigation
    kind: tracker
    description: This workflow posts the investigation conclusion only. Same-thread operator instructions start support.delivery-task-handoff.
  - key: chat_reference_continuity
    kind: tracker
    description: Run-plan metadata, investigation resources, and later task handoffs must preserve safe source refs plus canonical thread/message, media, clarification, conclusion, and instruction refs when available.
steps:
  - id: read-canonical-thread
    title: Read Canonical Thread
    purpose: Read the full stored thread and source context before forming hypotheses.
    input_refs:
      - canonical_thread_ref
      - canonical_message_ref
      - source_message_ref
      - source_media_refs
      - feedback_summary
      - severity_hint
      - project_workflow_context
    context_refs:
      - canonical_thread_history
      - recent_support_context
    policy_refs:
      - full_thread_source_of_truth
      - chat_reference_continuity
    output_refs:
      - thread_context_summary
  - id: clarify-missing-context
    title: Clarify Missing Context
    purpose: Ask a same-thread clarification only when missing evidence blocks a safe conclusion; otherwise record why clarification was skipped.
    action_refs:
      - post_thread_reply
    policy_refs:
      - full_thread_source_of_truth
      - evidence_over_assertion
      - no_task_creation_in_investigation
    depends_on:
      - read-canonical-thread
    output_refs:
      - clarification_result
  - id: investigate-issue
    title: Investigate Issue
    purpose: Trace the symptom through project evidence, validate or bound root cause, and identify affected surfaces and delivery direction.
    context_refs:
      - canonical_thread_history
      - engineering_context
      - recent_runs
    resource_refs:
      - support_evidence
    policy_refs:
      - full_thread_source_of_truth
      - evidence_over_assertion
      - no_implementation_in_support_investigation
      - chat_reference_continuity
    depends_on:
      - clarify-missing-context
    output_refs:
      - investigation_conclusion
  - id: post-support-conclusion
    title: Post Support Conclusion
    purpose: Post the evidence-backed conclusion in the canonical thread and tell the operator that task creation is a separate instructed handoff.
    action_refs:
      - post_thread_reply
    policy_refs:
      - full_thread_source_of_truth
      - evidence_over_assertion
      - no_task_creation_in_investigation
      - chat_reference_continuity
    depends_on:
      - investigate-issue
    output_refs:
      - support_conclusion_reply
      - delivery_handoff_recommendation
outputs:
  - key: thread_context_summary
    name: Thread Context Summary
    type: object
    description: Full-thread facts, reporter context, media refs, and source refs used for investigation.
    schema:
      type: object
      required: [canonical_thread_ref, facts, reporter_context, media_refs, source_refs, unknowns]
      properties:
        canonical_thread_ref: {type: string}
        facts: {type: array}
        reporter_context: {type: object}
        media_refs: {type: array, items: {type: string}}
        source_refs: {type: array, items: {type: string}}
        unknowns: {type: array}
  - key: clarification_result
    name: Clarification Result
    type: object
    description: Clarification question/reply refs, or explicit reason no clarification was needed.
    schema:
      type: object
      required: [needed, rationale]
      properties:
        needed: {type: boolean}
        rationale: {type: string}
        question_message_ref: {type: string}
        reply_message_ref: {type: string}
        resolved_unknowns: {type: array}
  - key: investigation_conclusion
    name: Investigation Conclusion
    type: object
    required: true
    description: Facts, inferences, eliminated hypotheses, verified cause or bounded uncertainty, affected surfaces, residual risk, and recommended next step.
    schema:
      type: object
      required: [facts, inferences, eliminated_hypotheses, conclusion_status, affected_surfaces, residual_risk, recommended_next_step, evidence_refs]
      properties:
        facts: {type: array}
        inferences: {type: array}
        eliminated_hypotheses: {type: array}
        conclusion_status: {type: string, enum: [verified_cause, bounded_uncertainty, no_issue]}
        cause: {type: string}
        affected_surfaces: {type: array}
        residual_risk: {type: array}
        recommended_next_step: {type: object}
        evidence_refs: {type: array, items: {type: string}}
  - key: support_conclusion_reply
    name: Support Conclusion Reply
    type: object
    required: true
    description: Evidence that the conclusion was posted in the canonical support thread.
    schema:
      type: object
      required: [thread_ref, message_ref, conclusion_status]
      properties:
        thread_ref: {type: string}
        message_ref: {type: string}
        conclusion_status: {type: string}
        receipt_ref: {type: string}
  - key: delivery_handoff_recommendation
    name: Delivery Handoff Recommendation
    type: object
    description: Suggested engineering.tracked-delivery task direction if the operator instructs task creation later.
    schema:
      type: object
      required: [recommended, rationale, proposed_scope, acceptance_evidence, source_refs]
      properties:
        recommended: {type: boolean}
        rationale: {type: string}
        proposed_scope: {type: object}
        acceptance_evidence: {type: array}
        source_refs: {type: array, items: {type: string}}
failure_handling:
  - If the full thread cannot be read, name the limitation in the thread and do not post a confident cause.
  - If clarification is required, ask in the canonical thread and pause the investigation until the answer is available.
  - If evidence is insufficient, post bounded uncertainty and the next diagnostic step instead of guessing.
metadata:
  builtin: true
  run_mode: stackos_run_plan
  workflow_family: customer_feedback
  previous_workflow: communications.customer-feedback-intake
  next_workflow: support.delivery-task-handoff
  agent_subset:
    - support-issue-investigator
    - codebase-explorer
