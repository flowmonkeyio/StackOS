slug: engineering
name: Engineering
version: 0.2.0
description: First-party StackOS domain package for SDLC workflow templates, engineering task state, and reusable delivery agent presets.
display_order: 10
source: builtin
capabilities:
  - key: engineering-delivery
    name: Engineering Delivery
    description: Plan, implement, review, and release project engineering changes through tracker-backed workflow execution.
    kind: domain
  - key: engineering-review
    name: Engineering Review
    description: Review architecture, integration contracts, security boundaries, QA evidence, and release readiness.
    kind: domain
resources:
  - key: engineering-decision
    name: Engineering Decision
    description: Durable design or release decision captured by an agent with evidence and scope.
    schema:
      type: object
      additionalProperties: false
      required:
        - title
        - decision
        - status
      properties:
        title:
          type: string
          description: Short operator-readable decision title.
        decision:
          type: string
          description: The accepted design, release, or delivery decision.
        rationale:
          type: string
          description: Evidence and tradeoffs behind the decision.
        status:
          type: string
          enum:
            - proposed
            - accepted
            - superseded
            - rejected
        scope:
          type: string
          description: Component, workflow, or project area affected.
        ticket_keys:
          type: array
          items:
            type: string
        run_plan_id:
          type: integer
        evidence_refs:
          type: array
          items:
            type: string
        decided_by:
          type: string
        decided_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
    ui_schema:
      table_columns:
        - title
        - status
        - scope
        - decided_at
      summary_fields:
        - decision
        - rationale
      detail_sections:
        - title: Decision
          fields:
            - title
            - status
            - decision
            - rationale
        - title: Traceability
          fields:
            - scope
            - ticket_keys
            - run_plan_id
            - evidence_refs
    config:
      schema_version: stackos.resource.v1
      record_kind: engineering-decision
      agent_guidance: Record durable decisions only when they affect future engineering delivery, review, or release work.
  - key: engineering-evidence
    name: Engineering Evidence
    description: Versioned authored or executed engineering evidence with explicit lifecycle and conditional repository binding.
    schema:
      type: object
      required:
        - schema_version
        - title
        - evidence_type
        - evidence_mode
        - summary
        - status
        - lifecycle_state
        - scope
        - checked_at
      properties:
        schema_version:
          const: stackos.engineering-evidence.v2
        title:
          type: string
          minLength: 1
        evidence_type:
          type: string
          enum:
            - automated-test
            - browser-review
            - manual-review
            - command-output
            - design-review
            - tracker-audit
            - release-signoff
            - limitation
        evidence_mode:
          type: string
          enum: [authored, executed]
        repository_bound:
          type: boolean
          description: Whether the executed proof is tied to a repository fingerprint.
        summary:
          type: string
          minLength: 1
        status:
          type: string
          enum: [passed, failed, blocked, waived, informational]
        lifecycle_state:
          type: string
          enum: [current, invalidated, superseded, blocked, waived, historical]
        repository_state:
          type: object
          required:
            - head_commit
            - staged_diff_checksum
            - unstaged_diff_checksum
            - untracked_manifest_checksum
            - migration_head
            - generated_contract_revision
            - captured_at
          properties:
            head_commit:
              type: string
              pattern: "^[0-9a-fA-F]{40,64}$"
            staged_diff_checksum:
              type: string
              pattern: "^sha256:[0-9a-fA-F]{64}$"
            unstaged_diff_checksum:
              type: string
              pattern: "^sha256:[0-9a-fA-F]{64}$"
            untracked_manifest_checksum:
              type: string
              pattern: "^sha256:[0-9a-fA-F]{64}$"
            migration_head:
              type: [string, "null"]
            generated_contract_revision:
              type: [string, "null"]
            captured_at:
              type: string
              format: date-time
        execution:
          type: object
          required:
            - status
            - command_or_run_ref
            - pass_count
            - fail_count
            - skipped_count
            - output_checksum
            - executed_at
          properties:
            status:
              const: executed
            command_or_run_ref:
              type: string
              minLength: 1
            pass_count: {type: integer, minimum: 0}
            fail_count: {type: integer, minimum: 0}
            skipped_count: {type: integer, minimum: 0}
            output_checksum:
              type: string
              pattern: "^sha256:[0-9a-fA-F]{64}$"
            executed_at:
              type: string
              format: date-time
        scope:
          type: object
          required: [covered_paths, flow_refs, ticket_keys]
          properties:
            covered_paths:
              type: array
              items: {type: string}
            flow_refs:
              type: array
              items: {type: string}
            ticket_keys:
              type: array
              items: {type: string}
            run_plan_id:
              type: integer
              minimum: 1
        author: {type: string}
        superseded_by: {type: string, minLength: 1}
        invalidated_reason: {type: string, minLength: 1}
        waiver_reason: {type: string, minLength: 1}
        checked_at:
          type: string
          format: date-time
      allOf:
        - if:
            properties:
              evidence_mode: {const: executed}
            required: [evidence_mode]
          then:
            required: [repository_bound, execution]
        - if:
            properties:
              repository_bound: {const: true}
            required: [repository_bound]
          then:
            required: [repository_state]
        - if:
            properties:
              status: {const: passed}
            required: [status]
          then:
            properties:
              evidence_mode: {const: executed}
              execution:
                properties:
                  fail_count: {const: 0}
            required: [execution]
        - if:
            properties:
              lifecycle_state: {const: superseded}
            required: [lifecycle_state]
          then:
            required: [superseded_by]
        - if:
            properties:
              lifecycle_state: {const: invalidated}
            required: [lifecycle_state]
          then:
            required: [invalidated_reason]
        - if:
            properties:
              lifecycle_state: {const: waived}
            required: [lifecycle_state]
          then:
            required: [waiver_reason]
    ui_schema:
      table_columns:
        - title
        - evidence_type
        - evidence_mode
        - status
        - lifecycle_state
        - checked_at
      summary_fields:
        - summary
      detail_sections:
        - title: Evidence
          fields:
            - schema_version
            - title
            - evidence_type
            - evidence_mode
            - status
            - lifecycle_state
            - summary
            - execution
        - title: Traceability
          fields:
            - repository_state
            - scope
            - superseded_by
            - invalidated_reason
            - waiver_reason
    config:
      schema_version: stackos.engineering-evidence.v2
      record_kind: engineering-evidence
      agent_guidance: Use authored mode for decisions, reviews, limitations, and other claims. Executed mode always needs a receipt; set repository_bound true and include repository_state only when the proof covers a repository candidate. scope.covered_paths is the canonical path owner. Treat pre-v2 records as historical context and invalidate or supersede stale proof.
ui:
  nav:
    section: Engineering
    items:
      - key: engineering.resources
        label: Data
        to: resources?plugin_slug=engineering
        matchPrefix: true
      - key: engineering.templates
        label: Workflows
        to: workflow-templates?plugin_slug=engineering
config:
  schema_version: stackos.plugin.v1
