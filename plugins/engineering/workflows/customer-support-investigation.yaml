failure_handling:
  - If route policy is unclear, stop before copying non-Slack feedback into Slack and request communication route review.
  - If a named target resolves but no route or current operator instruction approves that source-to-target handoff, stop before copying non-Slack feedback into Slack and request route confirmation.
  - If one or more media items cannot be forwarded with the canonical handoff, stop before partial handoff or ask for explicit operator approval to proceed text-only; never silently summarize or drop media.
  - If Slack message or reaction delivery fails, keep the blocker visible and do not pretend thread state changed.
  - If the full thread cannot be read from stored context, state the limitation before investigating and request the missing context in the canonical thread when it materially affects the conclusion.
  - If support investigation is inconclusive, post bounded uncertainty, eliminated hypotheses, and the next diagnostic step instead of inventing a cause.
  - If task creation is requested without enough evidence, ask for either more investigation or explicit acceptance of the uncertainty in the same thread.
