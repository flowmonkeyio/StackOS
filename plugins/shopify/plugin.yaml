slug: shopify
name: Shopify
version: 0.1.0
description: Shopify Admin GraphQL provider with a curated, static action catalog for commerce agents.
display_order: 46
source: builtin
ui:
  nav:
    section: Shopify
capabilities:
  - key: analytics
    name: Analytics
    description: Shopify analytics and reporting operations backed by ShopifyQL or Admin GraphQL.
    kind: integration
  - key: customers
    name: Customers
    description: Shopify customers Admin GraphQL operations.
    kind: integration
  - key: inventory
    name: Inventory
    description: Shopify inventory Admin GraphQL operations.
    kind: integration
  - key: orders
    name: Orders
    description: Shopify orders Admin GraphQL operations.
    kind: integration
  - key: products
    name: Products
    description: Shopify products Admin GraphQL operations.
    kind: integration
providers:
  - key: shopify
    name: Shopify Admin API
    description: Static-token Shopify Admin GraphQL provider. Tokens stay daemon-held; agents can only run curated action catalog operations.
    auth_type: api-token
    auth_methods:
      - key: admin-api-token
        label: Shopify Admin API access token
        auth_type: api-token
        payload_format: raw
        payload_field: admin_api_access_token
        fields:
          - key: admin_api_access_token
            label: Admin API access token
            type: secret
            secret: true
            required: true
          - key: store_domain
            label: Store domain
            type: text
            secret: false
            required: true
            placeholder: example.myshopify.com
            description: The store myshopify.com domain used in the Admin GraphQL endpoint.
          - key: api_version
            label: Admin API version
            type: text
            secret: false
            required: false
            placeholder: 2026-07
            description: Defaults to the official 2026-07 stable Admin API version.
    config:
      default_api_version: 2026-07
      endpoint_template: https://{store_domain}/admin/api/{api_version}/graphql.json
      connection_category: Commerce
      setup_note: Store an existing Shopify Admin API access token and the store myshopify.com domain. StackOS does not create tokens or run OAuth for this provider.
      setup:
        credential_label: Shopify Admin API access token
        setup_note: Use an existing token from a Shopify custom app with only the scopes needed for the enabled actions.
        homepage_url: https://shopify.dev/docs/api/admin-graphql
        console_url: https://admin.shopify.com/
        api_key_url: https://shopify.dev/docs/apps/build/authentication-authorization/access-tokens
        docs_url: https://shopify.dev/docs/api/admin-graphql/latest
        support_url: https://help.shopify.com/
        fallback_url: https://shopify.dev/docs/api/admin-graphql/latest
        fallback_reason: Static-token setup requires an operator-supplied Admin API access token; OAuth/token acquisition is deliberately out of scope.
        verified_at: "2026-07-08"
        url_confidence:
          homepage_url: verified
          console_url: directional
          api_key_url: verified
          docs_url: verified
          support_url: verified
          fallback_url: verified
resources:
  - key: admin-graphql-action
    name: Shopify Admin GraphQL Action
    description: Static metadata for one curated Shopify action generated from the cob-shopify-mcp catalog and executed through the local StackOS Shopify connector.
    schema:
      type: object
      additionalProperties: true
      required:
        - action_name
        - domain
        - scopes
      properties:
        action_name:
          type: string
        domain:
          type: string
        scopes:
          type: array
          items:
            type: string
        graphql_file:
          type: string
        mode:
          type: string
actions:
  - key: conversion_funnel
    name: "Conversion Funnel"
    description: "Conversion funnel metrics: sessions, orders, customers, and ShopifyQL conversion_rate (values in shop currency)"
    provider: shopify
    capability: analytics
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      required:
        - start_date
        - end_date
      properties:
        start_date:
          type: string
          description: "ISO 8601 date, e.g. 2026-01-01"
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        end_date:
          type: string
          description: "ISO 8601 date, e.g. 2026-01-31"
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
    output_schema:
      type: object
      additionalProperties: true
    config:
      schema_version: stackos.action.v1
      connector: shopify
      operation: admin.graphql
      requires_credential: true
      shopify:
        action_name: conversion_funnel
        domain: analytics
        mode: shopifyql
        scopes: ["read_reports"]
        source: cob-shopify-mcp
        source_path: "src/shopify/tools/analytics/conversion-funnel.tool.ts"
        graphql_file: graphql/shopifyql.graphql
  - key: customer_cohort_analysis
    name: "Customer Cohort Analysis"
    description: "Customer cohort analysis showing customers, orders, and sales grouped by time period"
    provider: shopify
