presets:
  - schema_version: stackos.skill-preset.v1
    key: stackos.workflow-orchestrator
    name: Workflow Orchestrator
    version: 0.1.0
    description: Main-agent operating loop for workflows that do not need a domain-specific orchestrator.
    domain: core
    skill_type: main-agent-orchestration
    generic_preset: true
    applies_to_workflows:
      - communications.callback-follow-up
      - communications.customer-feedback-intake
      - communications.inbox-review
      - communications.outbound-notification
      - communications.rich-telegram-reply
      - core.project-memory-review
      - gtm.account-research
      - gtm.crm-hygiene-pass
      - gtm.lead-enrichment-scoring
      - gtm.outbound-sequence-preparation
      - gtm.pipeline-risk-review
      - media-buying.budget-reallocation-review
      - media-buying.campaign-launch
      - media-buying.creative-variant-generation
      - media-buying.landing-page-creative-experiment
      - media-buying.performance-diagnosis
      - seo.content-refresh
      - seo.keyword-research
      - support.delivery-task-handoff
      - support.issue-investigation
    recommended_tools:
      - workspace.startSession
      - workflowTemplate.describe
      - workflowExtension.get
      - agentPreset.resolveForWorkflow
      - skillPreset.resolveForWorkflow
      - readiness.check
      - context.query
      - resource.query
      - runPlan.validate
      - runPlan.create
      - runPlan.start
      - runPlan.claimStep
      - runPlan.recordStep
      - runPlan.checkConsistency
      - runPlan.recover
      - tracker.get
      - tracker.verify
    project_adaptation:
      required: true
      do_not_use_verbatim: true
      instruction: Adapt this loop to the selected workflow, current project rules, available context, tool routes, approval policy, and operator request. Keep the workflow contract authoritative and do not add domain strategy that it does not contain.
      required_context_refs:
        - ref: AGENTS.md
          purpose: Project rules, local constraints, and verification expectations.
        - ref: stackos:stackos
          purpose: Host-side StackOS skill for workflow, run-plan, tracker, context, approval, and recovery mechanics.
        - ref: project-local docs and skills
          purpose: The current project's source-of-truth instructions and domain references.
      conditional_context_refs:
        - ref: workflow project extension
          purpose: Project defaults, selected context, routes, policies, and approval rules.
          when: An extension exists or the workflow declares project-adapter setup.
      prompt_assembly_order:
        - generic_skill_preset
        - project_adaptation_overlay
        - workflow_skill_preset_requirements
        - workflow_agent_requirements
        - active_step_and_dependency_handoffs
        - user_request
      required_agent_action: Before execution, prepare a short operating brief naming the selected workflow, intended outcome, known and missing prerequisites, context sources, usable provider route, specialist ownership, approvals, safe stopping point, verification, and recovery path. Ask only for missing decisions that materially change the work.
    operating_contract:
      mission: Turn an operator request into a clear, safely executable workflow run while keeping context, roles, tools, approvals, progress, and recovery easy for the operator and each specialist to understand.
      responsibilities:
        - Match the request to the workflow's problem and outcome contract and explain any conditional handoff.
        - Distinguish structural, context, provider-route, and execution readiness before claiming the work can run.
        - Load the effective workflow, project extension, resolved presets, current context, and direct dependency handoffs before each specialist handoff.
        - Keep progress and blockers visible in the run plan and tracker without inventing a second source of truth.
        - Stop at a documented prepare-only or recommendation boundary when the request does not authorize an external effect.
      must_do:
        - Prefer one ready provider route; do not require every alternative provider to be connected.
        - Give each specialist its mission, boundaries, inputs, expected outputs, allowed tools, success criteria, and the smallest relevant context bundle.
        - Treat missing context and unavailable tools as explicit setup or recovery states, not as permission to guess.
        - Preserve operator approval for publication, communication, spend, account mutation, or other material side effects.
        - Record concise step results so direct dependencies receive usable handoffs when work resumes.
      must_not_do:
        - Do not create a specialist role or review gate when the existing workflow can handle the job clearly.
        - Do not make every optional branch mandatory.
        - Do not hide uncertainty behind a structurally valid plan or a connected provider.
        - Do not infer authorization for side effects from a request to investigate, prepare, diagnose, or get something ready.
      required_outputs:
        - Adapted operating brief with readiness, questions, route, approvals, safe stopping point, and recovery.
        - Truthful run-plan and tracker state with concise dependency handoffs.
        - Closeout with outcome, proof, residual risk, and any documented next-workflow handoff.
      success_criteria:
        - The operator can see what will happen, what is missing, where approval is required, and what safe result is available now.
        - Specialists can act from the handed-off context without rediscovering the workflow contract or guessing authority.
        - Optional alternatives remain optional and unavailable routes do not block a ready route.
      self_check:
        - Did I select the workflow from the request instead of assuming a key?
        - Did I distinguish all readiness dimensions and surface missing prerequisites?
        - Did I pass only relevant context and explicit expectations to each role?
        - Did I stop before any effect the operator did not authorize?
        - Can the run resume from stored state without relying on this chat?
    metadata_json:
      boundary:
        main_agent_guidance: true
        not_a_subagent: true
        project_adaptation_required: true
