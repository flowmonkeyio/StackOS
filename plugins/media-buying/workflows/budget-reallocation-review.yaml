schema_version: stackos.workflow-template.v1
key: media-buying.budget-reallocation-review
name: Media Buying Budget Reallocation Review
version: 0.1.0
description: Reusable template for reviewing paid media budget movement using project policy, performance evidence, approvals, and explicit update actions.
domain: media-buying
owner:
  team: StackOS
experience:
  problem: "Budget moves are tempting when performance shifts, but weak comparisons and missing guardrails can turn noise into spend changes."
  outcome: "An evidence-backed budget recommendation, explicit approval boundary, and observation plan; mutations occur only when separately approved."
  why_ai: "AI can compare several campaigns and hypotheses consistently while preserving the operator's budget judgment and rollback authority."
  operator_path:
    - "Choose campaigns, comparison window, KPI targets, and delivery constraints."
    - "Set movement limits, approval owner, observation window, and rollback rule."
    - "Review the recommendation before approving any account change."
  agent_path:
    - "Validate measurement comparability before diagnosing allocation."
    - "Model the proposed movement against performance, constraints, and uncertainty."
    - "Return a recommendation first; execute only the selected provider route after approval."
    - "Record the change and post-change observation plan."
  progress_signals:
    - "Comparison validated"
    - "Recommendation modeled"
    - "Guardrails checked"
    - "Approval pending"
    - "Change and observation plan recorded"
  recovery:
    - "When evidence is weak, recommend no change and name the missing observation."
    - "On partial provider failure, reconcile actual account state before retry or rollback."
  safe_stopping_points:
    - "Stop after the recommendation when budget mutation was not explicitly approved."
  handoffs:
    - workflow_key: media-buying.performance-diagnosis
      relationship: next
      when: "The post-change observation window closes or performance diverges from the expected range."
public:
  audience: "Growth teams reviewing paid-media budget allocation"
  setup: mixed
  prerequisites:
    - "Comparable campaign performance evidence"
    - "KPI targets and attribution window"
    - "Budget, delivery, approval, observation, and rollback guardrails"
    - "One selected provider route only when mutation is approved"
  proof:
    - "Comparison and uncertainty report"
    - "Budget recommendation with rationale"
    - "Approval record"
    - "Provider receipt and observation plan when changed"
  featured: false
when_to_use:
  - A project needs to evaluate budget changes across campaigns, channels, audiences, or creative sets.
  - The agent should separate recommendation, approval, and optional external mutation.
when_not_to_use:
  - No performance evidence or budget policy is available.
agent_requirements:
  - role: media-budget-reallocation
    requirement: required
    agent_preset_ref: media-buying.workflow.budget-reallocation-review
    purpose: Review budget movement options with evidence, approval gates, and rollback/watch criteria.
    applies_to_steps:
      - orient
      - fetch_metric_gaps
      - propose_changes
      - optional_apply_changes
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review spend-risk, provider action, security, and approval boundaries before mutation.
    applies_to_steps:
      - propose_changes
      - optional_apply_changes
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: budget_policy
    name: Budget Policy
    type: object
    required: true
  - key: review_scope
    name: Review Scope
    type: object
    required: false
  - key: review_window
    name: Review Window
    type: object
    required: false
context_requirements:
  - id: performance_context
    source: resources
    purpose: Retrieve recent performance, campaign, and budget-change records before proposing movement.
    filters:
      plugin_slug: media-buying
      resource_keys:
        - performance-snapshot
        - campaign
        - ad-set
        - budget-change
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 30
    return_mode: compact
  - id: budget_learnings
    source: learnings
    purpose: Pull durable lessons about spend caps, scale limits, and prior reallocation outcomes.
    filters:
      tags:
        - media-buying
        - budget
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
  - id: recent_decisions
    source: decisions
    purpose: Read prior budget decisions that may constrain the review.
    filters:
      tags:
        - media-buying
        - budget
    fields:
      - title
      - decision
      - rationale
      - status
      - tags
    max_items: 10
    return_mode: compact
capability_requirements:
  - key: media-measurement
    required: true
  - key: campaign-management
    required: true
    preferred_providers:
      - meta-ads
      - google-ads
      - taboola
      - custom-media-tool
auth_requirements:
  - key: meta_ads
    provider: meta-ads
    auth_type: oauth
    optional: true
  - key: google_ads
    provider: google-ads
    auth_type: oauth
    optional: true
  - key: taboola
    provider: taboola
    auth_type: oauth
    optional: true
action_contracts:
  - key: meta_insights
    action: meta.insights.fetch
    capability: media-measurement
    provider: meta-ads
    risk_level: read
    auth_ref: meta_ads
    route_group: budget_provider
    route_key: meta_ads
    optional: true
  - key: meta_campaign_budget_update
    action: meta.campaign_budget.update
    capability: campaign-management
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: budget_change_review
    route_group: budget_provider
    route_key: meta_ads
    optional: true
  - key: meta_ad_set_budget_update
    action: meta.ad_set_budget.update
    capability: campaign-management
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: budget_change_review
    route_group: budget_provider
    route_key: meta_ads
    optional: true
  - key: google_report_search
    action: google.report.search
    capability: media-measurement
    provider: google-ads
    risk_level: read
    auth_ref: google_ads
    route_group: budget_provider
    route_key: google_ads
    optional: true
  - key: google_campaign_budget_update
    action: google.campaign_budget.update
    capability: campaign-management
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: budget_change_review
    route_group: budget_provider
    route_key: google_ads
    optional: true
  - key: taboola_report
    action: taboola.report.fetch
    capability: media-measurement
    provider: taboola
    risk_level: read
    auth_ref: taboola
    route_group: budget_provider
    route_key: taboola
    optional: true
  - key: custom_media_performance
    action: custom_media.performance.fetch
    capability: media-measurement
    provider: custom-media-tool
    risk_level: read
    route_group: budget_provider
    route_key: custom_media_tool
    optional: true
  - key: custom_media_budget_update
    action: custom_media.budget.update
    capability: campaign-management
    provider: custom-media-tool
    risk_level: write
    approval_ref: budget_change_review
    route_group: budget_provider
    route_key: custom_media_tool
    optional: true
resource_contracts:
  - key: performance_snapshots
    resource: performance-snapshot
    purpose: Store metrics used in the budget review.
  - key: budget_changes
    resource: budget-change
    purpose: Store proposed and applied budget changes with rationale and approval state.
  - key: campaigns
    resource: campaign
    purpose: Store campaign context and post-change observation notes.
policies:
  - key: recommendation_before_mutation
    kind: boundary
    description: The agent prepares a recommendation before any external budget update can be executed.
  - key: no_secret_exposure
    kind: auth
    description: Provider secrets stay inside daemon-side connector execution.
  - key: approval_before_budget_change
    kind: approval
    description: Approved budget changes must be explicit before external mutation.
approval_gates:
  - key: budget_change_review
    description: Review proposed budget changes, expected risk, and rollback notes before external mutation.
    required_when: external_budget_write
steps:
  - id: orient
    title: Orient From Budget History
    purpose: Read budget policy, recent performance, prior budget changes, learnings, and decisions.
    input_refs:
      - goal
      - budget_policy
      - review_scope
      - review_window
    context_refs:
      - performance_context
      - budget_learnings
      - recent_decisions
    policy_refs:
      - recommendation_before_mutation
    output_refs:
      - budget_review
  - id: fetch_metric_gaps
    title: Fetch Metric Gaps
    purpose: Use granted read actions only when stored evidence is insufficient.
    action_refs:
      - meta_insights
      - google_report_search
      - taboola_report
      - custom_media_performance
    policy_refs:
      - no_secret_exposure
    depends_on:
      - orient
    output_refs:
      - budget_review
  - id: propose_changes
    title: Propose Changes
    purpose: Produce a bounded reallocation recommendation with rationale, risk, and observation plan.
    resource_refs:
      - performance_snapshots
      - budget_changes
      - campaigns
    depends_on:
      - fetch_metric_gaps
    output_refs:
      - budget_review
      - observation_plan
  - id: optional_apply_changes
    title: Optional Apply Changes
    purpose: Execute approved budget update actions only when granted by the concrete run plan.
    action_refs:
      - meta_campaign_budget_update
      - meta_ad_set_budget_update
      - google_campaign_budget_update
      - custom_media_budget_update
    resource_refs:
      - budget_changes
    policy_refs:
      - approval_before_budget_change
    approval_refs:
      - budget_change_review
    depends_on:
      - propose_changes
    output_refs:
      - applied_change_summary
outputs:
  - key: budget_review
    name: Budget Review
    type: object
    required: true
    description: Evidence-linked current allocation, performance, recommendation, risk, and approval state.
    schema:
      type: object
      required: [scope, current_allocation, performance_snapshot, recommendations, risks, evidence_refs, approval_required]
      properties:
        scope: {type: object}
        current_allocation: {type: object}
        performance_snapshot: {type: object}
        recommendations: {type: array}
        risks: {type: array}
        evidence_refs: {type: array, items: {type: string}}
        approval_required: {type: boolean}
  - key: observation_plan
    name: Observation Plan
    type: object
    required: true
    description: Post-decision measurement window, metrics, thresholds, guardrails, and owners.
    schema:
      type: object
      required: [window, metrics, thresholds, guardrails, owners]
      properties:
        window: {type: object}
        metrics: {type: array}
        thresholds: {type: object}
        guardrails: {type: array}
        owners: {type: array}
  - key: applied_change_summary
    name: Applied Change Summary
    type: object
    required: false
    description: Exact applied, partially applied, blocked, or failed budget changes and provider receipts.
    schema:
      type: object
      required: [status, changes, receipt_refs, residual_blockers]
      properties:
        status: {type: string, enum: [not_requested, applied, partial, blocked, failed]}
        changes: {type: array}
        receipt_refs: {type: array, items: {type: string}}
        residual_blockers: {type: array}
learning_hooks:
  - key: budget_reallocation_learning
    prompt: Capture reusable budget movement lessons only after evidence and observation notes exist.
    tags:
      - media-buying
      - budget
failure_handling:
  - If approval is missing, store the recommendation and do not execute budget updates.
  - If metric evidence is insufficient, return the missing evidence list and preserve the review draft.
metadata:
  builtin: true
  run_mode: stackos_run_plan
