schema_version: stackos.workflow-template.v1
key: media-buying.campaign-launch
name: Media Buying Campaign Launch
version: 0.1.0
description: Reusable setup for planning and launching paid media campaigns from bounded project context and explicit action contracts.
domain: media-buying
owner:
  team: StackOS
experience:
  problem: "Paid campaigns fail at launch when creative, destination, tracking, budget, and provider setup are checked separately or too late."
  outcome: "A provider-specific campaign plan that passes launch checks and creates external campaign objects only after approval."
  why_ai: "AI can keep the brief, creative, page, tracking, and provider contracts aligned while explicit actions retain spend and write controls."
  operator_path:
    - "Provide the campaign goal, audience, offer, assets, destination, and budget guardrails."
    - "Select one provider route and resolve its connection."
    - "Review the launch plan, tracking, and risk before approving external creation."
  agent_path:
    - "Validate the brief and dependencies before selecting the concrete provider route."
    - "Build the provider-specific structure and validate every action payload."
    - "Hold the launch and budget approvals, then execute only the selected route."
    - "Record safe provider refs and the first measurement window."
  progress_signals:
    - "Brief validated"
    - "Provider route selected"
    - "Launch checks complete"
    - "Approval recorded"
    - "Campaign objects created"
    - "Measurement window scheduled"
  recovery:
    - "If no provider route is ready, keep the validated launch plan and return one setup path."
    - "On partial creation, reconcile created objects before repair or rollback."
  safe_stopping_points:
    - "Stop with a validated launch plan when external creation or spend is not approved."
  handoffs:
    - workflow_key: media-buying.performance-diagnosis
      relationship: next
      when: "The first meaningful measurement window has completed."
public:
  audience: "Paid-media teams launching campaigns through connected ad platforms"
  setup: connection-required
  prerequisites:
    - "A campaign goal, audience, offer, assets, destination, and budget policy"
    - "Tracking and naming rules"
    - "One connected provider route"
    - "Launch and spend approval owners"
  proof:
    - "Dependency and tracking checks"
    - "Validated provider payloads"
    - "Launch and budget approvals"
    - "Provider object receipts and first measurement plan"
  featured: true
when_to_use:
  - A project needs to launch a paid media campaign across one or more configured channels.
  - The agent needs history, learnings, approvals, resources, and provider contracts before creating campaign structures.
when_not_to_use:
  - The campaign structure is already created and the agent only needs a performance review.
agent_requirements:
  - role: media-campaign-launch
    requirement: required
    agent_preset_ref: media-buying.workflow.campaign-launch
    purpose: Plan launch readiness, provider/action validation, approvals, and execution handoff.
    applies_to_steps:
      - orient
      - prepare_launch_shape
      - create_external_structures
      - record_launch_state
      - capture_learning
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review auth, spend, approval, provider-contract, and audit boundaries before launch.
    applies_to_steps:
      - prepare_launch_shape
      - create_external_structures
      - record_launch_state
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
skill_preset_requirements:
  - skill_preset_ref: stackos.workflow-orchestrator
    requirement: required
    purpose: Coordinate workflow selection, readiness, specialist handoffs, approvals, safe stopping, verification, and recovery without adding domain-specific process.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: offer
    name: Offer
    type: object
    required: true
  - key: target_markets
    name: Target Markets
    type: array
    required: false
  - key: budget_policy
    name: Budget Policy
    type: object
    required: false
  - key: channel_preferences
    name: Channel Preferences
    type: array
    required: false
  - key: landing_page_refs
    name: Landing Page Refs
    type: array
    required: false
context_requirements:
  - id: recent_media_runs
    source: runs
    purpose: Reuse recent launch outcomes and avoid repeating recently rejected channel paths.
    filters:
      domain: media-buying
      statuses:
        - success
        - failed
        - aborted
    fields:
      - kind
      - status
      - last_step
      - metadata_json
      - completed_at
    max_items: 10
    return_mode: compact
  - id: media_resources
    source: resources
    purpose: Read recent campaign, creative, audience, landing page, and conversion-event records.
    filters:
      plugin_slug: media-buying
      resource_keys:
        - campaign
        - creative
        - audience
        - landing-page
        - conversion-event
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 25
    return_mode: compact
  - id: accepted_media_learnings
    source: learnings
    purpose: Pull durable paid media lessons with evidence before choosing launch shape.
    filters:
      tags:
        - media-buying
      statuses:
        - active
    fields:
      - statement
      - domain
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
  - id: active_media_experiments
    source: experiments
    purpose: Avoid launching work that conflicts with active paid media experiments.
    filters:
      domain: media-buying
      statuses:
        - planned
        - running
        - pending-decision
    fields:
      - name
      - hypothesis
      - status
      - metric_targets_json
      - variants
    max_items: 10
    return_mode: compact
capability_requirements:
  - key: campaign-management
    required: true
    preferred_providers:
      - meta-ads
      - google-ads
      - taboola
      - custom-media-tool
  - key: creative-operations
    required: true
  - key: media-measurement
    required: false
auth_requirements:
  - key: meta_ads
    provider: meta-ads
    auth_type: oauth
    optional: true
  - key: google_ads
    provider: google-ads
    auth_type: oauth
    optional: true
  - key: taboola
    provider: taboola
    auth_type: oauth
    optional: true
action_contracts:
  - key: meta_campaign_create
    action: meta.campaign.create
    capability: campaign-management
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: meta_ads
  - key: meta_ad_set_create
    action: meta.ad_set.create
    capability: campaign-management
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: meta_ads
  - key: meta_ad_creative_create
    action: meta.ad_creative.create
    capability: creative-operations
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: meta_ads
  - key: meta_asset_upload
    action: meta.asset.upload
    capability: creative-operations
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: meta_ads
    optional: true
  - key: google_campaign_budget_create
    action: google.campaign_budget.create
    capability: campaign-management
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: google_ads
  - key: google_campaign_create
    action: google.campaign.create
    capability: campaign-management
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: google_ads
  - key: google_ad_group_create
    action: google.ad_group.create
    capability: campaign-management
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: google_ads
  - key: google_asset_create
    action: google.asset.create
    capability: creative-operations
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: google_ads
    optional: true
  - key: google_ad_group_ad_create
    action: google.ad_group_ad.create
    capability: campaign-management
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: google_ads
  - key: google_conversion_action_create
    action: google.conversion_action.create
    capability: media-measurement
    provider: google-ads
    risk_level: write
    auth_ref: google_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: google_ads
    optional: true
  - key: meta_conversions_send
    action: meta.conversions.send
    capability: media-measurement
    provider: meta-ads
    risk_level: write
    auth_ref: meta_ads
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: meta_ads
    optional: true
  - key: taboola_campaign_create
    action: taboola.campaign.create
    capability: campaign-management
    provider: taboola
    risk_level: write
    auth_ref: taboola
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: taboola
  - key: taboola_item_create
    action: taboola.item.create
    capability: creative-operations
    provider: taboola
    risk_level: write
    auth_ref: taboola
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: taboola
  - key: taboola_conversion_rule_create
    action: taboola.conversion_rule.create
    capability: media-measurement
    provider: taboola
    risk_level: write
    auth_ref: taboola
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: taboola
    optional: true
  - key: custom_media_campaign_create
    action: custom_media.campaign.create
    capability: campaign-management
    provider: custom-media-tool
    risk_level: write
    approval_ref: launch_review
    route_group: campaign_launch
    route_key: custom_media_tool
resource_contracts:
  - key: campaigns
    resource: campaign
    purpose: Store launch state, channel, safe campaign refs, and next measurement notes.
  - key: ad_sets
    resource: ad-set
    purpose: Store Meta targeting, placement, budget, and schedule structures.
  - key: ad_groups
    resource: ad-group
    purpose: Store Google ad group structure, targeting, bidding, and status.
  - key: creatives
    resource: creative
    purpose: Store creative refs, copy variants, asset refs, and review notes.
  - key: landing_pages
    resource: landing-page
    purpose: Store destination refs and offer alignment notes.
  - key: performance_snapshots
    resource: performance-snapshot
    purpose: Store first measurement window requirements and later imported snapshots.
policies:
  - key: no_secret_exposure
    kind: auth
    description: Agents may reference providers and credential refs but must never receive secret values.
  - key: agent_decides_channel_path
    kind: boundary
    description: The template defines contracts; the agent chooses provider, scope, and exact records in the run plan.
  - key: approval_before_spend
    kind: approval
    description: External creation or material spend changes require operator approval before execution.
approval_gates:
  - key: launch_review
    description: Review campaign structure, budget, destination, tracking, and expected risk before external creation.
    required_when: external_write_or_spend
  - key: budget_review
    description: Review budget policy and spend limits before launch.
    required_when: material_budget_change
steps:
  - id: orient
    title: Orient From History
    purpose: Read recent work, resources, learnings, experiments, and the current goal.
    input_refs:
      - goal
      - offer
      - target_markets
      - budget_policy
      - channel_preferences
      - landing_page_refs
    context_refs:
      - recent_media_runs
      - media_resources
      - accepted_media_learnings
      - active_media_experiments
    policy_refs:
      - agent_decides_channel_path
    output_refs:
      - launch_plan
  - id: prepare_launch_shape
    title: Prepare Launch Shape
    purpose: Define the channel path, campaign structure, creative needs, measurement window, and open risks.
    resource_refs:
      - campaigns
      - ad_sets
      - creatives
      - landing_pages
    approval_refs:
      - budget_review
    depends_on:
      - orient
    output_refs:
      - launch_plan
  - id: create_external_structures
    title: Create External Structures
    purpose: Execute only approved provider actions granted by the concrete run plan.
    action_refs:
      - meta_campaign_create
      - meta_ad_set_create
      - meta_asset_upload
      - meta_ad_creative_create
      - google_campaign_budget_create
      - google_campaign_create
      - google_ad_group_create
      - google_asset_create
      - google_ad_group_ad_create
      - google_conversion_action_create
      - meta_conversions_send
      - taboola_campaign_create
      - taboola_item_create
      - taboola_conversion_rule_create
      - custom_media_campaign_create
    policy_refs:
      - no_secret_exposure
      - approval_before_spend
    approval_refs:
      - launch_review
    depends_on:
      - prepare_launch_shape
    output_refs:
      - campaign_records
  - id: record_launch_state
    title: Record Launch State
    purpose: Persist campaign, creative, landing page, and initial measurement records.
    resource_refs:
      - campaigns
      - ad_sets
      - ad_groups
      - creatives
      - landing_pages
      - performance_snapshots
    depends_on:
      - create_external_structures
    output_refs:
      - campaign_records
      - followup_measurement_plan
  - id: capture_learning
    title: Capture Learning
    purpose: Record reusable setup lessons with evidence and provenance.
    context_refs:
      - accepted_media_learnings
    depends_on:
      - record_launch_state
outputs:
  - key: launch_plan
    name: Launch Plan
    type: object
    required: true
    description: Channel-specific campaign objects, budgets, assets, conversion refs, approval, and readiness.
    schema:
      type: object
      required: [objective, selected_channels, campaign_objects, budget, asset_refs, conversion_refs, approval_state, readiness]
      properties:
        objective: {type: string}
        selected_channels: {type: array, items: {type: string}}
        campaign_objects: {type: array}
        budget: {type: object}
        asset_refs: {type: array, items: {type: string}}
        conversion_refs: {type: array, items: {type: string}}
        approval_state: {type: string}
        readiness: {type: object}
  - key: campaign_records
    name: Campaign Records
    type: object
    required: false
    description: Created or staged provider campaign refs, statuses, receipts, and blockers by channel.
    schema:
      type: object
      required: [channels, overall_status, receipt_refs]
      properties:
        channels: {type: object}
        overall_status: {type: string, enum: [staged, launched, partial, blocked, failed]}
        receipt_refs: {type: array, items: {type: string}}
        blockers: {type: array}
  - key: followup_measurement_plan
    name: Followup Measurement Plan
    type: object
    required: true
    description: Launch observation windows, metrics, thresholds, attribution caveats, and next review.
    schema:
      type: object
      required: [windows, metrics, thresholds, attribution_caveats, next_review_at]
      properties:
        windows: {type: array}
        metrics: {type: array}
        thresholds: {type: object}
        attribution_caveats: {type: array}
        next_review_at: {type: string}
learning_hooks:
  - key: campaign_launch_learning
    prompt: Record durable media launch lessons only when supported by explicit evidence and provenance.
    tags:
      - media-buying
      - launch
failure_handling:
  - If required provider setup is missing, return setup gaps and store no external changes.
  - If approval is missing, stop before external writes and preserve the prepared launch plan.
metadata:
  builtin: true
  run_mode: stackos_run_plan
