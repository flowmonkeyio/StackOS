<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:14px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-app);font-size:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.c{background:var(--color-bg-surface);border:1px solid var(--color-border-default);border-radius:6px;padding:10px;box-shadow:var(--shadow-xs)}.lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);font-weight:600}.v{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--color-fg-strong);margin-top:4px}.d{font-size:10px;color:var(--color-success-fg);margin-top:3px}.bar{height:5px;border-radius:9999px;background:var(--color-bg-sunken);margin-top:6px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--color-warning-default)}</style></head><body>
<div class="c"><p class="lbl">Plugins</p><p class="v">7</p><p class="d">enabled</p></div>
<div class="c"><p class="lbl">Runs</p><p class="v">128</p><p class="d">this month</p></div>
<div class="c"><p class="lbl">Resources</p><p class="v">2,041</p><p class="d">stored</p></div>
<div class="c"><p class="lbl">Budget</p><p class="v">74%</p><div class="bar"><i style="width:74%"></i></div></div>
</body></html>
