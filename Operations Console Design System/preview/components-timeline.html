<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-surface);color:var(--color-fg-default);font-size:12px}.row{padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--color-border-subtle)}.row:last-child{border:0}.r{background:var(--color-info-subtle)}.d{opacity:.55}.dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}.ok{background:var(--color-success-subtle);color:var(--color-success-fg)}.run{background:var(--color-info-default);color:var(--color-fg-on-accent)}.todo{border:1px dashed var(--color-border-strong);color:var(--color-fg-subtle)}.t{font-size:13px;font-weight:500;color:var(--color-fg-strong)}.x{font-size:11px;color:var(--color-fg-muted)}.dur{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--color-fg-muted)}</style></head><body>
<div class="row"><div class="dot ok">✓</div><div style="flex:1"><div class="t">Load context</div><div class="x">5 filtered records</div></div><div class="dur">0.4s</div></div>
<div class="row r"><div class="dot run">⟳</div><div style="flex:1"><div class="t">Execute action</div><div class="x">provider call running</div></div><div class="dur">running</div></div>
<div class="row d"><div class="dot todo">3</div><div style="flex:1"><div class="t">Record learning</div><div class="x">queued</div></div></div>
</body></html>
